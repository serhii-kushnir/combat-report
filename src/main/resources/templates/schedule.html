<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Графік чергувань</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link th:replace="~{fragments :: sidebar-css}">
    <style>
        /* ===== CSS ЗМІННІ ===== */
        :root {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --bg-toolbar: #ffffff;
            --bg-header: #1a237e;
            --bg-header-light: #283593;
            --bg-input: #ffffff;
            --bg-hover: #fafbff;
            --bg-weekend: #fff8f0;
            --bg-today: #fffde7;
            --bg-menu: #ffffff;
            --bg-legend: #ffffff;
            --bg-stats: #ffffff;
            --text-primary: #222222;
            --text-secondary: #555555;
            --text-light: #999999;
            --text-white: #ffffff;
            --text-muted: #666666;
            --border-color: #e0e0e0;
            --border-light: #f0f0f0;
            --border-lighter: #f5f5f5;
            --shadow-color: rgba(0,0,0,0.08);
            --shadow-light: rgba(0,0,0,0.05);
            --shadow-medium: rgba(0,0,0,0.15);
            --btn-nav-bg: #e8eaf6;
            --btn-nav-color: #1a237e;
            --btn-nav-hover: #c5cae9;
            --btn-today-bg: #1976d2;
            --btn-today-hover: #1565c0;
            --btn-primary-bg: #1565c0;
            --btn-primary-hover: #0d47a1;
            --btn-success-bg: #2e7d32;
            --btn-success-hover: #1b5e20;
            --btn-warning-bg: #e65100;
            --btn-warning-hover: #bf360c;
            --btn-danger-bg: #c62828;
            --btn-danger-hover: #b71c1c;
            --btn-print: #607d8b;
            --btn-print-hover: #546e7a;
            --current-date-bg: #e8eaf6;
            --current-date-color: #1a237e;
            --toast-success: #2e7d32;
            --toast-error: #c62828;
            --stats-header-bg: #1a237e;
            --stats-header-border: #283593;
            --stat-num-color: #1976d2;
        }

        body.dark-theme {
            --bg-body: #1e1e24;
            --bg-card: #2d2d35;
            --bg-toolbar: #2d2d35;
            --bg-header: #2a2a3a;
            --bg-header-light: #3a3a4a;
            --bg-input: #3a3a44;
            --bg-hover: #3a3a44;
            --bg-weekend: #2a2a35;
            --bg-today: #3a3a30;
            --bg-menu: #2d2d35;
            --bg-legend: #2d2d35;
            --bg-stats: #2d2d35;
            --text-primary: #e8e8ec;
            --text-secondary: #b0b0b8;
            --text-light: #88888f;
            --text-white: #ffffff;
            --text-muted: #a0a0a8;
            --border-color: #3d3d48;
            --border-light: #3d3d48;
            --border-lighter: #3d3d48;
            --shadow-color: rgba(0,0,0,0.4);
            --shadow-light: rgba(0,0,0,0.3);
            --shadow-medium: rgba(0,0,0,0.5);
            --btn-nav-bg: #3a3a4a;
            --btn-nav-color: #90caf9;
            --btn-nav-hover: #4a4a5a;
            --btn-today-bg: #4a7ab5;
            --btn-today-hover: #5a8ac5;
            --btn-primary-bg: #2a4a7a;
            --btn-primary-hover: #3a5a8a;
            --btn-success-bg: #2a4a2a;
            --btn-success-hover: #3a5a3a;
            --btn-warning-bg: #7a5a2a;
            --btn-warning-hover: #8a6a3a;
            --btn-danger-bg: #6a2a3a;
            --btn-danger-hover: #7a3a4a;
            --btn-print: #4a5a6a;
            --btn-print-hover: #5a6a7a;
            --current-date-bg: #3a3a4a;
            --current-date-color: #90caf9;
            --stats-header-bg: #2a2a3a;
            --stats-header-border: #3d3d48;
            --stat-num-color: #5a8ac5;
        }

        /* ===== АНІМАЦІЯ ПОЯВИ ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInRow {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toolbar { animation: fadeIn 0.4s ease forwards; opacity: 0; }
        .table-wrap { animation: fadeIn 0.5s ease forwards; opacity: 0; animation-delay: 0.05s; }
        .legend { animation: fadeIn 0.4s ease forwards; opacity: 0; animation-delay: 0.10s; }
        .stats-container { animation: fadeIn 0.5s ease forwards; opacity: 0; animation-delay: 0.15s; }
        .load-more-container { animation: fadeIn 0.4s ease forwards; opacity: 0; animation-delay: 0.20s; }
        .pagination { animation: fadeIn 0.4s ease forwards; opacity: 0; animation-delay: 0.25s; }

        /* Анімація рядків основної таблиці */
        #tableBody tr {
            animation: fadeInRow 0.3s ease forwards;
            opacity: 0;
        }
        #tableBody tr:nth-child(1) { animation-delay: 0.02s; }
        #tableBody tr:nth-child(2) { animation-delay: 0.04s; }
        #tableBody tr:nth-child(3) { animation-delay: 0.06s; }
        #tableBody tr:nth-child(4) { animation-delay: 0.08s; }
        #tableBody tr:nth-child(5) { animation-delay: 0.10s; }
        #tableBody tr:nth-child(6) { animation-delay: 0.12s; }
        #tableBody tr:nth-child(7) { animation-delay: 0.14s; }
        #tableBody tr:nth-child(8) { animation-delay: 0.16s; }
        #tableBody tr:nth-child(9) { animation-delay: 0.18s; }
        #tableBody tr:nth-child(10) { animation-delay: 0.20s; }
        #tableBody tr:nth-child(11) { animation-delay: 0.22s; }
        #tableBody tr:nth-child(12) { animation-delay: 0.24s; }
        #tableBody tr:nth-child(13) { animation-delay: 0.26s; }
        #tableBody tr:nth-child(14) { animation-delay: 0.28s; }
        #tableBody tr:nth-child(15) { animation-delay: 0.30s; }
        #tableBody tr:nth-child(16) { animation-delay: 0.32s; }
        #tableBody tr:nth-child(17) { animation-delay: 0.34s; }
        #tableBody tr:nth-child(18) { animation-delay: 0.36s; }
        #tableBody tr:nth-child(19) { animation-delay: 0.38s; }
        #tableBody tr:nth-child(20) { animation-delay: 0.40s; }

        /* Анімація рядків статистики */
        #statsTableBody tr {
            animation: fadeInRow 0.3s ease forwards;
            opacity: 0;
        }
        #statsTableBody tr:nth-child(1) { animation-delay: 0.02s; }
        #statsTableBody tr:nth-child(2) { animation-delay: 0.04s; }
        #statsTableBody tr:nth-child(3) { animation-delay: 0.06s; }
        #statsTableBody tr:nth-child(4) { animation-delay: 0.08s; }
        #statsTableBody tr:nth-child(5) { animation-delay: 0.10s; }
        #statsTableBody tr:nth-child(6) { animation-delay: 0.12s; }
        #statsTableBody tr:nth-child(7) { animation-delay: 0.14s; }
        #statsTableBody tr:nth-child(8) { animation-delay: 0.16s; }
        #statsTableBody tr:nth-child(9) { animation-delay: 0.18s; }
        #statsTableBody tr:nth-child(10) { animation-delay: 0.20s; }
        #statsTableBody tr:nth-child(11) { animation-delay: 0.22s; }
        #statsTableBody tr:nth-child(12) { animation-delay: 0.24s; }
        #statsTableBody tr:nth-child(13) { animation-delay: 0.26s; }
        #statsTableBody tr:nth-child(14) { animation-delay: 0.28s; }
        #statsTableBody tr:nth-child(15) { animation-delay: 0.30s; }
        #statsTableBody tr:nth-child(16) { animation-delay: 0.32s; }
        #statsTableBody tr:nth-child(17) { animation-delay: 0.34s; }
        #statsTableBody tr:nth-child(18) { animation-delay: 0.36s; }
        #statsTableBody tr:nth-child(19) { animation-delay: 0.38s; }
        #statsTableBody tr:nth-child(20) { animation-delay: 0.40s; }

        /* ===== ОСНОВНІ СТИЛІ ===== */
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            margin: 0;
            transition: background 0.3s, color 0.3s;
        }

        .container { padding: 16px 20px; max-width: 100%; overflow-x: auto; }

        /* ===== ТУЛБАР ===== */
        .toolbar {
            background: var(--bg-toolbar);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px var(--shadow-color);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .toolbar:hover {
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        /* ===== КНОПКИ З АНІМАЦІЄЮ ===== */
        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            line-height: 1.4;
            box-shadow: 0 1px 2px var(--shadow-light);
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px var(--shadow-color);
        }
        .btn:active {
            transform: translateY(1px);
        }
        .btn i { line-height: 1; }

        .btn-nav {
            background: var(--btn-nav-bg);
            color: var(--btn-nav-color);
        }
        .btn-nav:hover {
            background: var(--btn-nav-hover);
        }

        .btn-today {
            background: var(--btn-today-bg);
            color: white;
        }
        .btn-today:hover {
            background: var(--btn-today-hover);
        }

        .btn-primary {
            background: var(--btn-primary-bg);
            color: white;
        }
        .btn-primary:hover {
            background: var(--btn-primary-hover);
        }

        .btn-success {
            background: var(--btn-success-bg);
            color: white;
        }
        .btn-success:hover {
            background: var(--btn-success-hover);
        }

        .btn-warning {
            background: var(--btn-warning-bg);
            color: white;
        }
        .btn-warning:hover {
            background: var(--btn-warning-hover);
        }

        .btn-danger {
            background: var(--btn-danger-bg);
            color: white;
        }
        .btn-danger:hover {
            background: var(--btn-danger-hover);
        }

        .btn-print {
            background: var(--btn-print);
            color: white;
        }
        .btn-print:hover {
            background: var(--btn-print-hover);
        }

        .btn-sm { padding: 4px 9px; font-size: 11px; }

        /* ===== ПОЛЯ ВВОДУ ===== */
        select, input[type="text"] {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 13px;
            background: var(--bg-input);
            color: var(--text-primary);
            cursor: pointer;
            transition: border-color 0.2s, background 0.3s, color 0.3s;
            outline: none;
        }
        select:hover, input:hover {
            border-color: var(--btn-primary-bg);
        }
        select:focus, input:focus {
            border-color: var(--btn-primary-bg);
            box-shadow: 0 0 0 2px rgba(25,118,210,0.2);
        }

        .current-date {
            font-size: 13px;
            color: var(--current-date-color);
            background: var(--current-date-bg);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 500;
            transition: background 0.3s, color 0.3s;
        }

        #monthTitle {
            color: var(--text-primary);
            transition: color 0.3s;
        }

        /* ===== ТАБЛИЦЯ ===== */
        .table-wrap {
            overflow-x: auto;
            border-radius: 12px;
            box-shadow: 0 2px 8px var(--shadow-color);
            transition: box-shadow 0.3s;
        }
        table {
            border-collapse: collapse;
            background: var(--bg-card);
            min-width: 100%;
            transition: background 0.3s;
        }
        thead tr:first-child th {
            background: var(--bg-header);
            color: var(--text-white);
            font-size: 12px;
            padding: 10px 4px;
            transition: background 0.3s;
        }
        thead tr:last-child th {
            background: var(--bg-header-light);
            color: #c5cae9;
            font-size: 11px;
            padding: 6px 2px;
            transition: background 0.3s;
        }

        /* ===== Ширини колонок ===== */
        .col-num  { width: 32px; min-width: 32px; }
        .col-rank { width: 125px; min-width: 125px; text-align: left !important; padding-left: 6px !important; }
        .col-name { width: 130px; min-width: 130px; text-align: left !important; padding-left: 8px !important; }
        .col-day  { width: 36px; min-width: 32px; }

        /* ===== ФІКСАЦІЯ ПЕРШИХ ТРЬОХ КОЛОНОК ===== */
        .col-num,
        .col-rank,
        .col-name,
        .num-cell,
        .rank-cell,
        .name-cell {
            position: sticky;
            z-index: 2;
            background: var(--bg-card);
        }
        thead .col-num,
        thead .col-rank,
        thead .col-name {
            z-index: 3;
        }
        .col-num,
        .num-cell { left: 0; }
        .col-rank,
        .rank-cell { left: 32px; }
        .col-name,
        .name-cell { left: calc(32px + 125px); }

        tr:hover td.num-cell,
        tr:hover td.rank-cell,
        tr:hover td.name-cell {
            background: var(--bg-hover);
        }

        td {
            padding: 2px;
            text-align: center;
            border-bottom: 1px solid var(--border-light);
            border-right: 1px solid var(--border-lighter);
            font-size: 12px;
            color: var(--text-primary);
            transition: border-color 0.3s, color 0.3s;
        }
        td.name-cell {
            text-align: left;
            padding: 4px 6px 4px 8px;
            font-size: 12px;
            white-space: nowrap;
            color: var(--text-primary);
        }
        td.rank-cell {
            text-align: left;
            padding: 4px 4px 4px 6px;
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        td.num-cell {
            color: var(--text-light);
            font-size: 11px;
            text-align: center;
        }
        tr:hover td {
            background: var(--bg-hover);
        }

        .day-cell {
            cursor: pointer;
            position: relative;
            height: 28px;
            vertical-align: middle;
            transition: background 0.15s;
        }
        .day-cell:hover { background: var(--bg-hover) !important; }
        .day-cell.weekend { background: var(--bg-weekend); }
        .day-cell.today-col { background: var(--bg-today) !important; }

        .cell-badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            line-height: 1.4;
            white-space: nowrap;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .day-cell:hover .cell-badge {
            transform: scale(1.05);
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        /* Кольори статусів */
        .s-БЧ     { background: #ffcdd2; color: #b71c1c; }
        .s-БЧ_БАТ { background: #ef9a9a; color: #7f0000; }
        .s-БЧ_РКП { background: #ffab91; color: #bf360c; }
        .s-Р-НЯ   { background: #c8e6c9; color: #1b5e20; }
        .s-В-НЯ   { background: #bbdefb; color: #0d47a1; }
        .s-В-КА   { background: #b3e5fc; color: #01579b; }
        .s-ХВ     { background: #f8bbd0; color: #880e4f; }
        .s-СЗЧ    { background: #ffe0b2; color: #e65100; }
        .s-ПЛЮ    { background: #e1bee7; color: #4a148c; }
        .s-ППД    { background: #dcedc8; color: #33691e; }
        .s-НАВ    { background: #fff9c4; color: #f57f17; }
        .s-ПЕРЕВ  { background: #cfd8dc; color: #37474f; }

        /* ===== МЕНЮ СТАТУСІВ ===== */
        .status-menu {
            display: none;
            position: fixed;
            z-index: 500;
            background: var(--bg-menu);
            border-radius: 12px;
            box-shadow: 0 8px 24px var(--shadow-medium);
            padding: 6px;
            min-width: 160px;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .status-menu.open { display: block; }
        .status-menu-title {
            font-size: 11px;
            color: var(--text-light);
            padding: 4px 6px 6px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 4px;
        }
        .status-option {
            padding: 5px 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.1s;
        }
        .status-option:hover { opacity: 0.85; transform: translateX(2px); }
        .status-option .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-option.clear {
            background: var(--bg-hover);
            color: var(--text-light);
            font-weight: 400;
        }

        /* ===== ЛЕГЕНДА ===== */
        .legend {
            background: var(--bg-legend);
            border-radius: 12px;
            padding: 10px 14px;
            margin-top: 12px;
            box-shadow: 0 2px 6px var(--shadow-color);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .legend-title {
            font-size: 12px;
            color: var(--text-secondary);
            margin-right: 4px;
            transition: color 0.3s;
        }
        .legend-item {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 6px;
            transition: transform 0.2s ease;
        }
        .legend-item:hover {
            transform: scale(1.05);
        }

        /* ===== СТАТИСТИКА ===== */
        .stats-container {
            margin-top: 14px;
            background: var(--bg-stats);
            border-radius: 12px;
            box-shadow: 0 2px 8px var(--shadow-color);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .stats-container h3 {
            font-size: 15px;
            margin: 8px 0 8px 0;
            color: var(--text-primary);
            font-weight: 600;
            padding: 8px 14px 0;
            transition: color 0.3s;
        }
        .stats-table-wrap {
            overflow-x: auto;
            border-radius: 12px;
        }
        .stats-table {
            border-collapse: collapse;
            background: var(--bg-stats);
            width: 100%;
            font-size: 12px;
            transition: background 0.3s;
        }
        .stats-table thead tr th {
            background: var(--stats-header-bg);
            color: var(--text-white);
            font-size: 12px;
            padding: 8px 4px;
            border-bottom: 1px solid var(--stats-header-border);
            white-space: nowrap;
            transition: background 0.3s;
        }
        .stats-table td.num-cell {
            width: 32px;
            min-width: 32px;
            text-align: center;
        }
        .stats-table td.rank-cell {
            text-align: left;
            padding: 4px 4px 4px 6px;
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .stats-table td {
            padding: 6px 4px;
            text-align: center;
            border-bottom: 1px solid var(--border-light);
            border-right: 1px solid var(--border-lighter);
            font-size: 12px;
            color: var(--text-primary);
            transition: border-color 0.3s, color 0.3s;
        }
        .stats-table td.name-cell-stats {
            text-align: left;
            padding-left: 8px;
            font-weight: 500;
        }
        .stats-table tr:hover td {
            background: var(--bg-hover);
        }

        /* Ширина колонок у статистиці: № (32px), Звання (125px), ПІБ (130px) */
        .stats-table th:nth-child(1),
        .stats-table td:nth-child(1) { width: 32px; min-width: 32px; }
        .stats-table th:nth-child(2),
        .stats-table td:nth-child(2) { width: 125px; min-width: 125px; }
        .stats-table th:nth-child(3),
        .stats-table td:nth-child(3) { width: 130px; min-width: 130px; }

        /* Стрілки сортування для обох таблиць */
        thead th[data-col] {
            cursor: pointer;
            user-select: none;
        }
        thead th[data-col]:hover {
            background: var(--bg-header-light, #3a3a4a);
        }
        thead th.sort-asc::after  { content: ' ▲'; font-size: 10px; }
        thead th.sort-desc::after { content: ' ▼'; font-size: 10px; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed; bottom: 20px; right: 20px;
            padding: 10px 18px; border-radius: 8px;
            color: white;
            font-size: 13px; font-weight: 600;
            opacity: 0; transition: opacity 0.3s;
            z-index: 9999;
        }
        .toast.show { opacity: 1; }
        .toast.ok  { background: var(--toast-success); }
        .toast.err { background: var(--toast-error); }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
            transition: color 0.3s;
        }

        /* ===== ПАГІНАЦІЯ ===== */
        .pagination {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
        }
        .pagination button {
            padding: 4px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-card);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            color: var(--text-primary);
        }
        .pagination button:hover:not(:disabled) {
            background: var(--bg-hover);
            transform: translateY(-1px);
            box-shadow: 0 2px 6px var(--shadow-color);
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .pagination .page-info {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 4px 8px;
        }

        /* ===== КНОПКА "ЗАВАНТАЖИТИ ЩЕ" ===== */
        .load-more-container {
            display: flex;
            justify-content: center;
            margin-top: 14px;
        }
        .load-more-container .btn {
            padding: 6px 18px;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 768px) {
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .col-rank { width: 80px; min-width: 80px; }
            .col-name { width: 90px; min-width: 90px; }
            .col-day { width: 28px; min-width: 28px; }
            .col-num { width: 28px; min-width: 28px; }
            .rank-cell { left: 28px; }
            .name-cell { left: calc(28px + 80px); }
            .stats-table td:nth-child(2) { min-width: 80px; }
            .stats-table td:nth-child(3) { min-width: 90px; }
            .stats-container h3 { font-size: 13px; }
        }

        /* ===== ДРУК ===== */
        @media print {
            .sidebar, .toolbar, .legend, .no-print, .btn, .btn-print, .btn-primary,
            .btn-success, .btn-nav, .btn-today, select, input, .status-menu,
            .pagination, .load-more-container {
                display: none !important;
            }
            body {
                background: white !important;
                color: black !important;
                font-size: 7px !important;
            }
            .main-content {
                margin-left: 0 !important;
                padding: 0 !important;
            }
            .container {
                padding: 4px !important;
                max-width: 100% !important;
                margin: 0 !important;
            }
            .table-wrap {
                overflow: visible !important;
                box-shadow: none !important;
                border: 1px solid #ccc !important;
                border-radius: 0 !important;
                margin-bottom: 6px !important;
            }
            table {
                background: white !important;
                width: 100% !important;
                border-collapse: collapse;
                font-size: 6px !important;
                table-layout: fixed !important;
            }
            .col-num, .num-cell { width: 20px !important; min-width: 20px !important; max-width: 20px !important; text-align: center !important; }
            .col-rank, .rank-cell { width: 40px !important; min-width: 40px !important; max-width: 40px !important; padding-left: 3px !important; }
            .col-name, .name-cell { width: 50px !important; min-width: 50px !important; max-width: 50px !important; padding-left: 4px !important; font-size: 5.5px !important; }
            .col-day { width: 18px !important; min-width: 18px !important; max-width: 18px !important; padding: 1px 0 !important; font-size: 5px !important; text-align: center !important; }
            thead th { background: #1a237e !important; color: white !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            td { color: black !important; border: 1px solid #ddd !important; font-size: 5px !important; padding: 1px 0 !important; background: white !important; text-align: center !important; }
            tr { page-break-inside: avoid; }
            .weekend { background: #f5f5f5 !important; }
            .today-col { background: #fffde7 !important; }
            .cell-badge { font-size: 4.5px !important; padding: 0 1px !important; }
            .stats-container { display: block !important; margin-top: 4px !important; box-shadow: none !important; border: 1px solid #ccc !important; border-radius: 0 !important; background: white !important; }
            .stats-table { background: white !important; }
            .stats-table thead th { background: #1a237e !important; color: white !important; }
            .stats-table td { color: black !important; border: 1px solid #ddd !important; background: white !important; }
            .dark-theme td { color: black !important; background: white !important; }
            .dark-theme thead th { background: #1a237e !important; color: white !important; }
            @page { size: landscape; margin: 4mm 3mm 4mm 3mm; }
        }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments :: sidebar('schedule')}"></div>
    <div class="main-content">

        <div class="container">
            <div class="toolbar">
                <div class="current-date" id="currentDate"></div>
                <button class="btn btn-nav" id="prevBtn">◀</button>
                <button class="btn btn-today" id="todayBtn">Сьогодні</button>
                <button class="btn btn-nav" id="nextBtn">▶</button>
                <h2 id="monthTitle">—</h2>
                <select id="yearFilter">
                    <option value="">— Всі роки —</option>
                </select>
                <select id="monthFilter">
                    <option value="">— Всі місяці —</option>
                </select>
                <button class="btn btn-primary" id="applyFilterBtn">Показати</button>
                <button class="btn btn-success" id="exportXlsxBtn">📊 Експорт XLSX</button>
                <button class="btn btn-print" onclick="window.print()">
                    <i class="fas fa-print"></i> Друк
                </button>
            </div>

            <div class="table-wrap">
                <table id="scheduleTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody">
                    <tr><td colspan="40" style="text-align:center;padding:32px;color:var(--text-light)">Завантаження...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="legend" id="legend"></div>

            <div class="stats-container" id="statsContainer">
                <h3>📊 Статистика за категоріями (поточний місяць)</h3>
                <div class="stats-table-wrap">
                    <table class="stats-table" id="statsTable">
                        <thead>
                        <tr>
                            <th data-col="num" onclick="sortStatsBy('num')" style="width:32px;">№</th>
                            <th data-col="rank" onclick="sortStatsBy('rank')" style="width:125px;">Звання</th>
                            <th data-col="name" onclick="sortStatsBy('name')" style="width:130px;">ПІБ</th>
                            <th data-col="БЧ" onclick="sortStatsBy('БЧ')">БЧ</th>
                            <th data-col="Бат БЧ" onclick="sortStatsBy('Бат БЧ')">Бат БЧ</th>
                            <th data-col="БЧ РКП" onclick="sortStatsBy('БЧ РКП')">БЧ РКП</th>
                            <th data-col="Р-ня" onclick="sortStatsBy('Р-ня')">Р-ня</th>
                            <th data-col="В-ня" onclick="sortStatsBy('В-ня')">В-ня</th>
                            <th data-col="В-ка" onclick="sortStatsBy('В-ка')">В-ка</th>
                            <th data-col="Х-й" onclick="sortStatsBy('Х-й')">Х-й</th>
                            <th data-col="СЗЧ" onclick="sortStatsBy('СЗЧ')">СЗЧ</th>
                            <th data-col="Плюс" onclick="sortStatsBy('Плюс')">Плюс</th>
                            <th data-col="ППД" onclick="sortStatsBy('ППД')">ППД</th>
                            <th data-col="Навчання" onclick="sortStatsBy('Навчання')">Навчання</th>
                            <th data-col="Перевівся" onclick="sortStatsBy('Перевівся')">Перевівся</th>
                        </tr>
                        </thead>
                        <tbody id="statsTableBody">
                        <tr><td colspan="15" style="text-align:center;color:var(--text-light)">Завантаження...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="status-menu" id="statusMenu">
            <div class="status-menu-title" id="menuTitle">Обрати статус</div>
        </div>
        <div class="toast" id="toast"></div>

        <script>
            // ===== СТАН =====
            const STATUSES = [
                { code: 'БЧ',      label: 'БЧ',        color: '#ffcdd2', text: '#b71c1c' },
                { code: 'БЧ БАТ',  label: 'БЧ Бат',    color: '#ef9a9a', text: '#7f0000' },
                { code: 'БЧ РКП',  label: 'БЧ РКП',    color: '#ffab91', text: '#bf360c' },
                { code: 'Р-НЯ',    label: 'Р-ня',      color: '#c8e6c9', text: '#1b5e20' },
                { code: 'В-НЯ',    label: 'В-ня',      color: '#bbdefb', text: '#0d47a1' },
                { code: 'В-КА',    label: 'В-ка',      color: '#b3e5fc', text: '#01579b' },
                { code: 'ХВ',      label: 'Х-й',       color: '#f8bbd0', text: '#880e4f' },
                { code: 'СЗЧ',     label: 'СЗЧ',       color: '#ffe0b2', text: '#e65100' },
                { code: 'ПЛЮ',     label: 'Плюс',      color: '#e1bee7', text: '#4a148c' },
                { code: 'ППД',     label: 'ППД',       color: '#dcedc8', text: '#33691e' },
                { code: 'НАВ',     label: 'Навчання',  color: '#fff9c4', text: '#f57f17' },
                { code: 'ПЕРЕВ',   label: 'Перевівся', color: '#cfd8dc', text: '#37474f' },
            ];
            const STATUS_MAP = {};
            STATUSES.forEach(s => STATUS_MAP[s.code] = s);

            const CATEGORY_MAPPING = {
                'БЧ': 'БЧ',
                'БЧ БАТ': 'Бат БЧ',
                'БЧ РКП': 'БЧ РКП',
                'Р-НЯ': 'Р-ня',
                'В-НЯ': 'В-ня',
                'В-КА': 'В-ка',
                'ХВ': 'Х-й',
                'СЗЧ': 'СЗЧ',
                'ПЛЮ': 'Плюс',
                'ППД': 'ППД',
                'НАВ': 'Навчання',
                'ПЕРЕВ': 'Перевівся'
            };
            const STAT_CATEGORIES = ['БЧ','Бат БЧ','БЧ РКП','Р-ня','В-ня','В-ка','Х-й','СЗЧ','Плюс','ППД','Навчання','Перевівся'];
            const UA_MONTHS = ['Січень','Лютий','Березень','Квітень','Травень','Червень',
                'Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
            const UA_DAYS = ['Нд','Пн','Вт','Ср','Чт','Пт','Сб'];

            let currentYear, currentMonth;
            let tableData = [];
            let filteredData = [];
            let sortCol = 'num';
            let sortDir = 1;
            let statsSortCol = 'num';
            let statsSortDir = 1;
            let menuTarget = null;
            const today = new Date();
            currentYear  = today.getFullYear();
            currentMonth = today.getMonth() + 1;

            // Пагінація
            let currentPage = 0;
            let pageSize = 50; // багато людей, але з пагінацією
            let totalElements = 0;

            // Мапа для порядкових номерів
            let personnelMap = {};
            let personnelMapLoaded = false;

            async function loadPersonnelMap() {
                if (personnelMapLoaded) return;
                try {
                    // Використовуємо великий розмір сторінки, щоб отримати всіх (або краще зробити окремий ендпоінт без пагінації)
                    const res = await fetch('/personnel/api?page=0&size=1000');
                    if (!res.ok) return;
                    const pageData = await res.json();
                    const list = pageData.content || []; // витягуємо масив
                    list.forEach(p => {
                        personnelMap[p.id] = p.personnelNumber;
                    });
                    personnelMapLoaded = true;
                } catch (e) {
                    console.error('Помилка завантаження personnelMap', e);
                }
            }

            function enrichWithPersonnelNumber(data) {
                return data.map(row => {
                    const num = personnelMap[row.id];
                    return { ...row, personnelNumber: num };
                });
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m] || m);
            }

            function showToast(msg, type) {
                const t = document.getElementById('toast');
                t.textContent = msg;
                t.className = `toast ${type} show`;
                setTimeout(() => t.classList.remove('show'), 2500);
            }

            function getSortValue(row, col) {
                switch(col) {
                    case 'num': return row.personnelNumber ?? row.id ?? 0;
                    case 'rank': return row.rank || '';
                    case 'name': return row.shortName || '';
                    default: return '';
                }
            }

            function updateCurrentDate() {
                const now = new Date();
                const day = String(now.getDate()).padStart(2,'0');
                const month = String(now.getMonth()+1).padStart(2,'0');
                const year = now.getFullYear();
                document.getElementById('currentDate').textContent = `📅 ${day}.${month}.${year}`;
            }
            updateCurrentDate();
            buildLegend();

            async function loadMonth() {
                document.getElementById('monthTitle').textContent =
                    UA_MONTHS[currentMonth - 1] + ' ' + currentYear;

                const res = await fetch(`/schedule/api?year=${currentYear}&month=${currentMonth}`);
                if (!res.ok) { showToast('Помилка завантаження', 'err'); return; }
                let data = await res.json();

                await loadPersonnelMap();
                tableData = enrichWithPersonnelNumber(data);
                totalElements = tableData.length; // загальна кількість для пагінації

                sortCol = 'num';
                sortDir = 1;
                statsSortCol = 'num';
                statsSortDir = 1;
                applyFilters();
                renderStatsTable();
            }

            function sortBy(col) {
                if (sortCol === col) {
                    sortDir *= -1;
                } else {
                    sortCol = col;
                    sortDir = 1;
                }
                applyFilters();
            }

            function applyFilters() {
                if (!tableData) return;
                let sorted = [...tableData];
                if (sortCol) {
                    sorted.sort((a, b) => {
                        let va = getSortValue(a, sortCol);
                        let vb = getSortValue(b, sortCol);
                        if (typeof va === 'number' && typeof vb === 'number') {
                            return (va - vb) * sortDir;
                        }
                        va = String(va).toLowerCase();
                        vb = String(vb).toLowerCase();
                        if (va < vb) return -1 * sortDir;
                        if (va > vb) return 1 * sortDir;
                        return 0;
                    });
                }
                filteredData = sorted;
                // Пагінація: вирізаємо частину
                const start = currentPage * pageSize;
                const end = start + pageSize;
                const pagedData = filteredData.slice(start, end);
                document.querySelectorAll('#scheduleTable thead th[data-col]').forEach(th => {
                    th.classList.remove('sort-asc', 'sort-desc');
                    if (th.dataset.col === sortCol) {
                        th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
                    }
                });
                renderTable(pagedData);
                renderPagination();
            }

            function goToPage(page) {
                const totalPages = Math.ceil(filteredData.length / pageSize);
                if (page < 0 || page >= totalPages) return;
                currentPage = page;
                applyFilters();
            }

            function renderPagination() {
                const totalPages = Math.ceil(filteredData.length / pageSize);
                const pag = document.getElementById('pagination');
                if (!pag) return;
                if (totalPages <= 1) {
                    pag.innerHTML = '';
                    return;
                }
                let html = '';
                html += `<button onclick="goToPage(0)" ${currentPage === 0 ? 'disabled' : ''}>⏮</button>`;
                html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>◀</button>`;
                html += `<span class="page-info">Сторінка ${currentPage + 1} з ${totalPages} (всього ${filteredData.length} осіб)</span>`;
                html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>▶</button>`;
                html += `<button onclick="goToPage(${totalPages - 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>⏭</button>`;
                pag.innerHTML = html;
            }

            function renderTable(pagedData) {
                const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();

                let headRow1 = `<tr>
            <th class="col-num" data-col="num" onclick="sortBy('num')">№</th>
            <th class="col-rank" data-col="rank" onclick="sortBy('rank')" style="text-align:left">Звання</th>
            <th class="col-name" data-col="name" onclick="sortBy('name')" style="text-align:left">ПІБ</th>`;
                for (let d = 1; d <= daysInMonth; d++) {
                    const dow = new Date(currentYear, currentMonth - 1, d).getDay();
                    const isWE = (dow === 0 || dow === 6);
                    const isTod = (currentYear === today.getFullYear() &&
                        currentMonth === today.getMonth() + 1 &&
                        d === today.getDate());
                    headRow1 += `<th class="col-day${isWE ? ' weekend' : ''}${isTod ? ' today-col' : ''}"
                 style="font-size:11px;padding:4px 2px">${d}</th>`;
                }
                headRow1 += `</tr>`;

                let headRow2 = `<tr><th></th><th></th><th></th>`;
                for (let d = 1; d <= daysInMonth; d++) {
                    const dow = new Date(currentYear, currentMonth - 1, d).getDay();
                    headRow2 += `<th style="font-size:9px;color:#90caf9">${UA_DAYS[dow]}</th>`;
                }
                headRow2 += `</tr>`;
                document.getElementById('tableHead').innerHTML = headRow1 + headRow2;

                if (!pagedData || !pagedData.length) {
                    document.getElementById('tableBody').innerHTML =
                        `<tr><td colspan="${daysInMonth + 3}" style="text-align:center;padding:32px;color:var(--text-light)">Особовий склад порожній</td></tr>`;
                    return;
                }

                let html = '';
                pagedData.forEach((row, idx) => {
                    const rowNum = row.personnelNumber ?? (idx + 1);
                    let rowHtml = `<tr>
                <td class="num-cell">${rowNum}</td>
                <td class="rank-cell">${escapeHtml(row.rank)}</td>
                <td class="name-cell">${escapeHtml(row.shortName)}</td>`;
                    for (let d = 1; d <= daysInMonth; d++) {
                        const status = row.days[d] || '';
                        const dow = new Date(currentYear, currentMonth - 1, d).getDay();
                        const isWE = (dow === 0 || dow === 6);
                        const isTod = (currentYear === today.getFullYear() &&
                            currentMonth === today.getMonth() + 1 &&
                            d === today.getDate());
                        const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                        const cls = `day-cell${isWE ? ' weekend' : ''}${isTod ? ' today-col' : ''}`;

                        let badge = '';
                        if (status) {
                            const s = STATUS_MAP[status];
                            const cssClass = 's-' + status.replace(' ', '_');
                            if (s) {
                                badge = `<span class="cell-badge ${cssClass}">${s.label}</span>`;
                            } else {
                                badge = `<span class="cell-badge" style="background:#eee;color:#333">${status}</span>`;
                            }
                        }
                        rowHtml += `<td class="${cls}"
                    data-pid="${row.id}"
                    data-day="${d}"
                    data-date="${dateStr}"
                    data-status="${status}"
                    onclick="openMenu(event, this)">${badge}</td>`;
                    }
                    rowHtml += `</tr>`;
                    html += rowHtml;
                });
                document.getElementById('tableBody').innerHTML = html;
            }

            function renderStatsTable() {
                const tbody = document.getElementById('statsTableBody');
                if (!tableData || tableData.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="15" style="text-align:center;color:var(--text-light)">Немає даних про особовий склад</td></tr>';
                    return;
                }

                let sortedData = [...tableData];
                if (statsSortCol) {
                    sortedData.sort((a, b) => {
                        let va = getStatsSortValue(a, statsSortCol);
                        let vb = getStatsSortValue(b, statsSortCol);
                        if (typeof va === 'number' && typeof vb === 'number') {
                            return (va - vb) * statsSortDir;
                        }
                        va = String(va).toLowerCase();
                        vb = String(vb).toLowerCase();
                        if (va < vb) return -1 * statsSortDir;
                        if (va > vb) return 1 * statsSortDir;
                        return 0;
                    });
                }

                document.querySelectorAll('#statsTable thead th[data-col]').forEach(th => {
                    th.classList.remove('sort-asc', 'sort-desc');
                    if (th.dataset.col === statsSortCol) {
                        th.classList.add(statsSortDir === 1 ? 'sort-asc' : 'sort-desc');
                    }
                });

                let rowsHtml = '';
                sortedData.forEach((person, idx) => {
                    const rowNum = person.personnelNumber ?? (idx + 1);
                    let counts = {};
                    STAT_CATEGORIES.forEach(cat => counts[cat] = 0);
                    for (const dayNum in person.days) {
                        const statusCode = person.days[dayNum];
                        if (statusCode && CATEGORY_MAPPING[statusCode]) {
                            const category = CATEGORY_MAPPING[statusCode];
                            counts[category]++;
                        }
                    }
                    rowsHtml += `<tr>
                <td class="num-cell">${rowNum}</td>
                <td class="rank-cell">${escapeHtml(person.rank)}</td>
                <td class="name-cell-stats">${escapeHtml(person.shortName)}</td>
                <td>${counts['БЧ']}</td>
                <td>${counts['Бат БЧ']}</td>
                <td>${counts['БЧ РКП']}</td>
                <td>${counts['Р-ня']}</td>
                <td>${counts['В-ня']}</td>
                <td>${counts['В-ка']}</td>
                <td>${counts['Х-й']}</td>
                <td>${counts['СЗЧ']}</td>
                <td>${counts['Плюс']}</td>
                <td>${counts['ППД']}</td>
                <td>${counts['Навчання']}</td>
                <td>${counts['Перевівся']}</td>
            </tr>`;
                });
                tbody.innerHTML = rowsHtml;
            }

            function getStatsSortValue(row, col) {
                if (col === 'num') {
                    return row.personnelNumber ?? row.id ?? 0;
                }
                if (col === 'name') {
                    return row.shortName || '';
                }
                if (col === 'rank') {
                    return row.rank || '';
                }
                const counts = {};
                STAT_CATEGORIES.forEach(cat => counts[cat] = 0);
                for (const dayNum in row.days) {
                    const statusCode = row.days[dayNum];
                    if (statusCode && CATEGORY_MAPPING[statusCode]) {
                        const category = CATEGORY_MAPPING[statusCode];
                        counts[category]++;
                    }
                }
                return counts[col] || 0;
            }

            function sortStatsBy(col) {
                if (statsSortCol === col) {
                    statsSortDir *= -1;
                } else {
                    statsSortCol = col;
                    statsSortDir = 1;
                }
                renderStatsTable();
            }

            // ===== МЕНЮ СТАТУСІВ =====
            const menu = document.getElementById('statusMenu');
            function openMenu(e, cell) {
                e.stopPropagation();
                e.preventDefault();
                menuTarget = {
                    personnelId: cell.dataset.pid,
                    date: cell.dataset.date,
                    current: cell.dataset.status,
                    cell
                };
                const name = cell.closest('tr').querySelector('.name-cell').textContent;
                const day = cell.dataset.day;
                const title = `${name} — ${day} ${UA_MONTHS[currentMonth-1]}`;

                let html = `<div class="status-menu-title">${escapeHtml(title)}</div>`;
                STATUSES.forEach(s => {
                    html += `<div class="status-option" style="background:${s.color};color:${s.text}"
                onclick="event.stopPropagation();selectStatus('${s.code}')">
                <span class="dot" style="background:${s.text}"></span> ${s.label}
            </div>`;
                });
                html += `<div class="status-option clear" onclick="event.stopPropagation();selectStatus('')">✕ Очистити</div>`;
                menu.innerHTML = html;

                const rect = cell.getBoundingClientRect();
                let left = rect.left + window.scrollX;
                let top = rect.bottom + window.scrollY + 2;
                if (left + 170 > window.innerWidth) left = window.innerWidth - 175;
                if (top + 400 > window.innerHeight + window.scrollY) top = rect.top + window.scrollY - 410;
                menu.style.left = left + 'px';
                menu.style.top = top + 'px';
                menu.classList.add('open');
            }

            async function selectStatus(code) {
                menu.classList.remove('open');
                if (!menuTarget) return;
                const { personnelId, date, cell } = menuTarget;
                try {
                    const res = await fetch('/schedule/api/cell', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ personnelId, date, status: code })
                    });
                    if (!res.ok) { showToast('Помилка збереження', 'err'); return; }

                    const row = tableData.find(r => String(r.id) === String(personnelId));
                    const day = parseInt(cell.dataset.day);
                    if (row) row.days[day] = code;

                    cell.dataset.status = code;
                    if (code) {
                        const s = STATUS_MAP[code];
                        const cssClass = 's-' + code.replace(' ', '_');
                        cell.innerHTML = `<span class="cell-badge ${cssClass}">${s ? s.label : code}</span>`;
                    } else {
                        cell.innerHTML = '';
                    }
                    renderStatsTable();
                } catch (err) {
                    showToast('Помилка мережі', 'err');
                }
                menuTarget = null;
            }

            document.addEventListener('click', (e) => {
                if (!menu.contains(e.target)) menu.classList.remove('open');
            });

            function buildLegend() {
                const el = document.getElementById('legend');
                let html = '<span class="legend-title">Позначення:</span>';
                STATUSES.forEach(s => {
                    html += `<span class="legend-item s-${s.code.replace(' ','_')}">${s.label}</span>`;
                });
                el.innerHTML = html;
            }

            async function loadFilters() {
                const yearsRes = await fetch('/schedule/api/years');
                if (yearsRes.ok) {
                    const years = await yearsRes.json();
                    const yearSelect = document.getElementById('yearFilter');
                    years.forEach(y => {
                        const opt = document.createElement('option');
                        opt.value = y;
                        opt.textContent = y;
                        yearSelect.appendChild(opt);
                    });
                }
                const monthsRes = await fetch('/schedule/api/months');
                if (monthsRes.ok) {
                    const months = await monthsRes.json();
                    const monthSelect = document.getElementById('monthFilter');
                    months.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m;
                        opt.textContent = m;
                        monthSelect.appendChild(opt);
                    });
                }
            }

            document.getElementById('applyFilterBtn').onclick = () => {
                const yearVal = document.getElementById('yearFilter').value;
                const monthVal = document.getElementById('monthFilter').value;
                if (monthVal) {
                    const monthIndex = UA_MONTHS.findIndex(m => m === monthVal);
                    if (monthIndex !== -1) {
                        currentYear = parseInt(yearVal) || new Date().getFullYear();
                        currentMonth = monthIndex + 1;
                        currentPage = 0;
                        loadMonth();
                    }
                } else if (yearVal) {
                    currentYear = parseInt(yearVal);
                    currentMonth = 1;
                    currentPage = 0;
                    loadMonth();
                } else {
                    currentYear = today.getFullYear();
                    currentMonth = today.getMonth() + 1;
                    currentPage = 0;
                    loadMonth();
                }
            };

            document.getElementById('exportXlsxBtn').addEventListener('click', function() {
                const yearVal = document.getElementById('yearFilter').value;
                const monthVal = document.getElementById('monthFilter').value;
                let year = parseInt(yearVal) || currentYear;
                let url = `/schedule/export?year=${year}`;
                if (monthVal) {
                    const idx = UA_MONTHS.indexOf(monthVal);
                    if (idx !== -1) {
                        url += `&month=${idx + 1}`;
                    }
                }
                if (typeof sortCol !== 'undefined' && sortCol) {
                    url += `&sortCol=${encodeURIComponent(sortCol)}&sortDir=${sortDir}`;
                }
                window.location.href = url;
            });

            document.getElementById('prevBtn').onclick = () => { shiftMonth(-1); };
            document.getElementById('nextBtn').onclick = () => { shiftMonth(+1); };
            document.getElementById('todayBtn').onclick = () => {
                currentYear = today.getFullYear();
                currentMonth = today.getMonth() + 1;
                currentPage = 0;
                loadMonth();
            };

            function shiftMonth(delta) {
                currentMonth += delta;
                if (currentMonth > 12) { currentMonth = 1; currentYear++; }
                if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
                currentPage = 0;
                loadMonth();
            }

            // ===== СТАРТ =====
            loadFilters();
            loadMonth();
        </script>
    </div>
</div>
<div th:replace="~{fragments :: sidebar-js}"></div>
</body>
</html>
