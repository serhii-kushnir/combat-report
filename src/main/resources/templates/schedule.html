<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Графік чергувань</title>
    <style>

        /* Зсув контенту при згортанні */

        /* Основний контент */

        /* Топбар всередині контенту */
        .topbar {
            background: white;
            padding: 12px 20px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 15px;
            font-weight: 600;
            color: #1a237e;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }

        .container { padding: 16px 20px; max-width: 100%; overflow-x: auto; }

        .toolbar {
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .toolbar h2 { font-size: 16px; color: #1a237e; margin-right: auto; }
        .btn { padding: 6px 14px; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-nav  { background: #e8eaf6; color: #1a237e; }
        .btn-nav:hover { background: #c5cae9; }
        .btn-today { background: #1976d2; color: white; }
        .btn-today:hover { background: #1565c0; }

        /* Таблиця */
        .table-wrap { overflow-x: auto; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        table { border-collapse: collapse; background: white; min-width: 100%; }
        thead tr:first-child th { background: #1a237e; color: white; font-size: 12px; padding: 8px 4px; }
        thead tr:last-child th  { background: #283593; color: #c5cae9; font-size: 11px; padding: 4px 2px; }

        .col-num  { width: 32px; min-width: 32px; }
        .col-name { width: 160px; min-width: 140px; text-align: left !important; padding-left: 8px !important; }
        .col-rank { width: 110px; min-width: 100px; text-align: left !important; padding-left: 6px !important; }
        .col-day  { width: 36px; min-width: 32px; }
        .col-sum  { width: 42px; min-width: 38px; background: #e8eaf6 !important; }

        td { padding: 2px; text-align: center; border-bottom: 1px solid #f0f0f0; border-right: 1px solid #f5f5f5; font-size: 12px; }
        td.name-cell { text-align: left; padding: 4px 6px 4px 8px; font-size: 12px; white-space: nowrap; }
        td.rank-cell { text-align: left; padding: 4px 4px 4px 6px; font-size: 11px; color: #555; white-space: nowrap; }
        td.num-cell  { color: #999; font-size: 11px; }
        td.sum-cell  { background: #f3f4fd; font-size: 11px; color: #1a237e; font-weight: 600; }
        tr:hover td { background: #fafbff; }
        tr:hover td.sum-cell { background: #e8eaf6; }

        /* Клітинка дня */
        .day-cell {
            cursor: pointer;
            position: relative;
            height: 28px;
            vertical-align: middle;
        }
        .day-cell:hover { background: #e3f2fd !important; }
        .day-cell.weekend { background: #fff8f0; }
        .day-cell.today-col { background: #fffde7 !important; }

        .cell-badge {
            display: inline-block;
            padding: 1px 3px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            line-height: 1.4;
            white-space: nowrap;
        }

        /* Кольори статусів */
        .s-БЧ     { background: #ffcdd2; color: #b71c1c; }
        .s-БЧ_БАТ { background: #ef9a9a; color: #7f0000; }
        .s-БЧ_РКП { background: #ffab91; color: #bf360c; }
        .s-Р-НЯ   { background: #c8e6c9; color: #1b5e20; }
        .s-В-НЯ   { background: #bbdefb; color: #0d47a1; }
        .s-В-КА   { background: #b3e5fc; color: #01579b; }
        .s-ХВ     { background: #f8bbd0; color: #880e4f; }
        .s-СЗЧ    { background: #ffe0b2; color: #e65100; }
        .s-ПЛЮ   { background: #e1bee7; color: #4a148c; }
        .s-ППД    { background: #dcedc8; color: #33691e; }
        .s-НАВ    { background: #fff9c4; color: #f57f17; }
        .s-ПЕРЕВ  { background: #cfd8dc; color: #37474f; }

        /* Dropdown меню вибору статусу */
        .status-menu {
            display: none;
            position: fixed;
            z-index: 500;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            padding: 6px;
            min-width: 160px;
        }
        .status-menu.open { display: block; }
        .status-menu-title {
            font-size: 11px;
            color: #999;
            padding: 4px 6px 6px;
            border-bottom: 1px solid #eee;
            margin-bottom: 4px;
        }
        .status-option {
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-option:hover { opacity: 0.85; }
        .status-option .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-option.clear {
            background: #f5f5f5;
            color: #999;
            font-weight: 400;
        }

        /* Легенда */
        .legend {
            background: white;
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .legend-title { font-size: 12px; color: #666; margin-right: 4px; }
        .legend-item {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 3px;
        }

        .toast {
            position: fixed; bottom: 20px; right: 20px;
            padding: 10px 18px; border-radius: 6px; color: white;
            font-size: 13px; font-weight: 600;
            opacity: 0; transition: opacity 0.3s; z-index: 9999;
        }
        .toast.show { opacity: 1; }
        .toast.ok  { background: #2e7d32; }
        .toast.err { background: #c62828; }
    </style>
    <link th:replace="~{fragments :: sidebar-css}">
</head>
<body>
<div class="layout">
<div th:replace="~{fragments :: sidebar('schedule')}"></div>
<div class="main-content">


<div class="container">
    <div class="toolbar">
        <button class="btn btn-nav" id="prevBtn">◀</button>
        <button class="btn btn-today" id="todayBtn">Сьогодні</button>
        <button class="btn btn-nav" id="nextBtn">▶</button>
        <h2 id="monthTitle">—</h2>
    </div>

    <div class="table-wrap">
        <table id="scheduleTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody">
                <tr><td colspan="40" style="text-align:center;padding:32px;color:#999">Завантаження...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="legend" id="legend"></div>
</div>

<!-- Dropdown меню статусу -->
<div class="status-menu" id="statusMenu">
    <div class="status-menu-title" id="menuTitle">Обрати статус</div>
</div>

<div class="toast" id="toast"></div>

<script>
const STATUSES = [
    { code: 'БЧ',      label: 'БЧ',        color: '#ffcdd2', text: '#b71c1c' },
    { code: 'БЧ БАТ',  label: 'БЧ Бат',    color: '#ef9a9a', text: '#7f0000' },
    { code: 'БЧ РКП',  label: 'БЧ РКП',    color: '#ffab91', text: '#bf360c' },
    { code: 'Р-НЯ',    label: 'Р-ня',       color: '#c8e6c9', text: '#1b5e20' },
    { code: 'В-НЯ',    label: 'В-ня',       color: '#bbdefb', text: '#0d47a1' },
    { code: 'В-КА',    label: 'В-ка',       color: '#b3e5fc', text: '#01579b' },
    { code: 'ХВ',      label: 'Х-й',        color: '#f8bbd0', text: '#880e4f' },
    { code: 'СЗЧ',     label: 'СЗЧ',        color: '#ffe0b2', text: '#e65100' },
    { code: 'ПЛЮ',     label: 'Плюс',       color: '#e1bee7', text: '#4a148c' },
    { code: 'ППД',     label: 'ППД',        color: '#dcedc8', text: '#33691e' },
    { code: 'НАВ',     label: 'Навчання',   color: '#fff9c4', text: '#f57f17' },
    { code: 'ПЕРЕВ',   label: 'Перевівся',  color: '#cfd8dc', text: '#37474f' },
];

const STATUS_MAP = {};
STATUSES.forEach(s => STATUS_MAP[s.code] = s);

const UA_MONTHS = ['Січень','Лютий','Березень','Квітень','Травень','Червень',
                   'Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
const UA_DAYS   = ['Нд','Пн','Вт','Ср','Чт','Пт','Сб'];

let currentYear, currentMonth;
let tableData = [];
let menuTarget = null; // { personnelId, day, date, cell }

// ===== ІНІЦІАЛІЗАЦІЯ =====
const today = new Date();
currentYear  = today.getFullYear();
currentMonth = today.getMonth() + 1;
buildLegend();
loadMonth();

// ===== НАВІГАЦІЯ =====
document.getElementById('prevBtn').onclick = () => { shiftMonth(-1); };
document.getElementById('nextBtn').onclick = () => { shiftMonth(+1); };
document.getElementById('todayBtn').onclick = () => {
    currentYear  = today.getFullYear();
    currentMonth = today.getMonth() + 1;
    loadMonth();
};

function shiftMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
    loadMonth();
}

// ===== ЗАВАНТАЖЕННЯ =====
async function loadMonth() {
    document.getElementById('monthTitle').textContent =
        UA_MONTHS[currentMonth - 1] + ' ' + currentYear;

    const res = await fetch(`/schedule/api?year=${currentYear}&month=${currentMonth}`);
    if (!res.ok) { showToast('Помилка завантаження', 'err'); return; }
    tableData = await res.json();
    renderTable();
}

// ===== РЕНДЕР ТАБЛИЦІ =====
function renderTable() {
    const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();

    // --- ЗАГОЛОВОК ---
    let headRow1 = `<tr>
        <th class="col-num">#</th>
        <th class="col-name" style="text-align:left">ПІБ</th>
        <th class="col-rank" style="text-align:left">Звання</th>`;

    for (let d = 1; d <= daysInMonth; d++) {
        const dow = new Date(currentYear, currentMonth - 1, d).getDay();
        const isWE = (dow === 0 || dow === 6);
        const isTod = (currentYear === today.getFullYear() &&
                       currentMonth === today.getMonth() + 1 &&
                       d === today.getDate());
        headRow1 += `<th class="col-day${isWE ? ' weekend' : ''}${isTod ? ' today-col' : ''}"
                         style="font-size:11px;padding:4px 2px">${d}</th>`;
    }
    headRow1 += `<th class="col-sum" style="font-size:10px">Разом</th></tr>`;

    let headRow2 = `<tr><th></th><th></th><th></th>`;
    for (let d = 1; d <= daysInMonth; d++) {
        const dow = new Date(currentYear, currentMonth - 1, d).getDay();
        headRow2 += `<th style="font-size:9px;color:#90caf9">${UA_DAYS[dow]}</th>`;
    }
    headRow2 += `<th></th></tr>`;

    document.getElementById('tableHead').innerHTML = headRow1 + headRow2;

    // --- ТІЛО ---
    if (!tableData.length) {
        document.getElementById('tableBody').innerHTML =
            `<tr><td colspan="${daysInMonth + 4}" style="text-align:center;padding:32px;color:#999">Особовий склад порожній</td></tr>`;
        return;
    }

    let html = '';
    tableData.forEach((row, idx) => {
        let totalDays = Object.values(row.days).filter(v => v !== '').length;
        let rowHtml = `<tr>
            <td class="num-cell">${idx + 1}</td>
            <td class="name-cell">${row.shortName}</td>
            <td class="rank-cell">${row.rank}</td>`;

        for (let d = 1; d <= daysInMonth; d++) {
            const status = row.days[d] || '';
            const dow = new Date(currentYear, currentMonth - 1, d).getDay();
            const isWE = (dow === 0 || dow === 6);
            const isTod = (currentYear === today.getFullYear() &&
                           currentMonth === today.getMonth() + 1 &&
                           d === today.getDate());
            const dateStr = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const cls = `day-cell${isWE ? ' weekend' : ''}${isTod ? ' today-col' : ''}`;

            let badge = '';
            if (status) {
                const s = STATUS_MAP[status];
                const cssClass = 's-' + status.replace(' ', '_');
                if (s) {
                    badge = `<span class="cell-badge ${cssClass}">${s.label}</span>`;
                } else {
                    badge = `<span class="cell-badge" style="background:#eee;color:#333">${status}</span>`;
                }
            }

            rowHtml += `<td class="${cls}"
                            data-pid="${row.id}"
                            data-day="${d}"
                            data-date="${dateStr}"
                            data-status="${status}"
                            onclick="openMenu(event, this)">${badge}</td>`;
        }

        rowHtml += `<td class="sum-cell">${totalDays || ''}</td></tr>`;
        html += rowHtml;
    });

    document.getElementById('tableBody').innerHTML = html;
}

// ===== МЕНЮ ВИБОРУ СТАТУСУ =====
const menu = document.getElementById('statusMenu');

function openMenu(e, cell) {
    e.stopPropagation();
    menuTarget = {
        personnelId: cell.dataset.pid,
        date: cell.dataset.date,
        current: cell.dataset.status,
        cell
    };

    // Будуємо меню
    const name = cell.closest('tr').querySelector('.name-cell').textContent;
    const day  = cell.dataset.day;
    document.getElementById('menuTitle').textContent = `${name} — ${day} ${UA_MONTHS[currentMonth-1]}`;

    let optionsHtml = '';
    STATUSES.forEach(s => {
        optionsHtml += `<div class="status-option"
            style="background:${s.color};color:${s.text}"
            onclick="selectStatus('${s.code}')">
            <span class="dot" style="background:${s.text}"></span>
            ${s.label}
        </div>`;
    });
    optionsHtml += `<div class="status-option clear" onclick="selectStatus('')">✕ Очистити</div>`;

    menu.querySelector('.status-menu-title').nextSibling && menu.querySelectorAll('.status-option').forEach(el => el.remove());
    menu.innerHTML = `<div class="status-menu-title">${document.getElementById('menuTitle').textContent}</div>` + optionsHtml;

    // Позиціонуємо
    const rect = cell.getBoundingClientRect();
    let left = rect.left + window.scrollX;
    let top  = rect.bottom + window.scrollY + 2;
    if (left + 170 > window.innerWidth) left = window.innerWidth - 175;
    if (top + 400 > window.innerHeight + window.scrollY) top = rect.top + window.scrollY - 410;

    menu.style.left = left + 'px';
    menu.style.top  = top + 'px';
    menu.classList.add('open');
}

async function selectStatus(code) {
    menu.classList.remove('open');
    if (!menuTarget) return;

    const { personnelId, date, cell } = menuTarget;

    try {
        const res = await fetch('/schedule/api/cell', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ personnelId, date, status: code })
        });

        if (!res.ok) { showToast('Помилка збереження', 'err'); return; }

        // Оновлюємо локальні дані
        const row = tableData.find(r => String(r.id) === String(personnelId));
        const day = parseInt(cell.dataset.day);
        if (row) row.days[day] = code;

        // Оновлюємо клітинку без перерендеру всієї таблиці
        cell.dataset.status = code;
        if (code) {
            const s = STATUS_MAP[code];
            const cssClass = 's-' + code.replace(' ', '_');
            cell.innerHTML = `<span class="cell-badge ${cssClass}">${s ? s.label : code}</span>`;
        } else {
            cell.innerHTML = '';
        }

        // Оновлюємо колонку "Разом"
        const tr = cell.closest('tr');
        const totalDays = Object.values(row.days).filter(v => v !== '').length;
        tr.querySelector('.sum-cell').textContent = totalDays || '';

    } catch (err) {
        showToast('Помилка мережі', 'err');
    }
    menuTarget = null;
}

// Закрити меню при кліку поза ним
document.addEventListener('click', () => menu.classList.remove('open'));

// ===== ЛЕГЕНДА =====
function buildLegend() {
    const el = document.getElementById('legend');
    let html = '<span class="legend-title">Позначення:</span>';
    STATUSES.forEach(s => {
        html += `<span class="legend-item s-${s.code.replace(' ','_')}">${s.label}</span>`;
    });
    el.innerHTML = html;
}

// ===== УТИЛІТИ =====
function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</div>
</div>
<div th:replace="~{fragments :: sidebar-js}"></div>
</body>
</html>
