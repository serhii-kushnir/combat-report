<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="sidebar-css">
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ========== CSS ЗМІННІ ДЛЯ ТЕМ ========== */
        :root {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --bg-header: #1a237e;
            --bg-input: #ffffff;
            --bg-editable: #f8f9fa;
            --bg-hover: #f5f9ff;
            --bg-modal: rgba(0,0,0,0.5);
            --bg-sidebar: #1a237e;
            --bg-sidebar-hover: rgba(255,255,255,0.08);
            --bg-sidebar-active: rgba(255,255,255,0.12);
            --bg-toolbar: #ffffff;
            --bg-table-header: #1a237e;
            --bg-table-hover: #f5f9ff;
            --bg-btn-primary: #1976d2;
            --bg-btn-primary-hover: #1565c0;
            --text-primary: #222222;
            --text-secondary: #555555;
            --text-light: #888888;
            --text-white: #ffffff;
            --text-sidebar: #c5cae9;
            --text-sidebar-active: #ffffff;
            --border-color: #e0e0e0;
            --shadow-color: rgba(0,0,0,0.1);
            --toast-success: #2e7d32;
            --toast-error: #c62828;
        }

        body.dark-theme {
            --bg-body: #1e1e24;
            --bg-card: #2d2d35;
            --bg-header: #2a2a3a;
            --bg-input: #3a3a44;
            --bg-editable: #3a3a44;
            --bg-hover: #3f3f4a;
            --bg-modal: rgba(0,0,0,0.7);
            --bg-sidebar: #22222a;
            --bg-sidebar-hover: rgba(255,255,255,0.06);
            --bg-sidebar-active: rgba(255,255,255,0.1);
            --bg-toolbar: #2d2d35;
            --bg-table-header: #2a2a3a;
            --bg-table-hover: #3a3a44;
            --bg-btn-primary: #4a7ab5;
            --bg-btn-primary-hover: #5a8ac5;
            --text-primary: #e8e8ec;
            --text-secondary: #b0b0b8;
            --text-light: #88888f;
            --text-white: #ffffff;
            --text-sidebar: #9a9aaa;
            --text-sidebar-active: #ffffff;
            --border-color: #3d3d48;
            --shadow-color: rgba(0,0,0,0.4);
            --toast-success: #2e7d32;
            --toast-error: #c62828;
        }

        /* ========== ВИПРАВЛЕННЯ ДЛЯ ТЕМНОЇ ТЕМИ – ПОЛЯ ВВОДУ ========== */
        body.dark-theme .info-value.editable,
        body.dark-theme .info-value.editable input,
        body.dark-theme .info-value.editable select,
        body.dark-theme .info-value.editable textarea {
            background: var(--bg-input) !important;
            color: var(--text-primary) !important;
        }
        body.dark-theme .info-value.editable input,
        body.dark-theme .info-value.editable select,
        body.dark-theme .info-value.editable textarea {
            background-color: var(--bg-input) !important;
            color: var(--text-primary) !important;
            border-color: var(--border-color) !important;
        }
        body.dark-theme .info-value.editable input::placeholder {
            color: #88888f;
        }

        /* ========== LAYOUT ========== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-body);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            font-family: 'Segoe UI', sans-serif;
        }
        .layout { display: flex; min-height: 100vh; }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 220px;
            background: var(--bg-sidebar);
            color: var(--text-sidebar);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            z-index: 100;
            box-shadow: 2px 0 8px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: width 0.25s ease;
        }
        .sidebar.collapsed { width: 52px; min-width: 52px; }

        /* --- ЛОГОТИП ТА КНОПКА --- */
        .sidebar-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 0 6px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .sidebar-logo .logo-icon {
            flex-shrink: 0;
            height: 32px;
            width: 32px;
            object-fit: contain;
            margin-bottom: 4px;
        }
        .sidebar-logo .logo-text-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.3s, height 0.3s;
            overflow: hidden;
        }
        .sidebar-logo .unit { font-size: 15px; font-weight: bold; color: white; }
        .sidebar-logo .sub  { font-size: 11px; color: #90caf9; margin-top: 2px; }

        /* Кнопка перемикання – на всю ширину */
        .toggle-btn {
            background: none;
            border: none;
            color: #90caf9;
            cursor: pointer;
            font-size: 18px;
            padding: 6px 0;
            width: 100%;
            text-align: center;
            transition: background 0.2s, color 0.2s;
            line-height: 1;
            margin-top: 4px;
        }
        .toggle-btn:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            transform: translateY(-2px);
        }

        /* --- СТАН ЗГОРНУТОГО САЙДБАРУ --- */
        .sidebar.collapsed .sidebar-logo {
            padding: 14px 0 6px;
        }
        .sidebar.collapsed .logo-text-block {
            opacity: 0;
            height: 0;
            pointer-events: none;
            margin: 0;
        }
        .sidebar.collapsed .toggle-btn {
            font-size: 20px;
            padding: 8px 0;
        }

        /* ========== НАВІГАЦІЯ ========== */
        .sidebar-nav { flex: 1; padding: 8px 0; overflow-y: auto; overflow-x: hidden; }

        .nav-section-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #5c6bc0;
            padding: 10px 16px 4px;
            white-space: nowrap;
            overflow: hidden;
            transition: opacity 0.2s, height 0.2s, padding 0.2s;
            height: 28px;
        }
        .sidebar.collapsed .nav-section-title { opacity: 0; height: 0; padding: 0; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 16px;
            color: var(--text-sidebar);
            text-decoration: none;
            font-size: 13px;
            border-left: 3px solid transparent;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            overflow: hidden;
        }
        .nav-item:hover { background: var(--bg-sidebar-hover); color: var(--text-sidebar-active); }
        .nav-item.active {
            background: var(--bg-sidebar-active);
            color: var(--text-sidebar-active);
            border-left-color: #90caf9;
            font-weight: 600;
        }

        /* ========== АНІМАЦІЯ ІКОНОК ПРИ НАВЕДЕННІ ========== */
        .nav-item .icon {
            font-size: 16px;
            width: 20px;
            text-align: center;
            flex-shrink: 0;
            display: inline-block;
            transition: transform 0.3s ease;
        }
        .nav-item:hover .icon {
            transform: translateY(-2px);
        }
        .nav-item.active .icon {
            transform: translateY(-2px);
        }

        .nav-item .label { transition: opacity 0.2s; }
        .sidebar.collapsed .nav-item .label { opacity: 0; width: 0; overflow: hidden; }
        .sidebar.collapsed .nav-item { justify-content: center; padding: 10px 0; }
        .sidebar.collapsed .nav-item.active { border-left-color: transparent; border-right: 3px solid #90caf9; }

        /* ========== SIDEBAR FOOTER ========== */
        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
            transition: padding 0.2s, opacity 0.2s;
            flex-shrink: 0;
            text-align: center;
        }
        .sidebar.collapsed .sidebar-footer { padding: 12px 0; }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #90caf9;
            padding: 4px 10px;
            border-radius: 4px;
            transition: background 0.3s, transform 0.3s;
            margin-bottom: 6px;
            display: inline-block;
            width: 100%;
        }
        .theme-toggle:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }
        .theme-toggle:active {
            transform: scale(0.9);
        }

        /* Версія – показуємо повний текст або тільки номер */
        .version {
            display: block;
            font-size: 11px;
            color: #5c6bc0;
            margin-top: 6px;
            white-space: nowrap;
            overflow: hidden;
            transition: opacity 0.2s, height 0.2s, margin 0.2s;
        }
        .version .version-short {
            display: none;
        }
        .sidebar.collapsed .version .version-full {
            display: none;
        }
        .sidebar.collapsed .version .version-short {
            display: inline;
        }

        .logout-form {
            width: 100%;
            margin: 0 0 4px 0;
        }
        .logout-btn {
            background: none;
            border: none;
            color: #90caf9;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 6px 0;
            border-radius: 4px;
            transition: background 0.2s, transform 0.2s;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            /*transform: scale(1.02);*/
        }
        /*.logout-btn .logout-icon {*/
        /*    transition: transform 0.3s ease;*/
        /*}*/
        .logout-btn:hover .logout-icon {
            transform: translateY(-2px);
        }

        .sidebar.collapsed .logout-text { display: none; }
        .sidebar.collapsed .logout-icon { font-size: 18px; }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            margin-left: 220px;
            flex: 1;
            min-width: 0;
            background: var(--bg-body);
            min-height: 100vh;
            transition: margin-left 0.25s ease, background 0.3s;
        }
        .main-content.collapsed { margin-left: 52px; }

        /* ========== ГЛОБАЛЬНІ СТИЛІ ========== */
        .btn-primary {
            background: var(--bg-btn-primary);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            background: var(--bg-btn-primary-hover);
        }

        .card {
            background: var(--bg-card);
            box-shadow: 0 4px 12px var(--shadow-color);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .card-header {
            background: var(--bg-header);
            transition: background 0.3s;
        }
        .info-value {
            background: var(--bg-editable);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }
        .info-value:hover {
            background: var(--bg-hover);
        }
        .info-value.editable {
            background: var(--bg-input);
            border-color: var(--border-color);
        }
        .info-value.editable input,
        .info-value.editable select,
        .info-value.editable textarea {
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .sub-table th {
            background: var(--bg-table-header);
            color: white;
            transition: background 0.3s;
        }
        .sub-table td {
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .sub-table tr:hover td {
            background: var(--bg-table-hover);
        }
        .modal {
            background: var(--bg-card);
            color: var(--text-primary);
        }
        .modal-overlay {
            background: var(--bg-modal);
        }
        input, select, textarea {
            background: var(--bg-input);
            color: var(--text-primary);
            border-color: var(--border-color);
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        .section-title {
            color: var(--text-primary);
        }
        .toolbar {
            background: var(--bg-toolbar);
            box-shadow: 0 1px 4px var(--shadow-color);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .toast.success { background: var(--toast-success); }
        .toast.error { background: var(--toast-error); }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; }

        .dark-theme .btn-secondary {
            background: #4a4a55;
            color: white;
        }
        .dark-theme .btn-secondary:hover {
            background: #5a5a65;
        }
        .dark-theme .btn-warning {
            background: #b87a2a;
            color: white;
        }
        .dark-theme .btn-warning:hover {
            background: #c88a3a;
        }
        .dark-theme .btn-danger {
            background: #a03040;
            color: white;
        }
        .dark-theme .btn-danger:hover {
            background: #b04050;
        }
        .dark-theme .btn-outline {
            border-color: rgba(255,255,255,0.3);
            color: #ccc;
        }
        .dark-theme .btn-outline:hover {
            background: rgba(255,255,255,0.1);
        }

        @media (max-width: 768px) {
            .sidebar { width: 52px; min-width: 52px; }
            .sidebar .logo-text-block { opacity: 0; height: 0; pointer-events: none; margin:0; }
            .sidebar .sidebar-logo { padding: 14px 0 6px; }
            .sidebar .toggle-btn { font-size: 20px; padding: 8px 0; }
            .sidebar .version .version-full { display: none; }
            .sidebar .version .version-short { display: inline; }
            .sidebar .nav-item .label { opacity: 0; width: 0; overflow: hidden; }
            .sidebar .nav-item { justify-content: center; padding: 10px 0; }
            .sidebar .nav-item.active { border-left-color: transparent; border-right: 3px solid #90caf9; }
            .sidebar .nav-section-title { opacity: 0; height: 0; padding: 0; }
            .sidebar .logout-text { display: none; }
            .sidebar .logout-icon { font-size: 18px; }
            .main-content { margin-left: 52px; }
        }
        .btn-print {
            background: #607d8b;
            color: white;
            padding: 7px 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-print:hover {
            background: #546e7a;
        }
        .dark-theme .btn-print {
            background: #4a5a6a;
            color: white;
        }
        .dark-theme .btn-print:hover {
            background: #5a6a7a;
        }
    </style>
</th:block>

<!-- ===== SIDEBAR HTML ===== -->
<div th:fragment="sidebar(activePage)" id="sidebar" class="sidebar">
    <div class="sidebar-logo">
        <!-- Іконка завжди видима -->
        <img src="/favicon.png" alt="Логотип" class="logo-icon">
        <!-- Текстовий блок -->
        <span class="logo-text-block">
            <div class="unit">БпЛА "СКОПА"</div>
            <div class="sub">Система управління</div>
        </span>
        <!-- Кнопка згортання/розгортання – на всю ширину -->
        <button class="toggle-btn" id="toggleBtn" title="Згорнути меню">☰</button>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section-title">Бойова робота</div>
        <a href="/" class="nav-item" th:classappend="${activePage == 'index' ? 'active' : ''}" title="Конвертер звітів">
            <span class="icon">📋</span>
            <span class="label">Конвертер звітів</span>
        </a>
        <a href="/flights" class="nav-item" th:classappend="${activePage == 'flights' ? 'active' : ''}" title="Журнал БпАК">
            <span class="icon">✈️</span>
            <span class="label">Журнал БпАК</span>
        </a>

        <a href="/combat-duty" class="nav-item" th:classappend="${activePage == 'combat-duty' ? 'active' : ''}" title="Бойове чергування">
            <span class="icon">⚔️</span>
            <span class="label">Бойове чергування</span>
        </a>

        <a href="/combat-schedule" class="nav-item" th:classappend="${activePage == 'combat-schedule' ? 'active' : ''}" title="БЧ Графік">
            <span class="icon">📊</span>
            <span class="label">БЧ Графік</span>
        </a>

        <div class="nav-section-title">Особовий склад</div>
        <a href="/personnel" class="nav-item" th:classappend="${activePage == 'personnel' ? 'active' : ''}" title="Особовий склад">
            <span class="icon">👥</span>
            <span class="label">Особовий склад</span>
        </a>
        <a href="/schedule" class="nav-item" th:classappend="${activePage == 'schedule' ? 'active' : ''}" title="Вечірння перевірка">
            <span class="icon">📅</span>
            <span class="label">Вечірння перевірка</span>
        </a>

        <div class="nav-section-title">Ресурси</div>
        <a href="/equipment" class="nav-item" th:classappend="${activePage == 'equipment' ? 'active' : ''}" title="Майно">
            <span class="icon">📦</span>
            <span class="label">Майно</span>
        </a>
        <a href="/notes" class="nav-item" th:classappend="${activePage == 'notes' ? 'active' : ''}" title="Нотатки">
            <span class="icon">📝</span>
            <span class="label">Нотатки</span>
        </a>
    </nav>

    <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" title="Перемкнути тему">🌙</button>
        <form action="/logout" method="post" class="logout-form">
            <button type="submit" class="logout-btn">
                <span class="logout-icon">🚪</span>
                <span class="logout-text">Вийти</span>
            </button>
        </form>
        <span class="version">
            <span class="version-full">v1.2 - by Serhii Kushnir</span>
            <span class="version-short">v1.2</span>
        </span>
    </div>
</div>

<!-- ===== SIDEBAR JS ===== -->
<th:block th:fragment="sidebar-js">
    <script>
        (function() {
            var sidebar = document.getElementById('sidebar');
            var btn     = document.getElementById('toggleBtn');
            var main    = document.querySelector('.main-content');
            var KEY     = 'sidebar_collapsed';

            if (!sidebar) { console.error('Сайдбар не знайдено!'); return; }
            if (!btn) { console.error('Кнопка toggle не знайдена!'); return; }

            function applyState(collapsed) {
                if (collapsed) {
                    sidebar.classList.add('collapsed');
                    sidebar.style.width = '52px';
                    sidebar.style.minWidth = '52px';
                    if (main) { main.classList.add('collapsed'); main.style.marginLeft = '52px'; }
                    btn.title = 'Розгорнути меню';
                } else {
                    sidebar.classList.remove('collapsed');
                    sidebar.style.width = '220px';
                    sidebar.style.minWidth = '';
                    if (main) { main.classList.remove('collapsed'); main.style.marginLeft = '220px'; }
                    btn.title = 'Згорнути меню';
                }
                console.log('Стан сайдбару:', collapsed ? 'згорнуто' : 'розгорнуто');
            }

            // За замовчуванням – згорнуто, якщо в localStorage немає значення
            var stored = localStorage.getItem(KEY);
            var initialCollapsed = (stored === null) ? '1' : stored;

            sidebar.style.transition = 'none';
            if (main) main.style.transition = 'none';
            applyState(initialCollapsed === '1');
            setTimeout(function() {
                sidebar.style.transition = '';
                if (main) main.style.transition = '';
            }, 50);

            btn.addEventListener('click', function() {
                console.log('Клік по кнопці!');
                var collapsed = !sidebar.classList.contains('collapsed');
                localStorage.setItem(KEY, collapsed ? '1' : '0');
                applyState(collapsed);
            });

            // ===== ТЕМА =====
            var themeToggle = document.getElementById('themeToggle');
            if (themeToggle) {
                var savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark') {
                    document.body.classList.add('dark-theme');
                    themeToggle.textContent = '☀️';
                }

                themeToggle.addEventListener('click', function() {
                    var isDark = document.body.classList.toggle('dark-theme');
                    this.textContent = isDark ? '☀️' : '🌙';
                    localStorage.setItem('theme', isDark ? 'dark' : 'light');
                });
            }
        })();
    </script>
</th:block>
</html>
