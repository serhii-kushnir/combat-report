<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Журнал БпАК</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        /* ===== CSS ЗМІННІ ===== */
        :root {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --bg-toolbar: #ffffff;
            --bg-table: #ffffff;
            --bg-table-header: #1a237e;
            --bg-input: #ffffff;
            --bg-modal: rgba(0,0,0,0.5);
            --bg-hover: #f5f9ff;
            --bg-confirm: #ffffff;
            --bg-stat: #ffffff;
            --bg-badge-success: #e8f5e9;
            --bg-badge-warning: #fff3e0;
            --bg-row-success: #e8f5e9;
            --bg-row-success-span: #c8e6c9;
            --text-primary: #222222;
            --text-secondary: #555555;
            --text-light: #999999;
            --text-white: #ffffff;
            --text-muted: #666666;
            --text-note: #666666;
            --text-loss-reason: #c62828;
            --border-color: #ccc;
            --border-light: #f0f0f0;
            --shadow-color: rgba(0,0,0,0.1);
            --shadow-strong: rgba(0,0,0,0.2);
            --toast-success: #2e7d32;
            --toast-error: #c62828;
            --badge-success-text: #2e7d32;
            --badge-warning-text: #e65100;
            --stat-num-color: #1976d2;
            --stat-num-hits: #2e7d32;
            --stat-num-loss: #d32f2f;
            --topbar-color: #1a237e;
            --btn-primary-bg: #1976d2;
            --btn-primary-hover: #1565c0;
            --btn-success-bg: #388e3c;
            --btn-success-hover: #2e7d32;
            --btn-warning-bg: #f57c00;
            --btn-warning-hover: #e65100;
            --btn-danger-bg: #d32f2f;
            --btn-danger-hover: #b71c1c;
        }

        /* Темна тема */
        body.dark-theme {
            --bg-body: #1e1e24;
            --bg-card: #2d2d35;
            --bg-toolbar: #2d2d35;
            --bg-table: #2d2d35;
            --bg-table-header: #2a2a3a;
            --bg-input: #3a3a44;
            --bg-modal: rgba(0,0,0,0.7);
            --bg-hover: #3a3a44;
            --bg-confirm: #2d2d35;
            --bg-stat: #2d2d35;
            --bg-badge-success: #1a3a1a;
            --bg-badge-warning: #3a2a1a;
            --bg-row-success: #1a2a1a;
            --bg-row-success-span: #1a3a1a;
            --text-primary: #e8e8ec;
            --text-secondary: #b0b0b8;
            --text-light: #88888f;
            --text-white: #ffffff;
            --text-muted: #a0a0a8;
            --text-note: #b0b0b8;
            --text-loss-reason: #ef9a9a;
            --border-color: #3d3d48;
            --border-light: #3d3d48;
            --shadow-color: rgba(0,0,0,0.4);
            --shadow-strong: rgba(0,0,0,0.5);
            --badge-success-text: #81c784;
            --badge-warning-text: #ffb74d;
            --stat-num-color: #5a8ac5;
            --stat-num-hits: #81c784;
            --stat-num-loss: #ef9a9a;
            --topbar-color: #90caf9;
            --btn-primary-bg: #4a7ab5;
            --btn-primary-hover: #5a8ac5;
            --btn-success-bg: #3a6a3a;
            --btn-success-hover: #4a7a4a;
            --btn-warning-bg: #b87a2a;
            --btn-warning-hover: #c88a3a;
            --btn-danger-bg: #a03040;
            --btn-danger-hover: #b04050;
        }

        /* ===== ОСНОВНІ СТИЛІ ===== */
        .topbar {
            background: var(--bg-card);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 15px;
            font-weight: 600;
            color: var(--topbar-color);
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            margin: 0;
        }
        .container { padding: 16px 20px; }

        /* ===== ТУЛБАР ===== */
        .toolbar {
            background: var(--bg-toolbar);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 1px 4px var(--shadow-color);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .btn {
            padding: 7px 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--btn-primary-bg);
            color: var(--text-white);
        }
        .btn-primary:hover { background: var(--btn-primary-hover); }
        .btn-success {
            background: var(--btn-success-bg);
            color: var(--text-white);
        }
        .btn-success:hover { background: var(--btn-success-hover); }
        .btn-warning {
            background: var(--btn-warning-bg);
            color: var(--text-white);
        }
        .btn-warning:hover { background: var(--btn-warning-hover); }
        .btn-danger {
            background: var(--btn-danger-bg);
            color: var(--text-white);
        }
        .btn-danger:hover { background: var(--btn-danger-hover); }
        .btn-sm { padding: 4px 9px; font-size: 11px; }

        /* ===== ПОЛЯ ВВОДУ ===== */
        select, input[type=text], input[type=number], input[type=date], input[type=time] {
            padding: 7px 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }

        /* ===== СТАТИСТИКА ===== */
        .stats {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: var(--bg-stat);
            border-radius: 8px;
            padding: 10px 16px;
            text-align: center;
            box-shadow: 0 1px 4px var(--shadow-color);
            min-width: 100px;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .stat-card .num {
            font-size: 26px;
            font-weight: bold;
            color: var(--stat-num-color);
            transition: color 0.3s;
        }
        .stat-card .lbl {
            font-size: 11px;
            color: var(--text-secondary);
            transition: color 0.3s;
        }

        /* ===== ТАБЛИЦЯ ===== */
        .table-wrap {
            overflow-x: auto;
            border-radius: 8px;
            box-shadow: 0 1px 4px var(--shadow-color);
            transition: box-shadow 0.3s;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-table);
            min-width: 1200px;
            transition: background 0.3s;
        }
        thead {
            background: var(--bg-table-header);
            color: var(--text-white);
            transition: background 0.3s;
        }
        th {
            padding: 9px 8px;
            font-size: 12px;
            font-weight: 600;
            text-align: left;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }
        th:hover { background: var(--bg-hover); }
        th.sort-asc::after { content: ' ▲'; font-size: 10px; }
        th.sort-desc::after { content: ' ▼'; font-size: 10px; }

        td {
            padding: 7px 8px;
            font-size: 12px;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-primary);
            vertical-align: top;
            transition: border-color 0.3s, color 0.3s;
        }
        tr:hover td { background: var(--bg-hover); }
        .actions-col { white-space: nowrap; }

        .badge-success {
            background: var(--bg-badge-success);
            color: var(--badge-success-text);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            transition: background 0.3s, color 0.3s;
        }
        .badge-warning {
            background: var(--bg-badge-warning);
            color: var(--badge-warning-text);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            transition: background 0.3s, color 0.3s;
        }

        .row-success td {
            background: var(--bg-row-success) !important;
            transition: background 0.3s;
        }
        .row-success td span {
            background: var(--bg-row-success-span) !important;
            color: var(--badge-success-text) !important;
            transition: background 0.3s, color 0.3s;
        }

        /* ===== МОДАЛЬНЕ ВІКНО ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-modal);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 24px;
            width: 700px;
            max-width: 96vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px var(--shadow-strong);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .modal h2 {
            margin: 0 0 18px;
            font-size: 17px;
            color: var(--text-primary);
            transition: color 0.3s;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .form-group.full { grid-column: 1 / -1; }
        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: color 0.3s;
        }
        .form-group input, .form-group select, .form-group textarea {
            padding: 7px 9px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        .form-group textarea { height: 80px; resize: vertical; }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 18px;
        }

        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-modal);
            z-index: 1100;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .confirm-overlay.open { display: flex; }
        .confirm-box {
            background: var(--bg-confirm);
            border-radius: 10px;
            padding: 24px;
            width: 340px;
            box-shadow: 0 8px 32px var(--shadow-strong);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .confirm-box p {
            margin: 0 0 16px;
            color: var(--text-primary);
        }
        .confirm-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 18px;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 9999;
        }
        .toast.show { opacity: 1; }
        .toast.ok { background: var(--toast-success); }
        .toast.err { background: var(--toast-error); }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
            transition: color 0.3s;
        }

        .note-cell {
            max-height: 60px;
            overflow: hidden;
            cursor: pointer;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            transition: max-height 0.2s ease, color 0.3s;
        }
        .note-cell.expanded {
            max-height: 500px;
            -webkit-line-clamp: unset;
            display: block;
        }
        .note-cell:hover { color: var(--btn-primary-bg); }

        /* Додаткові стилі для темної теми */
        .dark-theme .toast.ok { background: var(--toast-success); }
        .dark-theme .toast.err { background: var(--toast-error); }
        .dark-theme .stat-card .num[style*="color:#2e7d32"] { color: var(--stat-num-hits) !important; }
        .dark-theme .stat-card .num[style*="color:#d32f2f"] { color: var(--stat-num-loss) !important; }
        .dark-theme td[style*="color:#c62828"] { color: var(--text-loss-reason) !important; }
        .dark-theme td[style*="color:#666"] { color: var(--text-note) !important; }
        /* ===== КНОПКА ДРУК ===== */
        .btn-print {
            background: #607d8b;
            color: white;
            padding: 7px 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-print:hover {
            background: #546e7a;
        }
        .dark-theme .btn-print {
            background: #4a5a6a;
            color: white;
        }
        .dark-theme .btn-print:hover {
            background: #5a6a7a;
        }

        /* ===== СТИЛІ ДЛЯ ДРУКУ ===== */
        @media print {
            /* Ховаємо всі елементи інтерфейсу */
            .sidebar,
            .toolbar,
            .stats,
            .no-print,
            .btn,
            .btn-print,
            .btn-success,
            .btn-warning,
            select,
            input,
            .status-menu {
                display: none !important;
            }
            body {
                background: white !important;
                color: black !important;
                font-size: 10px !important;
            }
            .main-content {
                margin-left: 0 !important;
                padding: 0 !important;
            }
            .container {
                padding: 10px !important;
                max-width: 100% !important;
            }
            .table-wrap {
                box-shadow: none !important;
                border: 1px solid #ccc !important;
                border-radius: 0 !important;
                overflow-x: visible !important;
            }
            table {
                background: white !important;
                width: 100% !important;
                border-collapse: collapse;
                font-size: 8px !important;
            }
            thead {
                background: #1a237e !important;
                color: white !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            thead th {
                background: #1a237e !important;
                color: white !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                padding: 4px 4px !important;
                font-size: 8px !important;
                border: 1px solid #1a237e !important;
                text-align: center !important;
            }
            td {
                color: black !important;
                border: 1px solid #ddd !important;
                font-size: 7px !important;
                padding: 3px 3px !important;
                line-height: 1.3 !important;
                background: white !important;
                text-align: center !important;
            }
            tr {
                page-break-inside: avoid;
            }
            /* Скасовуємо sticky для друку */
            .col-num,
            .col-rank,
            .col-name,
            .num-cell,
            .rank-cell,
            .name-cell {
                position: static !important;
                background: white !important;
                left: auto !important;
                z-index: auto !important;
                font-size: 7px !important;
                padding: 3px 3px !important;
                text-align: center !important;
            }
            /* Рядки зі статусом "знищення" – зелений фон */
            .row-success td {
                background: #e8f5e9 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .badge-success {
                background: #c8e6c9 !important;
                color: #2e7d32 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                padding: 1px 4px !important;
                border-radius: 3px !important;
            }
            .badge-warning {
                background: #fff3e0 !important;
                color: #e65100 !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                padding: 1px 4px !important;
                border-radius: 3px !important;
            }
            .note-cell {
                max-height: none !important;
                -webkit-line-clamp: unset !important;
                display: block !important;
                overflow: visible !important;
                white-space: normal !important;
            }
            /* Колонка "Дії" – ховаємо */
            .actions-col,
            td:last-child,
            th:last-child {
                display: none !important;
            }
            /* Для темної теми */
            .dark-theme td {
                color: black !important;
                background: white !important;
            }
            .dark-theme thead {
                background: #1a237e !important;
                color: white !important;
            }
            .dark-theme thead th {
                background: #1a237e !important;
                color: white !important;
            }
            .dark-theme .row-success td {
                background: #e8f5e9 !important;
            }
            @page {
                size: landscape;
                margin: 5mm 4mm 5mm 4mm;
            }
        }
    </style>
    <link th:replace="~{fragments :: sidebar-css}">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments :: sidebar('flights')}"></div>
    <div class="main-content">
        <div class="container">
            <div class="toolbar">
                <select id="yearFilter">
                    <option value="">— Всі роки —</option>
                </select>
                <select id="monthFilter">
                    <option value="">— Всі місяці —</option>
                </select>
                <input type="text" id="searchInput" placeholder="🔍 Пошук..." style="width:180px">
                <button class="btn btn-success" onclick="openAddModal()">+ Додати запис</button>
                <button class="btn btn-warning" onclick="exportXlsx()">📤 Експорт xlsx</button>
                <button class="btn btn-print" onclick="window.print()">
                    <i class="fas fa-print"></i> Друк
                </button>
            </div>

            <div class="stats" id="statsBar"></div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th style="width:36px" data-col="num" onclick="sortBy('num')">№</th>
                        <th style="width:86px" data-col="date" onclick="sortBy('date')">Дата</th>
                        <th style="width:75px" data-col="crew" onclick="sortBy('crew')">Екіпаж</th>
                        <th style="width:130px" data-col="event" onclick="sortBy('event')">Подія</th>
                        <th style="width:62px" data-col="takeoff" onclick="sortBy('takeoff')">Час взльоту</th>
                        <th style="width:62px" data-col="loss" onclick="sortBy('loss')">Час втрати</th>
                        <th style="width:120px" data-col="coords" onclick="sortBy('coords')">Координати</th>
                        <th style="width:55px">Азимут (°)</th>
                        <th style="width:75px" data-col="dist" onclick="sortBy('dist')">Відстань (м)</th>
                        <th style="width:70px">Вис. польоту (м)</th>
                        <th style="width:120px" data-col="weapon" onclick="sortBy('weapon')">Засіб ураження</th>
                        <th style="width:130px" data-col="explos" onclick="sortBy('explos')">Вибухівка</th>
                        <th style="width:130px" data-col="det" onclick="sortBy('det')">Детонатор</th>
                        <th style="width:70px" data-col="targetAlt" onclick="sortBy('targetAlt')">Висота цілі (м)</th>
                        <th style="width:120px" data-col="target" onclick="sortBy('target')">Ціль</th>
                        <th style="width:80px" data-col="speed" onclick="sortBy('speed')">Швидкість цілі (км/год)</th>
                        <th style="width:130px" data-col="loss_reason" onclick="sortBy('loss_reason')">Причина втрати</th>
                        <th style="width:280px" data-col="note" onclick="sortBy('note')">Примітка</th>
                        <th style="width:55px">Дії</th>
                    </tr>
                    </thead>
                    <tbody id="tableBody">
                    <tr><td colspan="19" class="empty-state">Завантаження...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Форма додавання/редагування -->
        <div class="modal-overlay" id="formModal">
            <div class="modal">
                <h2 id="modalTitle">Додати запис</h2>
                <input type="hidden" id="editId">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Порядковий №</label>
                        <input type="number" id="fNum" placeholder="1">
                    </div>
                    <div class="form-group">
                        <label>Дата</label>
                        <input type="date" id="fDate">
                    </div>
                    <div class="form-group">
                        <label>Екіпаж</label>
                        <input type="text" id="fCrew" placeholder="СКОПА">
                    </div>
                    <div class="form-group">
                        <label>Місяць (лист)</label>
                        <input type="text" id="fMonth" placeholder="Травень">
                    </div>
                    <div class="form-group full">
                        <label>Подія</label>
                        <input type="text" id="fEvent" placeholder="Підрив по цілі">
                    </div>
                    <div class="form-group">
                        <label>Час взльоту</label>
                        <input type="time" id="fTakeoff">
                    </div>
                    <div class="form-group">
                        <label>Час втрати/підриву</label>
                        <input type="time" id="fLoss">
                    </div>
                    <div class="form-group full">
                        <label>Координати</label>
                        <input type="text" id="fCoords" placeholder="46.482 N, 30.723 E">
                    </div>
                    <div class="form-group">
                        <label>Азимут (°)</label>
                        <input type="number" id="fAzimuth" placeholder="50" min="0" max="360">
                    </div>
                    <div class="form-group">
                        <label>Відстань (м)</label>
                        <input type="number" id="fDist" placeholder="10000">
                    </div>
                    <div class="form-group">
                        <label>Висота польоту (м)</label>
                        <input type="number" id="fFlightAlt" placeholder="2042">
                    </div>
                    <div class="form-group">
                        <label>Тип цілі</label>
                        <input type="text" id="fType" placeholder="БпЛА крило">
                    </div>
                    <div class="form-group">
                        <label>Ідентифікація</label>
                        <input type="text" id="fIdent" placeholder="Дружній">
                    </div>
                    <div class="form-group">
                        <label>Засіб ураження</label>
                        <input type="text" id="fWeapon" placeholder="AS3 Merops (нічний)">
                    </div>
                    <div class="form-group">
                        <label>Вибухівка</label>
                        <input type="text" id="fExplosive" placeholder="3-1.2 КУФ 1,2 кг">
                    </div>
                    <div class="form-group">
                        <label>Детонатор</label>
                        <input type="text" id="fDetonator" placeholder="Розумна плата ініціації">
                    </div>
                    <div class="form-group">
                        <label>Висота польоту (м)</label>
                        <input type="text" id="fAltitude" placeholder="2042">
                    </div>
                    <div class="form-group">
                        <label>Висота цілі (м)</label>
                        <input type="number" id="fTargetAlt" placeholder="600">
                    </div>
                    <div class="form-group">
                        <label>Ціль</label>
                        <input type="text" id="fTarget" placeholder="Шахід 8241">
                    </div>
                    <div class="form-group">
                        <label>Швидкість цілі (км/год)</label>
                        <input type="number" id="fSpeed" placeholder="160">
                    </div>
                    <div class="form-group">
                        <label>Причина втрати</label>
                        <select id="fLossReason">
                            <option value="">— не вказано —</option>
                            <option>Відмова батареї</option>
                            <option>Втрата сигналу відео</option>
                            <option>Втрата керування</option>
                            <option>Знищення цілі, успішне застосування (камікадзе)</option>
                            <option>Збитий ціллю</option>
                            <option>Технічна несправність</option>
                            <option>РЕБ противника</option>
                            <option>Інше</option>
                        </select>
                    </div>
                    <div class="form-group full">
                        <label>Примітка</label>
                        <textarea id="fNote"></textarea>
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn" onclick="closeModal('formModal')" style="background:#eee">Скасувати</button>
                    <button class="btn btn-primary" onclick="saveRecord()">Зберегти</button>
                </div>
            </div>
        </div>

        <!-- Підтвердження видалення -->
        <div class="confirm-overlay" id="confirmModal">
            <div class="confirm-box">
                <p>Видалити цей запис?</p>
                <div class="confirm-actions">
                    <button class="btn" onclick="closeModal('confirmModal')" style="background:#eee">Скасувати</button>
                    <button class="btn btn-danger" id="confirmBtn">Видалити</button>
                </div>
            </div>
        </div>

        <div class="toast" id="toast"></div>

        <script>
            let allRecords = [];
            let sortCol   = null;
            let sortDir   = 1; // 1 = asc, -1 = desc
            let deleteTargetId = null;

            // ===== ІНІЦІАЛІЗАЦІЯ =====
            loadYears();
            loadMonths();
            loadRecords();

            async function loadYears() {
                const res = await fetch('/flights/api/years');
                const years = await res.json();
                const sel = document.getElementById('yearFilter');
                years.forEach(y => {
                    const opt = document.createElement('option');
                    opt.value = y; opt.textContent = y;
                    sel.appendChild(opt);
                });
            }

            async function loadMonths() {
                const res = await fetch('/flights/api/months');
                const months = await res.json();
                const sel = document.getElementById('monthFilter');
                months.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m; opt.textContent = m;
                    sel.appendChild(opt);
                });
            }

            async function loadRecords() {
                const month = document.getElementById('monthFilter').value;
                const year  = document.getElementById('yearFilter').value;
                let url = '/flights/api';
                if (month) url += `?month=${encodeURIComponent(month)}`;
                else if (year) url += `?year=${year}`;
                const res = await fetch(url);
                if (!res.ok) { showToast('Помилка завантаження', 'err'); return; }
                allRecords = await res.json();

                // Встановлюємо сортування за № за замовчуванням (спадання)
                sortCol = 'num';
                sortDir = -1;
                // Оновлюємо клас у заголовку
                document.querySelectorAll('thead th').forEach(th => {
                    th.classList.remove('sort-asc', 'sort-desc');
                    if (th.dataset.col === 'num') {
                        th.classList.add('sort-desc');
                    }
                });

                applyFilter();
                renderStats();
            }

            document.getElementById('yearFilter').onchange = () => { document.getElementById('monthFilter').value = ''; loadRecords(); };
            document.getElementById('monthFilter').onchange = () => { document.getElementById('yearFilter').value = ''; loadRecords(); };
            document.getElementById('searchInput').oninput = applyFilter;

            function sortBy(col) {
                if (sortCol === col) {
                    sortDir *= -1;
                } else {
                    sortCol = col;
                    sortDir = 1;
                }
                // Оновлюємо стрілки в заголовках
                document.querySelectorAll('thead th').forEach(th => {
                    th.classList.remove('sort-asc', 'sort-desc');
                    if (th.dataset.col === col) {
                        th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
                    }
                });
                applyFilter();
            }

            function getSortValue(r, col) {
                switch(col) {
                    case 'num':    return r.recordNumber || 0;
                    case 'date':   return r.flightDate || '';
                    case 'crew':   return r.crew || '';
                    case 'event':  return r.event || '';
                    case 'takeoff': return r.takeoffTime || '';
                    case 'loss':   return r.lossTime || '';
                    case 'coords': return r.coordinates || '';
                    case 'azimuth': return r.azimuth || 0;
                    case 'dist':   return r.distance || 0;
                    case 'alt':    return r.altitude || '';
                    case 'weapon': return r.weapon || '';
                    case 'targetAlt': return r.targetAltitude || 0;
                    case 'target': return r.target || '';
                    case 'speed':  return r.targetSpeed || 0;
                    case 'loss_reason': return r.lossReason || '';
                    default:       return '';
                }
            }

            function applyFilter() {
                const q = document.getElementById('searchInput').value.toLowerCase();
                let filtered = !q ? allRecords : allRecords.filter(r =>
                    [r.crew, r.event, r.target, r.weapon, r.note, r.coordinates]
                        .some(v => v && v.toLowerCase().includes(q))
                );
                if (sortCol) {
                    filtered = [...filtered].sort((a, b) => {
                        const va = getSortValue(a, sortCol);
                        const vb = getSortValue(b, sortCol);
                        if (va < vb) return -1 * sortDir;
                        if (va > vb) return  1 * sortDir;
                        return 0;
                    });
                }
                renderTable(filtered);
            }

            function renderStats() {
                const total = allRecords.length;
                const hits  = allRecords.filter(r => r.event && (r.event.toLowerCase().includes('знищен') || r.event.toLowerCase().includes('підрив'))).length;
                const loss  = allRecords.filter(r => r.event && r.event.toLowerCase().includes('втрат')).length;
                document.getElementById('statsBar').innerHTML = `
        <div class="stat-card"><div class="num">${total}</div><div class="lbl">Всього вильотів</div></div>
        <div class="stat-card"><div class="num" style="color:var(--stat-num-hits, #2e7d32)">${hits}</div><div class="lbl">Знищення цілі</div></div>
        <div class="stat-card"><div class="num" style="color:var(--stat-num-loss, #d32f2f)">${loss}</div><div class="lbl">Втрат бортів</div></div>
    `;
            }

            function renderTable(records) {
                const body = document.getElementById('tableBody');
                if (!records.length) {
                    body.innerHTML = '<tr><td colspan="19" class="empty-state">Записів немає</td></tr>';
                    return;
                }
                body.innerHTML = records.map(r => {
                    const isDestroyed = r.event && (r.event.toLowerCase().includes('знищен') || r.event.toLowerCase().includes('підрив'));
                    const badgeCls = isDestroyed ? 'badge-success' : 'badge-warning';
                    const rowCls = isDestroyed ? 'row-success' : '';
                    return `<tr class="${rowCls}">
            <td style="text-align:center">${r.recordNumber ?? ''}</td>
            <td style="text-align:center">${fmtDate(r.flightDate)}</td>
            <td style="text-align:center">${r.crew ?? ''}</td>
            <td style="text-align:center"><span class="${badgeCls}">${r.event ?? ''}</span></td>
            <td style="text-align:center">${fmtTime(r.takeoffTime)}</td>
            <td style="text-align:center">${fmtTime(r.lossTime)}</td>
            <td style="text-align:center;font-size:11px">${r.coordinates ?? ''}</td>
            <td style="text-align:center">${r.azimuth != null ? r.azimuth + '°' : ''}</td>
            <td style="text-align:center">${r.distance ?? ''}</td>
            <td style="text-align:center">${r.altitude ?? ''}</td>
            <td style="text-align:left;font-size:11px">${r.weapon ?? ''}</td>
            <td style="text-align:left;font-size:11px">${r.explosive ?? ''}</td>
            <td style="text-align:left;font-size:11px">${r.detonator ?? ''}</td>
            <td style="text-align:center">${r.targetAltitude ?? ''}</td>
            <td style="text-align:center">${r.target ?? ''}</td>
            <td style="text-align:center">${r.targetSpeed ?? ''}</td>
            <td style="text-align:left;font-size:11px;color:var(--text-loss-reason, #c62828)">${r.lossReason ?? ''}</td>
            <td style="text-align:left;font-size:11px;color:var(--text-note, #666);max-width:280px">
                <div class="note-cell" onclick="this.classList.toggle('expanded')"
                     title="Натисни щоб розгорнути">
                    ${r.note ?? ''}
                </div>
             </td>
            <td class="actions-col no-print">
                <button class="btn btn-warning btn-sm" onclick="openEditModal(${r.id})">✏️</button>
                <button class="btn btn-danger btn-sm" onclick="confirmDelete(${r.id})">🗑</button>
            </td>
         </tr>`;
                }).join('');
            }

            // ===== ФОРМА =====
            function openAddModal() {
                document.getElementById('modalTitle').textContent = 'Додати запис';
                document.getElementById('editId').value = '';
                const fields = ['fNum','fDate','fCrew','fMonth','fEvent','fTakeoff','fLoss',
                    'fCoords','fAzimuth','fDist','fFlightAlt','fType','fIdent','fWeapon','fExplosive',
                    'fDetonator','fAltitude','fTarget','fSpeed','fNote'];
                document.getElementById('fLossReason').value = '';
                fields.forEach(id => document.getElementById(id).value = '');
                document.getElementById('formModal').classList.add('open');
            }

            function openEditModal(id) {
                const r = allRecords.find(x => x.id === id);
                if (!r) return;
                document.getElementById('modalTitle').textContent = 'Редагувати запис';
                document.getElementById('editId').value = id;
                document.getElementById('fNum').value      = r.recordNumber ?? '';
                document.getElementById('fDate').value     = r.flightDate ? r.flightDate.substring(0,10) : '';
                document.getElementById('fCrew').value     = r.crew ?? '';
                document.getElementById('fMonth').value    = r.month ?? '';
                document.getElementById('fEvent').value    = r.event ?? '';
                document.getElementById('fTakeoff').value  = r.takeoffTime ? r.takeoffTime.substring(0,5) : '';
                document.getElementById('fLoss').value     = r.lossTime ? r.lossTime.substring(0,5) : '';
                document.getElementById('fCoords').value      = r.coordinates ?? '';
                document.getElementById('fAzimuth').value   = r.azimuth ?? '';
                document.getElementById('fDist').value      = r.distance ?? '';
                document.getElementById('fFlightAlt').value = r.altitude ?? '';
                document.getElementById('fType').value     = r.targetType ?? '';
                document.getElementById('fIdent').value    = r.identification ?? '';
                document.getElementById('fWeapon').value   = r.weapon ?? '';
                document.getElementById('fExplosive').value = r.explosive ?? '';
                document.getElementById('fDetonator').value = r.detonator ?? '';
                document.getElementById('fAltitude').value     = r.altitude ?? '';
                document.getElementById('fTargetAlt').value  = r.targetAltitude ?? '';
                document.getElementById('fTarget').value   = r.target ?? '';
                document.getElementById('fSpeed').value      = r.targetSpeed ?? '';
                document.getElementById('fLossReason').value = r.lossReason ?? '';
                document.getElementById('fNote').value       = r.note ?? '';
                document.getElementById('formModal').classList.add('open');
            }

            async function saveRecord() {
                const id = document.getElementById('editId').value;
                const body = {
                    recordNumber:   parseInt(document.getElementById('fNum').value) || null,
                    flightDate:     document.getElementById('fDate').value || null,
                    crew:           document.getElementById('fCrew').value.trim(),
                    month:          document.getElementById('fMonth').value.trim(),
                    event:          document.getElementById('fEvent').value.trim(),
                    takeoffTime:    document.getElementById('fTakeoff').value || null,
                    lossTime:       document.getElementById('fLoss').value || null,
                    coordinates:    document.getElementById('fCoords').value.trim(),
                    azimuth:        parseInt(document.getElementById('fAzimuth').value) || null,
                    distance:       parseInt(document.getElementById('fDist').value) || null,
                    flightAltitude: parseInt(document.getElementById('fFlightAlt').value) || null,
                    targetType:     document.getElementById('fType').value.trim(),
                    identification: document.getElementById('fIdent').value.trim(),
                    weapon:         document.getElementById('fWeapon').value.trim(),
                    explosive:      document.getElementById('fExplosive').value.trim(),
                    detonator:      document.getElementById('fDetonator').value.trim(),
                    altitude:       document.getElementById('fAltitude').value.trim(),
                    targetAltitude: parseInt(document.getElementById('fTargetAlt').value) || null,
                    target:         document.getElementById('fTarget').value.trim(),
                    targetSpeed:    parseInt(document.getElementById('fSpeed').value) || null,
                    lossReason:     document.getElementById('fLossReason').value.trim(),
                    note:           document.getElementById('fNote').value.trim(),
                };

                const url    = id ? `/flights/api/${id}` : '/flights/api';
                const method = id ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
                });
                if (res.ok) {
                    closeModal('formModal');
                    await loadRecords();
                    showToast(id ? 'Запис оновлено' : 'Запис додано', 'ok');
                } else {
                    const msg = await res.text();
                    showToast('Помилка: ' + msg, 'err');
                }
            }

            // ===== ВИДАЛЕННЯ =====
            function confirmDelete(id) {
                deleteTargetId = id;
                document.getElementById('confirmBtn').onclick = async () => {
                    const res = await fetch(`/flights/api/${deleteTargetId}`, {method:'DELETE'});
                    closeModal('confirmModal');
                    if (res.ok) { await loadRecords(); showToast('Запис видалено', 'ok'); }
                    else showToast('Помилка видалення', 'err');
                };
                document.getElementById('confirmModal').classList.add('open');
            }

            // ===== ЕКСПОРТ =====
            function exportXlsx() {
                const month = document.getElementById('monthFilter').value;
                const year  = document.getElementById('yearFilter').value;
                let url = '/flights/api/export';
                if (month) url += `?month=${encodeURIComponent(month)}`;
                else if (year) url += `?year=${year}`;
                window.location.href = url;
            }

            // ===== УТИЛІТИ =====
            function fmtDate(d) {
                if (!d) return '';
                const [y, m, day] = d.substring(0,10).split('-');
                return `${day}.${m}.${y}`;
            }
            function fmtTime(t) {
                if (!t) return '';
                return t.substring(0,5);
            }
            function openModal(id)  { document.getElementById(id).classList.add('open'); }
            function closeModal(id) { document.getElementById(id).classList.remove('open'); }
            document.querySelectorAll('.modal-overlay').forEach(el =>
                el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); })
            );
            function showToast(msg, type) {
                const t = document.getElementById('toast');
                t.textContent = msg; t.className = `toast ${type} show`;
                setTimeout(() => t.classList.remove('show'), 2500);
            }
        </script>
    </div>
</div>
<div th:replace="~{fragments :: sidebar-js}"></div>
</body>
</html>
