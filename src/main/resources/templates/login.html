<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід до системи</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        /* ===== CSS ЗМІННІ ДЛЯ ТЕМ ===== */
        :root {
            /* Світла тема */
            --bg-body: #f0f2f5;
            --bg-container: #ffffff;
            --text-primary: #222222;
            --text-secondary: #333333;
            --text-muted: #666666;
            --border-color: #cccccc;
            --shadow-color: rgba(0,0,0,0.1);
            --primary: #1976d2;
            --primary-dark: #1565c0;
            --secondary: #1a237e;
            --error-bg: #ffebee;
            --error-text: #c62828;
            --success-bg: #e8f5e9;
            --success-text: #2e7d32;
            --theme-toggle-bg: #e0e0e0;
            --theme-toggle-color: #555;
        }

        /* Темна тема */
        body.dark-theme {
            --bg-body: #1a1a2e;
            --bg-container: #16213e;
            --text-primary: #e8e8ec;
            --text-secondary: #d0d0d8;
            --text-muted: #a0a0a8;
            --border-color: #2a2a4a;
            --shadow-color: rgba(0,0,0,0.4);
            --primary: #4a7ab5;
            --primary-dark: #5a8ac5;
            --secondary: #0f3460;
            --error-bg: #3a1a1a;
            --error-text: #ef9a9a;
            --success-bg: #1a3a1a;
            --success-text: #81c784;
            --theme-toggle-bg: #2a2a4a;
            --theme-toggle-color: #ccc;
        }

        /* ===== ОСНОВНІ СТИЛІ ===== */
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-body);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            background: var(--bg-container);
            padding: 30px 28px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            transition: background 0.3s, box-shadow 0.3s;
            position: relative;
        }

        /* Кнопка перемикання теми */
        .theme-toggle {
            position: absolute;
            top: 12px;
            right: 16px;
            background: var(--theme-toggle-bg);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 18px;
            cursor: pointer;
            color: var(--theme-toggle-color);
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .theme-toggle:hover {
            opacity: 0.8;
        }

        h2 {
            color: #bfbfbf;
            text-align: center;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 24px;
            transition: color 0.3s;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
            transition: color 0.3s;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg-container);
            color: var(--text-primary);
            transition: border-color 0.2s, background 0.3s, color 0.3s;
        }
        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(25,118,210,0.2);
        }
        button[type="submit"] {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        button[type="submit"]:hover {
            background: var(--primary-dark);
        }
        button[type="submit"]:active {
            transform: scale(0.98);
        }
        .error {
            color: var(--error-text);
            background: var(--error-bg);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            transition: color 0.3s, background 0.3s;
        }
        .success {
            color: var(--success-text);
            background: var(--success-bg);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            transition: color 0.3s, background 0.3s;
        }
        @media (max-width: 480px) {
            .login-container {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <!-- Кнопка перемикання теми -->
    <button class="theme-toggle" id="themeToggle" title="Перемкнути тему">🌙</button>

    <h2>🔐 Вхід до системи</h2>

    <!-- Повідомлення про помилку -->
    <div th:if="${param.error}" class="error">
        ❌ Невірне ім'я або пароль
    </div>

    <!-- Повідомлення про успішний вихід -->
    <div th:if="${param.logout}" class="success">
        ✅ Ви успішно вийшли
    </div>

    <form method="post" th:action="@{/login}">
        <div class="input-group">
            <label>👤 Логін</label>
            <input type="text" name="username" placeholder="Введіть ваш логін" required autofocus>
        </div>

        <div class="input-group">
            <label>🔒 Пароль</label>
            <input type="password" name="password" placeholder="Введіть пароль" required>
        </div>

        <button type="submit">Увійти</button>
    </form>
</div>

<script>
    (function() {
        const toggleBtn = document.getElementById('themeToggle');
        if (!toggleBtn) return;

        // Відновлення збереженої теми
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
            toggleBtn.textContent = '☀️';
        }

        toggleBtn.addEventListener('click', function() {
            const isDark = document.body.classList.toggle('dark-theme');
            this.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    })();
</script>
</body>
</html>
