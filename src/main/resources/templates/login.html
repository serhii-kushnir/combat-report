<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід до системи</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ===== CSS ЗМІННІ ===== */
        :root {
            --bg-container: rgba(255, 255, 255, 0.92);
            --text-primary: #1a1a2e;
            --text-secondary: #333333;
            --text-muted: #666666;
            --border-color: #d0d0d0;
            --shadow-color: rgba(0,0,0,0.2);
            --shadow-light: rgba(0,0,0,0.05);
            --primary: #1565c0;
            --primary-dark: #0d47a1;
            --error-bg: #ffebee;
            --error-text: #c62828;
            --success-bg: #e8f5e9;
            --success-text: #2e7d32;
            --theme-toggle-bg: rgba(255,255,255,0.9);
            --theme-toggle-color: #555;
            --input-bg: #ffffff;
            --input-border: #d0d0d0;
            --glass-blur: blur(16px);
            --glass-border: rgba(255,255,255,0.3);
            --gradient-start: #0a0a2a;
            --gradient-middle: #0d1b3e;
            --gradient-end: #1a0a2a;
        }

        body.dark-theme {
            --bg-container: rgba(22, 33, 62, 0.92);
            --text-primary: #e8e8ec;
            --text-secondary: #b0b0b8;
            --text-muted: #88888f;
            --border-color: #3a3a4a;
            --shadow-color: rgba(0,0,0,0.5);
            --shadow-light: rgba(0,0,0,0.3);
            --primary: #4a7ab5;
            --primary-dark: #5a8ac5;
            --error-bg: #3a1a1a;
            --error-text: #ef9a9a;
            --success-bg: #1a3a1a;
            --success-text: #81c784;
            --theme-toggle-bg: rgba(42,42,74,0.9);
            --theme-toggle-color: #ccc;
            --input-bg: rgba(42,42,58,0.9);
            --input-border: #3a3a4a;
            --glass-blur: blur(16px);
            --glass-border: rgba(255,255,255,0.08);
            --gradient-start: #0a0a1a;
            --gradient-middle: #0a0a2a;
            --gradient-end: #1a0a2a;
        }

        /* ===== ФОНОВА АНІМАЦІЯ ===== */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 0%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 100%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes droneFly {
            0% { transform: translate(-120px, 20px) scale(0.6) rotate(-5deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate(calc(100vw + 120px), -60px) scale(0.8) rotate(5deg); opacity: 0; }
        }
        @keyframes droneFly2 {
            0% { transform: translate(calc(100vw + 100px), -30px) scale(0.7) rotate(3deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate(-140px, 50px) scale(0.5) rotate(-3deg); opacity: 0; }
        }
        @keyframes starTwinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.4); }
        }
        @keyframes particleRise {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
            15% { opacity: 0.6; }
            85% { opacity: 0.6; }
            100% { transform: translateY(-160px) translateX(50px) scale(0.3); opacity: 0; }
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(3deg); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes trailPulse {
            0%, 100% { opacity: 0.3; transform: scaleX(0.8); }
            50% { opacity: 0.9; transform: scaleX(1.3); }
        }

        /* ===== ЗАГАЛЬНІ СТИЛІ ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: #0a0a2a;
            transition: background 0.8s ease;
            overflow: hidden;
            position: relative;
        }

        /* ===== ФОН ===== */
        .bg-animation {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-middle), var(--gradient-end));
            background-size: 400% 400%;
            animation: gradientShift 25s ease-in-out infinite;
            transition: background 0.8s ease;
        }

        .stars {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: starTwinkle 3s ease-in-out infinite;
        }
        .star:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; width: 3px; height: 3px; }
        .star:nth-child(2) { top: 20%; left: 15%; animation-delay: 0.5s; }
        .star:nth-child(3) { top: 8%; left: 30%; animation-delay: 1.2s; width: 2px; height: 2px; }
        .star:nth-child(4) { top: 30%; left: 45%; animation-delay: 0.3s; width: 4px; height: 4px; }
        .star:nth-child(5) { top: 5%; left: 55%; animation-delay: 1.8s; }
        .star:nth-child(6) { top: 25%; left: 70%; animation-delay: 0.7s; width: 3px; height: 3px; }
        .star:nth-child(7) { top: 15%; left: 85%; animation-delay: 2.2s; }
        .star:nth-child(8) { top: 35%; left: 92%; animation-delay: 0.9s; width: 2px; height: 2px; }
        .star:nth-child(9) { top: 45%; left: 10%; animation-delay: 1.5s; width: 3px; height: 3px; }
        .star:nth-child(10) { top: 55%; left: 25%; animation-delay: 0.2s; }
        .star:nth-child(11) { top: 40%; left: 60%; animation-delay: 2.5s; width: 2px; height: 2px; }
        .star:nth-child(12) { top: 50%; left: 78%; animation-delay: 1.0s; width: 3px; height: 3px; }

        .drones {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .drone {
            position: absolute;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 20px;
            color: rgba(100, 200, 255, 0.7);
            filter: drop-shadow(0 0 20px rgba(0, 150, 255, 0.3));
            animation: droneFly 16s linear infinite;
            text-shadow: 0 0 20px rgba(0, 150, 255, 0.2);
        }
        .drone .trail {
            display: flex;
            gap: 2px;
            opacity: 0.6;
        }
        .drone .trail span {
            display: inline-block;
            height: 2px;
            background: linear-gradient(90deg, rgba(0, 200, 255, 0.8), transparent);
            border-radius: 2px;
            animation: trailPulse 1.5s ease-in-out infinite;
        }
        .drone .trail span:nth-child(1) { width: 6px; }
        .drone .trail span:nth-child(2) { width: 10px; animation-delay: 0.3s; }
        .drone .trail span:nth-child(3) { width: 14px; animation-delay: 0.6s; }
        .drone .trail span:nth-child(4) { width: 8px; animation-delay: 0.9s; }

        .drone-1 { top: 12%; animation-duration: 18s; animation-delay: 0s; font-size: 22px; }
        .drone-2 { top: 8%; animation-duration: 22s; animation-delay: 3s; font-size: 16px; }
        .drone-3 { top: 20%; animation-duration: 14s; animation-delay: 6s; font-size: 18px; }
        .drone-4 { top: 5%; animation-duration: 20s; animation-delay: 9s; font-size: 24px; }
        .drone-5 { top: 16%; animation-duration: 16s; animation-delay: 12s; font-size: 14px; }

        .drone-reverse {
            animation: droneFly2 18s linear infinite;
            color: rgba(255, 180, 50, 0.7);
            filter: drop-shadow(0 0 20px rgba(255, 180, 50, 0.3));
        }
        .drone-reverse .trail span {
            background: linear-gradient(270deg, rgba(255, 180, 50, 0.8), transparent);
        }
        .drone-reverse .trail span:nth-child(1) { width: 14px; }
        .drone-reverse .trail span:nth-child(2) { width: 10px; animation-delay: 0.3s; }
        .drone-reverse .trail span:nth-child(3) { width: 6px; animation-delay: 0.6s; }
        .drone-reverse .trail span:nth-child(4) { width: 8px; animation-delay: 0.9s; }

        .drone-6 { top: 30%; animation-duration: 20s; animation-delay: 2s; font-size: 20px; }
        .drone-7 { top: 25%; animation-duration: 24s; animation-delay: 5s; font-size: 15px; }
        .drone-8 { top: 38%; animation-duration: 16s; animation-delay: 8s; font-size: 18px; }

        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(100, 200, 255, 0.3);
            border-radius: 50%;
            animation: particleRise 8s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(100, 200, 255, 0.1);
        }
        .particle:nth-child(1) { left: 8%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 18%; animation-delay: 1.2s; width: 3px; height: 3px; }
        .particle:nth-child(3) { left: 28%; animation-delay: 2.5s; background: rgba(255, 180, 50, 0.25); }
        .particle:nth-child(4) { left: 38%; animation-delay: 0.8s; width: 5px; height: 5px; }
        .particle:nth-child(5) { left: 48%; animation-delay: 3.2s; }
        .particle:nth-child(6) { left: 58%; animation-delay: 1.8s; width: 3px; height: 3px; background: rgba(255, 180, 50, 0.2); }
        .particle:nth-child(7) { left: 68%; animation-delay: 4s; }
        .particle:nth-child(8) { left: 78%; animation-delay: 0.5s; width: 6px; height: 6px; }
        .particle:nth-child(9) { left: 88%; animation-delay: 3.5s; width: 3px; height: 3px; }
        .particle:nth-child(10) { left: 95%; animation-delay: 2s; }

        .big-drone {
            position: absolute;
            bottom: 12%;
            right: 3%;
            font-size: 70px;
            color: rgba(100, 200, 255, 0.06);
            animation: floating 8s ease-in-out infinite;
            pointer-events: none;
            filter: blur(1px);
        }
        body.dark-theme .big-drone {
            color: rgba(100, 200, 255, 0.08);
        }

        /* ===== КОНТЕЙНЕР ЛОГІНУ ===== */
        .login-container {
            position: relative;
            z-index: 10;
            max-width: 420px;
            width: 100%;
            background: var(--bg-container);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 34px 32px;
            border-radius: 20px;
            box-shadow: 0 8px 48px var(--shadow-color);
            transition: background 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
            animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }
        .login-container:hover {
            box-shadow: 0 12px 60px var(--shadow-color);
        }

        .login-container h2 {
            color: var(--text-primary);
            text-align: center;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 24px;
            transition: color 0.3s;
            letter-spacing: 0.5px;
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
            animation-delay: 0.12s;
        }
        .login-container h2 i {
            color: var(--primary);
            transition: color 0.3s;
        }

        .input-group {
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
            animation-delay: 0.18s;
            margin-bottom: 20px;
        }
        .input-group:nth-child(2) {
            animation-delay: 0.26s;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
            transition: color 0.3s;
        }
        input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--input-border);
            border-radius: 10px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: border-color 0.25s, box-shadow 0.25s, background 0.3s, color 0.3s, transform 0.15s;
            box-shadow: 0 1px 3px var(--shadow-light);
            outline: none;
        }
        input:hover {
            border-color: var(--primary);
            transform: translateY(-1px);
        }
        input:focus {
            border-color: var(--primary);
            transform: translateY(-1px);
            box-shadow: 0 0 0 4px rgba(21, 101, 192, 0.15);
        }

        button[type="submit"] {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.25s ease;
            margin-top: 8px;
            box-shadow: 0 2px 8px var(--shadow-light);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
            animation-delay: 0.34s;
        }
        button[type="submit"]::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15) 60%, transparent 80%);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }
        button[type="submit"]:hover::after {
            transform: translateX(100%);
        }
        button[type="submit"]:hover {
            background: var(--primary-dark);
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 6px 24px var(--shadow-color);
        }
        button[type="submit"]:active {
            transform: translateY(0px) scale(0.98);
            box-shadow: 0 2px 8px var(--shadow-light);
        }

        /* ===== КНОПКА ТЕМИ ===== */
        .theme-toggle {
            position: absolute;
            top: 14px;
            right: 18px;
            background: var(--theme-toggle-bg);
            border: none;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            font-size: 18px;
            cursor: pointer;
            color: var(--theme-toggle-color);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px var(--shadow-light);
            backdrop-filter: blur(4px);
            z-index: 15;
            animation: fadeIn 0.5s ease forwards;
            opacity: 0;
            animation-delay: 0.06s;
        }
        .theme-toggle:hover {
            transform: rotate(30deg) scale(1.12);
            box-shadow: 0 4px 16px var(--shadow-color);
            background: var(--primary);
            color: white;
        }
        .theme-toggle:active {
            transform: scale(0.9) rotate(0deg);
        }

        .error, .success {
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
            animation-delay: 0.08s;
        }
        .error {
            color: var(--error-text);
            background: var(--error-bg);
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            transition: color 0.3s, background 0.3s;
            border-left: 3px solid var(--error-text);
        }
        .success {
            color: var(--success-text);
            background: var(--success-bg);
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            transition: color 0.3s, background 0.3s;
            border-left: 3px solid var(--success-text);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 24px 18px;
                border-radius: 16px;
            }
            h2 { font-size: 20px; }
            input { padding: 8px 12px; font-size: 13px; }
            button[type="submit"] { padding: 10px; font-size: 14px; }
            .drone, .drone-reverse { display: none; }
            .particle { display: none; }
            .star { display: none; }
            .big-drone { font-size: 40px; }
        }

        ::-webkit-scrollbar { width: 0; }
        body { overflow: hidden; }
    </style>
</head>
<body>

<div class="bg-animation">
    <div class="stars">
        <div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div>
        <div class="star"></div><div class="star"></div><div class="star"></div>
    </div>

    <div class="drones">
        <div class="drone drone-1"><span class="trail"><span></span><span></span><span></span><span></span></span><i class="fas fa-drone"></i></div>
        <div class="drone drone-2"><span class="trail"><span></span><span></span><span></span><span></span></span><i class="fas fa-drone"></i></div>
        <div class="drone drone-3"><span class="trail"><span></span><span></span><span></span><span></span></span><i class="fas fa-drone"></i></div>
        <div class="drone drone-4"><span class="trail"><span></span><span></span><span></span><span></span></span><i class="fas fa-drone"></i></div>
        <div class="drone drone-5"><span class="trail"><span></span><span></span><span></span><span></span></span><i class="fas fa-drone"></i></div>
        <div class="drone drone-reverse drone-6"><i class="fas fa-drone"></i><span class="trail"><span></span><span></span><span></span><span></span></span></div>
        <div class="drone drone-reverse drone-7"><i class="fas fa-drone"></i><span class="trail"><span></span><span></span><span></span><span></span></span></div>
        <div class="drone drone-reverse drone-8"><i class="fas fa-drone"></i><span class="trail"><span></span><span></span><span></span><span></span></span></div>
    </div>

    <div class="particles">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="big-drone"><i class="fas fa-drone"></i></div>
</div>

<div class="login-container">
    <button class="theme-toggle" id="themeToggle" title="Перемкнути тему">🌙</button>
    <h2><i class="fas fa-drone"></i> 🔐 Вхід до системи</h2>

    <div th:if="${param.error}" class="error">❌ Невірне ім'я або пароль</div>
    <div th:if="${param.logout}" class="success">✅ Ви успішно вийшли</div>

    <form method="post" th:action="@{/login}">
        <div class="input-group">
            <label>👤 Логін</label>
            <input type="text" name="username" placeholder="Введіть ваш логін" required autofocus>
        </div>
        <div class="input-group">
            <label>🔒 Пароль</label>
            <input type="password" name="password" placeholder="Введіть пароль" required>
        </div>
        <button type="submit"><i class="fas fa-rocket"></i> Увійти</button>
    </form>
</div>

<script>
    (function() {
        const toggleBtn = document.getElementById('themeToggle');
        if (!toggleBtn) return;
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
            toggleBtn.textContent = '☀️';
        }
        toggleBtn.addEventListener('click', function() {
            const isDark = document.body.classList.toggle('dark-theme');
            this.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    })();
</script>

</body>
</html>
