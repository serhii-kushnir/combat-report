<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Майно / Склад</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        /* ===== CSS ЗМІННІ ===== */
        :root {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --bg-toolbar: #ffffff;
            --bg-table: #ffffff;
            --bg-table-header: #1a237e;
            --bg-input: #ffffff;
            --bg-modal: rgba(0,0,0,0.5);
            --bg-hover: #f5f9ff;
            --bg-confirm: #ffffff;
            --text-primary: #222222;
            --text-secondary: #555555;
            --text-light: #999999;
            --text-white: #ffffff;
            --border-color: #ccc;
            --border-light: #f0f0f0;
            --shadow-color: rgba(0,0,0,0.1);
            --shadow-strong: rgba(0,0,0,0.2);
            --toast-success: #2e7d32;
            --toast-error: #c62828;
            --btn-primary-bg: #1976d2;
            --btn-primary-hover: #1565c0;
            --btn-success-bg: #388e3c;
            --btn-success-hover: #2e7d32;
            --btn-warning-bg: #f57c00;
            --btn-warning-hover: #e65100;
            --btn-danger-bg: #d32f2f;
            --btn-danger-hover: #b71c1c;
        }

        /* Темна тема */
        body.dark-theme {
            --bg-body: #1e1e24;
            --bg-card: #2d2d35;
            --bg-toolbar: #2d2d35;
            --bg-table: #2d2d35;
            --bg-table-header: #2a2a3a;
            --bg-input: #3a3a44;
            --bg-modal: rgba(0,0,0,0.7);
            --bg-hover: #3a3a44;
            --bg-confirm: #2d2d35;
            --text-primary: #e8e8ec;
            --text-secondary: #b0b0b8;
            --text-light: #88888f;
            --text-white: #ffffff;
            --border-color: #3d3d48;
            --border-light: #3d3d48;
            --shadow-color: rgba(0,0,0,0.4);
            --shadow-strong: rgba(0,0,0,0.5);
            --btn-primary-bg: #4a7ab5;
            --btn-primary-hover: #5a8ac5;
            --btn-success-bg: #3a6a3a;
            --btn-success-hover: #4a7a4a;
            --btn-warning-bg: #b87a2a;
            --btn-warning-hover: #c88a3a;
            --btn-danger-bg: #a03040;
            --btn-danger-hover: #b04050;
        }

        /* ===== ОСНОВНІ СТИЛІ ===== */
        .topbar {
            background: var(--bg-card);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            margin: 0;
        }
        .container { padding: 16px 20px; }

        /* ===== ТУЛБАР ===== */
        .toolbar {
            background: var(--bg-toolbar);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 1px 4px var(--shadow-color);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .toolbar h2 {
            color: var(--text-primary);
            transition: color 0.3s;
        }

        /* ===== КНОПКИ ===== */
        .btn {
            padding: 7px 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--btn-primary-bg);
            color: var(--text-white);
        }
        .btn-primary:hover { background: var(--btn-primary-hover); }

        .btn-success {
            background: var(--btn-success-bg);
            color: var(--text-white);
        }
        .btn-success:hover { background: var(--btn-success-hover); }

        .btn-warning {
            background: var(--btn-warning-bg);
            color: var(--text-white);
        }
        .btn-warning:hover { background: var(--btn-warning-hover); }

        .btn-danger {
            background: var(--btn-danger-bg);
            color: var(--text-white);
        }
        .btn-danger:hover { background: var(--btn-danger-hover); }

        .btn-sm { padding: 4px 9px; font-size: 11px; }

        /* ===== ПОЛЯ ВВОДУ ===== */
        select, input[type=text], input[type=number] {
            padding: 7px 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        .search-input { width: 220px; }

        /* ===== ТАБЛИЦЯ ===== */
        .table-wrap {
            overflow-x: auto;
            border-radius: 8px;
            box-shadow: 0 1px 4px var(--shadow-color);
            transition: box-shadow 0.3s;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-table);
            min-width: 800px;
            transition: background 0.3s;
        }
        thead {
            background: var(--bg-table-header);
            color: var(--text-white);
            transition: background 0.3s;
        }
        th {
            padding: 9px 8px;
            font-size: 12px;
            font-weight: 600;
            text-align: left;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }
        th:hover { background: var(--bg-hover); }
        th.sort-asc::after { content: ' ▲'; font-size: 10px; }
        th.sort-desc::after { content: ' ▼'; font-size: 10px; }

        td {
            padding: 7px 8px;
            font-size: 12px;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-primary);
            vertical-align: middle;
            transition: border-color 0.3s, color 0.3s;
        }
        tr:hover td { background: var(--bg-hover); }

        .col-num { width: 40px; text-align: center; }
        .col-name { width: auto; min-width: 180px; }
        .col-quantity { width: 90px; text-align: center; }
        .col-unit { width: 70px; text-align: center; }
        .col-crew { width: 100px; text-align: center; }
        .col-location { width: 100px; text-align: center; }
        .col-category { width: 100px; text-align: center; }
        .col-actions { width: 100px; text-align: center !important; white-space: nowrap; }

        .btn-quantity {
            background: #17a2b8;
            color: white;
            display: inline-block;
            padding: 4px 9px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
            min-width: 50px;
        }
        .btn-unit {
            background: #28a745;
            color: white;
            display: inline-block;
            padding: 4px 9px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
        }
        .btn-crew {
            background: #fd7e14;
            color: white;
            display: inline-block;
            padding: 4px 9px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
        }
        .btn-location {
            background: #6f42c1;
            color: white;
            display: inline-block;
            padding: 4px 9px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
        }
        .btn-category {
            background: #20c997;
            color: white;
            display: inline-block;
            padding: 4px 9px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
        }
        .btn-empty {
            background: #6c757d;
            color: white;
            display: inline-block;
            padding: 4px 9px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
        }

        .btn-edit, .btn-delete {
            display: inline-block !important;
            margin: 0 4px !important;
            padding: 4px 9px !important;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-edit { background: #fd7e14; color: white; }
        .btn-edit:hover { background: #e66a0b; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-delete:hover { background: #c82333; }

        /* ===== МОДАЛЬНІ ВІКНА ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-modal);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg-card);
            border-radius: 10px;
            padding: 24px;
            width: 600px;
            max-width: 96vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px var(--shadow-strong);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .modal h2 {
            margin: 0 0 18px;
            font-size: 17px;
            color: var(--text-primary);
            transition: color 0.3s;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .form-group.full { grid-column: 1 / -1; }
        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            transition: color 0.3s;
        }
        .form-group input, .form-group select {
            padding: 7px 9px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 18px;
        }

        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-modal);
            z-index: 1100;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .confirm-overlay.open { display: flex; }
        .confirm-box {
            background: var(--bg-confirm);
            border-radius: 10px;
            padding: 24px;
            width: 340px;
            box-shadow: 0 8px 32px var(--shadow-strong);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .confirm-box p {
            margin: 0 0 16px;
            color: var(--text-primary);
        }
        .confirm-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 18px;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 9999;
        }
        .toast.show { opacity: 1; }
        .toast.ok { background: var(--toast-success); }
        .toast.err { background: var(--toast-error); }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
            transition: color 0.3s;
        }

        /* Пагінація */
        .pagination {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            margin-top: 16px;
            padding: 8px 0;
        }
        .pagination button {
            padding: 4px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-card);
            cursor: pointer;
            transition: all 0.2s;
        }
        .pagination button:hover:not(:disabled) {
            background: var(--bg-hover);
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .pagination .page-info {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .btn-print {
            background: #607d8b;
            color: white;
        }
        .btn-print:hover {
            background: #546e7a;
        }
        .dark-theme .btn-print {
            background: #4a5a6a;
            color: white;
        }
        .dark-theme .btn-print:hover {
            background: #5a6a7a;
        }

        /* Стилі для друку */
        @media print {
            .sidebar, .toolbar, .no-print, .btn, .btn-print, .btn-success,
            .btn-primary, .btn-warning, .btn-danger, .modal-overlay,
            .pagination, .search-input {
                display: none !important;
            }
            body { background: white !important; color: black !important; }
            .main-content { margin-left: 0 !important; padding: 0 !important; }
            .container { padding: 10px !important; max-width: 100% !important; }
            .table-wrap { box-shadow: none !important; border: 1px solid #ccc !important; border-radius: 0 !important; }
            table { background: white !important; width: 100% !important; }
            thead { background: #1a237e !important; color: white !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            thead th { background: #1a237e !important; color: white !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            td { color: black !important; border-bottom: 1px solid #ddd !important; }
            tr { page-break-inside: avoid; }
            .dark-theme td { color: black !important; }
            .dark-theme thead { background: #1a237e !important; color: white !important; }
            .dark-theme thead th { background: #1a237e !important; color: white !important; }
        }
    </style>
    <link th:replace="~{fragments :: sidebar-css}">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments :: sidebar('equipment')}"></div>
    <div class="main-content">
        <div class="container">
            <div class="toolbar">
                <h2 style="margin:0; flex:1;">📦 Облік майна / складу</h2>
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 Пошук...">
                <button class="btn btn-success" onclick="openAddModal()">+ Додати позицію</button>
                <button class="btn btn-warning" onclick="exportToXlsx()">📊 Експорт XLSX</button>
                <button class="btn btn-print" onclick="window.print()">
                    <i class="fas fa-print"></i> Друк
                </button>
            </div>
            <div class="table-wrap">
                <table id="equipmentTable">
                    <thead>
                    <tr>
                        <th data-col="num" onclick="sortBy('num')" class="col-num">№</th>
                        <th data-col="name" onclick="sortBy('name')" class="col-name">Назва</th>
                        <th data-col="quantity" onclick="sortBy('quantity')" class="col-quantity">Кількість</th>
                        <th data-col="unit" onclick="sortBy('unit')" class="col-unit">Одиниць</th>
                        <th data-col="crew" onclick="sortBy('crew')" class="col-crew">Екіпаж</th>
                        <th data-col="location" onclick="sortBy('location')" class="col-location">Локація</th>
                        <th data-col="category" onclick="sortBy('category')" class="col-category">Категорія</th>
                        <th class="col-actions no-print">Дії</th>
                    </tr>
                    </thead>
                    <tbody id="tableBody">
                    <tr><td colspan="8" class="empty-state">Завантаження...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- ПАГІНАЦІЯ -->
            <div class="pagination" id="pagination"></div>

        </div>

        <!-- Модальне вікно додавання -->
        <div class="modal-overlay" id="addModal">
            <div class="modal">
                <h2>➕ Нова позиція</h2>
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Назва *</label>
                        <input type="text" id="eqName" placeholder="Наприклад, Merops (нічний)">
                    </div>
                    <div class="form-group">
                        <label>Кількість</label>
                        <input type="number" id="eqQuantity" value="0">
                    </div>
                    <div class="form-group">
                        <label>Одиниця виміру</label>
                        <input type="text" id="eqUnit" placeholder="шт." value="шт.">
                    </div>
                    <div class="form-group">
                        <label>Екіпаж</label>
                        <select id="eqCrew">
                            <option value="">— Не вибрано —</option>
                            <option value="Скопа">Скопа</option>
                            <option value="Шуліка">Шуліка</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Локація</label>
                        <input type="text" id="eqLocation" placeholder="А0826">
                    </div>
                    <div class="form-group">
                        <label>Категорія</label>
                        <input type="text" id="eqCategory" placeholder="Дрони, Боєприпаси...">
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn" onclick="closeModal('addModal')" style="background:#eee">Скасувати</button>
                    <button class="btn btn-primary" onclick="addItem()">Додати</button>
                </div>
            </div>
        </div>

        <!-- Модальне вікно редагування всіх полів -->
        <div class="modal-overlay" id="editItemModal">
            <div class="modal">
                <h2>✏️ Редагувати позицію</h2>
                <input type="hidden" id="editItemId">
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Назва *</label>
                        <input type="text" id="editItemName">
                    </div>
                    <div class="form-group">
                        <label>Кількість</label>
                        <input type="number" id="editItemQuantity">
                    </div>
                    <div class="form-group">
                        <label>Одиниця виміру</label>
                        <input type="text" id="editItemUnit">
                    </div>
                    <div class="form-group">
                        <label>Екіпаж</label>
                        <select id="editItemCrew">
                            <option value="">— Не вибрано —</option>
                            <option value="Скопа">Скопа</option>
                            <option value="Шуліка">Шуліка</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Локація</label>
                        <input type="text" id="editItemLocation">
                    </div>
                    <div class="form-group">
                        <label>Категорія</label>
                        <input type="text" id="editItemCategory">
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn" onclick="closeModal('editItemModal')" style="background:#eee">Скасувати</button>
                    <button class="btn btn-primary" onclick="updateFullItem()">Зберегти</button>
                </div>
            </div>
        </div>

        <!-- Підтвердження видалення -->
        <div class="confirm-overlay" id="confirmDeleteModal">
            <div class="confirm-box">
                <p>Видалити запис?</p>
                <div class="confirm-actions">
                    <button class="btn" onclick="closeModal('confirmDeleteModal')" style="background:#eee">Скасувати</button>
                    <button class="btn btn-danger" id="confirmDeleteBtn">Видалити</button>
                </div>
            </div>
        </div>

        <div class="toast" id="toast"></div>

        <script>
            // ===== ГЛОБАЛЬНІ ЗМІННІ =====
            let allItems = [];
            let filteredItems = [];
            let sortCol = 'num';
            let sortDir = 1;
            let searchTerm = '';
            let deleteTargetId = null;

            // Пагінація
            let currentPage = 0;
            let pageSize = 20;
            let totalElements = 0;

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
            }

            // ===== ЗАВАНТАЖЕННЯ ДАНИХ З ПАГІНАЦІЄЮ =====
            async function loadData() {
                try {
                    const res = await fetch(`/equipment/api?page=${currentPage}&size=${pageSize}`);
                    if (!res.ok) {
                        console.error('Помилка завантаження:', res.status);
                        showToast('Помилка завантаження: ' + res.status, 'err');
                        return;
                    }
                    const pageData = await res.json();
                    allItems = pageData.content || [];
                    totalElements = pageData.totalElements || 0;
                    console.log('Завантажено:', allItems.length, 'записів, всього:', totalElements);
                    filterAndSort();
                    renderPagination();
                } catch (err) {
                    console.error('Network error:', err);
                    showToast('Помилка мережі', 'err');
                }
            }

            // ===== ПАГІНАЦІЯ =====
            function goToPage(page) {
                const totalPages = Math.ceil(totalElements / pageSize);
                if (page < 0 || page >= totalPages) return;
                currentPage = page;
                loadData();
            }
            window.goToPage = goToPage;

            function renderPagination() {
                const totalPages = Math.ceil(totalElements / pageSize);
                const pag = document.getElementById('pagination');
                if (totalPages <= 1) {
                    pag.innerHTML = '';
                    return;
                }
                let html = '';
                html += `<button onclick="goToPage(0)" ${currentPage === 0 ? 'disabled' : ''}>⏮</button>`;
                html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>◀</button>`;
                html += `<span class="page-info">Сторінка ${currentPage + 1} з ${totalPages} (всього ${totalElements} записів)</span>`;
                html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>▶</button>`;
                html += `<button onclick="goToPage(${totalPages - 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>⏭</button>`;
                pag.innerHTML = html;
            }

            // ===== ФІЛЬТР ТА СОРТУВАННЯ =====
            function filterAndSort() {
                let filtered = allItems; // масив
                if (searchTerm.trim() !== '') {
                    const term = searchTerm.trim().toLowerCase();
                    filtered = allItems.filter(item =>
                        (item.name || '').toLowerCase().includes(term) ||
                        (item.crew || '').toLowerCase().includes(term) ||
                        (item.location || '').toLowerCase().includes(term) ||
                        (item.category || '').toLowerCase().includes(term)
                    );
                }
                filtered = [...filtered].sort((a, b) => {
                    let valA, valB;
                    if (sortCol === 'num') {
                        valA = a.id;
                        valB = b.id;
                    } else if (sortCol === 'name') {
                        valA = (a.name || '').toLowerCase();
                        valB = (b.name || '').toLowerCase();
                    } else if (sortCol === 'quantity') {
                        valA = a.quantity || 0;
                        valB = b.quantity || 0;
                    } else if (sortCol === 'unit') {
                        valA = (a.unit || '').toLowerCase();
                        valB = (b.unit || '').toLowerCase();
                    } else if (sortCol === 'crew') {
                        valA = (a.crew || '').toLowerCase();
                        valB = (b.crew || '').toLowerCase();
                    } else if (sortCol === 'location') {
                        valA = (a.location || '').toLowerCase();
                        valB = (b.location || '').toLowerCase();
                    } else {
                        valA = (a.category || '').toLowerCase();
                        valB = (b.category || '').toLowerCase();
                    }
                    if (valA < valB) return -1 * sortDir;
                    if (valA > valB) return 1 * sortDir;
                    return 0;
                });
                filteredItems = filtered;
                renderTable();
            }

            function sortBy(col) {
                if (sortCol === col) {
                    sortDir *= -1;
                } else {
                    sortCol = col;
                    sortDir = 1;
                }
                document.querySelectorAll('thead th[data-col]').forEach(th => {
                    th.classList.remove('sort-asc', 'sort-desc');
                    if (th.getAttribute('data-col') === col) {
                        th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
                    }
                });
                filterAndSort();
            }
            window.sortBy = sortBy;

            function onSearchInput() {
                searchTerm = document.getElementById('searchInput').value;
                filterAndSort();
            }

            // ===== РЕНДЕРИНГ ТАБЛИЦІ =====
            function renderTable() {
                const tbody = document.getElementById('tableBody');
                if (!filteredItems.length) {
                    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Список порожній. Додайте перше майно.</td></tr>';
                    return;
                }
                tbody.innerHTML = filteredItems.map((item, idx) => {
                    const unitVal = item.unit || 'шт.';
                    const unitClass = unitVal ? 'btn-unit' : 'btn-empty';
                    const crewVal = item.crew || '';
                    const crewClass = crewVal ? 'btn-crew' : 'btn-empty';
                    const locVal = item.location || '';
                    const locClass = locVal ? 'btn-location' : 'btn-empty';
                    const catVal = item.category || '';
                    const catClass = catVal ? 'btn-category' : 'btn-empty';
                    return `
                        <tr>
                            <td class="col-num">${idx + 1}</td>
                            <td class="col-name">${escapeHtml(item.name)}</td>
                            <td class="col-quantity"><span class="btn-quantity" style="cursor:default;">${item.quantity}</span></td>
                            <td class="col-unit"><span class="${unitClass}" style="cursor:default;">${escapeHtml(unitVal)}</span></td>
                            <td class="col-crew"><span class="${crewClass}" style="cursor:default;">${escapeHtml(crewVal) || '—'}</span></td>
                            <td class="col-location"><span class="${locClass}" style="cursor:default;">${escapeHtml(locVal) || '—'}</span></td>
                            <td class="col-category"><span class="${catClass}" style="cursor:default;">${escapeHtml(catVal) || '—'}</span></td>
                            <td class="col-actions">
                                <button class="btn-edit no-print" onclick="openEditItemModal(${item.id})" title="Редагувати">✏️</button>
                                <button class="btn-delete no-print" onclick="deleteItem(${item.id})" title="Видалити">🗑</button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            // ===== ЕКСПОРТ =====
            function exportToXlsx() {
                window.location.href = '/equipment/api/export';
            }
            window.exportToXlsx = exportToXlsx;

            // ===== МОДАЛЬНІ ВІКНА =====
            function openAddModal() {
                document.getElementById('eqName').value = '';
                document.getElementById('eqQuantity').value = '0';
                document.getElementById('eqUnit').value = 'шт.';
                document.getElementById('eqCrew').value = '';
                document.getElementById('eqLocation').value = '';
                document.getElementById('eqCategory').value = '';
                document.getElementById('addModal').classList.add('open');
            }
            window.openAddModal = openAddModal;

            async function addItem() {
                const name = document.getElementById('eqName').value.trim();
                const quantity = parseInt(document.getElementById('eqQuantity').value) || 0;
                const unit = document.getElementById('eqUnit').value.trim() || 'шт.';
                const crew = document.getElementById('eqCrew').value;
                const location = document.getElementById('eqLocation').value.trim();
                const category = document.getElementById('eqCategory').value.trim();
                if (!name) { showToast("Введіть назву", "err"); return; }
                const res = await fetch('/equipment/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, quantity, unit, crew, location, category })
                });
                if (res.ok) {
                    closeModal('addModal');
                    currentPage = 0;
                    await loadData();
                    showToast("Додано", "ok");
                } else {
                    const err = await res.text();
                    showToast("Помилка: " + err, "err");
                }
            }
            window.addItem = addItem;

            function openEditItemModal(id) {
                const item = allItems.find(i => i.id === id);
                if (!item) return;
                document.getElementById('editItemId').value = item.id;
                document.getElementById('editItemName').value = item.name;
                document.getElementById('editItemQuantity').value = item.quantity;
                document.getElementById('editItemUnit').value = item.unit || 'шт.';
                document.getElementById('editItemCrew').value = item.crew || '';
                document.getElementById('editItemLocation').value = item.location || '';
                document.getElementById('editItemCategory').value = item.category || '';
                document.getElementById('editItemModal').classList.add('open');
            }
            window.openEditItemModal = openEditItemModal;

            async function updateFullItem() {
                const id = document.getElementById('editItemId').value;
                const name = document.getElementById('editItemName').value.trim();
                const quantity = parseInt(document.getElementById('editItemQuantity').value) || 0;
                const unit = document.getElementById('editItemUnit').value.trim() || 'шт.';
                const crew = document.getElementById('editItemCrew').value;
                const location = document.getElementById('editItemLocation').value.trim();
                const category = document.getElementById('editItemCategory').value.trim();
                if (!name) { showToast("Назва не може бути порожньою", "err"); return; }
                const res = await fetch(`/equipment/api/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, quantity, unit, crew, location, category })
                });
                if (res.ok) {
                    closeModal('editItemModal');
                    currentPage = 0;
                    await loadData();
                    showToast("Оновлено", "ok");
                } else {
                    const err = await res.text();
                    showToast("Помилка: " + err, "err");
                }
            }
            window.updateFullItem = updateFullItem;

            function deleteItem(id) {
                deleteTargetId = id;
                document.getElementById('confirmDeleteModal').classList.add('open');
            }
            window.deleteItem = deleteItem;

            document.getElementById('confirmDeleteBtn').onclick = async function() {
                if (!deleteTargetId) return;
                const res = await fetch(`/equipment/api/${deleteTargetId}`, { method: 'DELETE' });
                if (res.ok) {
                    currentPage = 0;
                    await loadData();
                    showToast("Видалено", "ok");
                } else {
                    const err = await res.text();
                    showToast("Помилка: " + err, "err");
                }
                closeModal('confirmDeleteModal');
                deleteTargetId = null;
            };

            function closeModal(id) {
                document.getElementById(id).classList.remove('open');
            }
            window.closeModal = closeModal;

            function showToast(msg, type) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.className = `toast ${type} show`;
                setTimeout(() => toast.classList.remove('show'), 2500);
            }
            window.showToast = showToast;

            // ===== ОБРОБНИКИ =====
            document.querySelectorAll('.modal-overlay, .confirm-overlay').forEach(el =>
                el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); })
            );

            document.getElementById('searchInput').addEventListener('input', onSearchInput);

            // ===== ІНІЦІАЛІЗАЦІЯ =====
            loadData();
        </script>
    </div>
</div>
<div th:replace="~{fragments :: sidebar-js}"></div>
</body>
</html>
