<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Майно / Склад</title>
    <style>
        /* ===== СТИЛІ ===== */
        .topbar { background: white; padding: 12px 20px; border-bottom: 1px solid #e0e0e0; font-size: 15px; font-weight: 600; color: #1a237e; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        .container { padding: 16px 20px; }
        .toolbar { background: white; padding: 12px 16px; border-radius: 8px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .btn { padding: 7px 14px; border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-primary { background: #1976d2; color: white; }
        .btn-primary:hover { background: #1565c0; }
        .btn-success { background: #388e3c; color: white; }
        .btn-success:hover { background: #2e7d32; }
        .btn-warning { background: #f57c00; color: white; }
        .btn-warning:hover { background: #e65100; }
        .btn-danger { background: #d32f2f; color: white; }
        .btn-danger:hover { background: #b71c1c; }
        .btn-sm { padding: 4px 9px; font-size: 11px; }
        select, input[type=text], input[type=number] { padding: 7px 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; font-family: inherit; }
        .search-input { width: 220px; }
        .table-wrap { overflow-x: auto; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 800px; }
        thead { background: #1a237e; color: white; }
        th { padding: 9px 8px; font-size: 12px; font-weight: 600; text-align: left; white-space: nowrap; cursor: pointer; user-select: none; }
        th:hover { background: #283593; }
        th.sort-asc::after { content: ' ▲'; font-size: 10px; }
        th.sort-desc::after { content: ' ▼'; font-size: 10px; }
        td { padding: 7px 8px; font-size: 12px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        tr:hover td { background: #f5f9ff; }

        /* Ширина колонок */
        .col-num { width: 40px; text-align: center; }
        .col-name { width: auto; min-width: 180px; }
        .col-quantity { width: 90px; text-align: center; }
        .col-unit { width: 70px; text-align: center; }
        .col-crew { width: 100px; text-align: center; }
        .col-location { width: 100px; text-align: center; }
        .col-category { width: 100px; text-align: center; }
        .col-actions { width: 100px; text-align: center !important; white-space: nowrap; }

        /* Кольорові неактивні блоки */
        .btn-quantity { background: #17a2b8; color: white; display: inline-block; padding: 4px 9px; border-radius: 5px; font-size: 11px; font-weight: 600; min-width: 50px; }
        .btn-unit { background: #28a745; color: white; display: inline-block; padding: 4px 9px; border-radius: 5px; font-size: 11px; font-weight: 600; }
        .btn-crew { background: #fd7e14; color: white; display: inline-block; padding: 4px 9px; border-radius: 5px; font-size: 11px; font-weight: 600; }
        .btn-location { background: #6f42c1; color: white; display: inline-block; padding: 4px 9px; border-radius: 5px; font-size: 11px; font-weight: 600; }
        .btn-category { background: #20c997; color: white; display: inline-block; padding: 4px 9px; border-radius: 5px; font-size: 11px; font-weight: 600; }
        .btn-empty { background: #6c757d; color: white; display: inline-block; padding: 4px 9px; border-radius: 5px; font-size: 11px; font-weight: 600; }

        /* Кнопки дій */
        .btn-edit, .btn-delete {
            display: inline-block !important;
            margin: 0 4px !important;
            padding: 4px 9px !important;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-edit { background: #fd7e14; color: white; }
        .btn-edit:hover { background: #e66a0b; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-delete:hover { background: #c82333; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: white; border-radius: 10px; padding: 24px; width: 600px; max-width: 96vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .modal h2 { margin: 0 0 18px; font-size: 17px; color: #1a237e; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group.full { grid-column: 1 / -1; }
        label { font-size: 12px; font-weight: 600; color: #555; }
        .form-group input, .form-group select { padding: 7px 9px; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; font-family: inherit; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
        .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1100; align-items: center; justify-content: center; }
        .confirm-overlay.open { display: flex; }
        .confirm-box { background: white; border-radius: 10px; padding: 24px; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .confirm-box p { margin: 0 0 16px; }
        .confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 18px; border-radius: 6px; color: white; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; z-index: 9999; }
        .toast.show { opacity: 1; }
        .toast.ok { background: #2e7d32; }
        .toast.err { background: #c62828; }
        .empty-state { text-align: center; padding: 40px; color: #999; }
    </style>
    <link th:replace="~{fragments :: sidebar-css}">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments :: sidebar('equipment')}"></div>
    <div class="main-content">
        <div class="container">
            <div class="toolbar">
                <h2 style="margin:0; flex:1;">📦 Облік майна / складу</h2>
                <input type="text" id="searchInput" class="search-input" placeholder="🔍 Пошук...">
                <button class="btn btn-success" onclick="openAddModal()">+ Додати позицію</button>
                <button class="btn btn-warning" onclick="exportToXlsx()" style="background:#f57c00;">📊 Експорт XLSX</button>
            </div>
            <div class="table-wrap">
                <table id="equipmentTable">
                    <thead>
                    <tr>
                        <th data-col="num" onclick="sortBy('num')" class="col-num">№</th>
                        <th data-col="name" onclick="sortBy('name')" class="col-name">Назва</th>
                        <th data-col="quantity" onclick="sortBy('quantity')" class="col-quantity">Кількість</th>
                        <th data-col="unit" onclick="sortBy('unit')" class="col-unit">Одиниць</th>
                        <th data-col="crew" onclick="sortBy('crew')" class="col-crew">Екіпаж</th>
                        <th data-col="location" onclick="sortBy('location')" class="col-location">Локація</th>
                        <th data-col="category" onclick="sortBy('category')" class="col-category">Категорія</th>
                        <th class="col-actions">Дії</th>
                    </tr>
                    </thead>
                    <tbody id="tableBody">
                    <tr><td colspan="8" class="empty-state">Завантаження...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Модальне вікно додавання -->
        <div class="modal-overlay" id="addModal">
            <div class="modal">
                <h2>➕ Нова позиція</h2>
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Назва *</label>
                        <input type="text" id="eqName" placeholder="Наприклад, Merops (нічний)">
                    </div>
                    <div class="form-group">
                        <label>Кількість</label>
                        <input type="number" id="eqQuantity" value="0">
                    </div>
                    <div class="form-group">
                        <label>Одиниця виміру</label>
                        <input type="text" id="eqUnit" placeholder="шт." value="шт.">
                    </div>
                    <div class="form-group">
                        <label>Екіпаж</label>
                        <select id="eqCrew">
                            <option value="">— Не вибрано —</option>
                            <option value="Скопа">Скопа</option>
                            <option value="Шуліка">Шуліка</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Локація</label>
                        <input type="text" id="eqLocation" placeholder="А0826">
                    </div>
                    <div class="form-group">
                        <label>Категорія</label>
                        <input type="text" id="eqCategory" placeholder="Дрони, Боєприпаси...">
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn" onclick="closeModal('addModal')" style="background:#eee">Скасувати</button>
                    <button class="btn btn-primary" onclick="addItem()">Додати</button>
                </div>
            </div>
        </div>

        <!-- Модальне вікно редагування всіх полів -->
        <div class="modal-overlay" id="editItemModal">
            <div class="modal">
                <h2>✏️ Редагувати позицію</h2>
                <input type="hidden" id="editItemId">
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Назва *</label>
                        <input type="text" id="editItemName">
                    </div>
                    <div class="form-group">
                        <label>Кількість</label>
                        <input type="number" id="editItemQuantity">
                    </div>
                    <div class="form-group">
                        <label>Одиниця виміру</label>
                        <input type="text" id="editItemUnit">
                    </div>
                    <div class="form-group">
                        <label>Екіпаж</label>
                        <select id="editItemCrew">
                            <option value="">— Не вибрано —</option>
                            <option value="Скопа">Скопа</option>
                            <option value="Шуліка">Шуліка</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Локація</label>
                        <input type="text" id="editItemLocation">
                    </div>
                    <div class="form-group">
                        <label>Категорія</label>
                        <input type="text" id="editItemCategory">
                    </div>
                </div>
                <div class="modal-actions">
                    <button class="btn" onclick="closeModal('editItemModal')" style="background:#eee">Скасувати</button>
                    <button class="btn btn-primary" onclick="updateFullItem()">Зберегти</button>
                </div>
            </div>
        </div>

        <!-- Підтвердження видалення -->
        <div class="confirm-overlay" id="confirmDeleteModal">
            <div class="confirm-box">
                <p>Видалити запис?</p>
                <div class="confirm-actions">
                    <button class="btn" onclick="closeModal('confirmDeleteModal')" style="background:#eee">Скасувати</button>
                    <button class="btn btn-danger" id="confirmDeleteBtn">Видалити</button>
                </div>
            </div>
        </div>

        <div class="toast" id="toast"></div>

        <script>
            let allItems = [];
            let filteredItems = [];
            let sortCol = 'num';
            let sortDir = 1;
            let searchTerm = '';
            let deleteTargetId = null;

            function filterAndSort() {
                let filtered = allItems;
                if (searchTerm.trim() !== '') {
                    const term = searchTerm.trim().toLowerCase();
                    filtered = allItems.filter(item =>
                        (item.name || '').toLowerCase().includes(term) ||
                        (item.crew || '').toLowerCase().includes(term) ||
                        (item.location || '').toLowerCase().includes(term) ||
                        (item.category || '').toLowerCase().includes(term)
                    );
                }
                filtered = [...filtered].sort((a, b) => {
                    let valA, valB;
                    if (sortCol === 'num') {
                        valA = a.id;
                        valB = b.id;
                    } else if (sortCol === 'name') {
                        valA = (a.name || '').toLowerCase();
                        valB = (b.name || '').toLowerCase();
                    } else if (sortCol === 'quantity') {
                        valA = a.quantity || 0;
                        valB = b.quantity || 0;
                    } else if (sortCol === 'unit') {
                        valA = (a.unit || '').toLowerCase();
                        valB = (b.unit || '').toLowerCase();
                    } else if (sortCol === 'crew') {
                        valA = (a.crew || '').toLowerCase();
                        valB = (b.crew || '').toLowerCase();
                    } else if (sortCol === 'location') {
                        valA = (a.location || '').toLowerCase();
                        valB = (b.location || '').toLowerCase();
                    } else {
                        valA = (a.category || '').toLowerCase();
                        valB = (b.category || '').toLowerCase();
                    }
                    if (valA < valB) return -1 * sortDir;
                    if (valA > valB) return 1 * sortDir;
                    return 0;
                });
                filteredItems = filtered;
                renderTable();
            }

            function renderTable() {
                const tbody = document.getElementById('tableBody');
                if (!filteredItems.length) {
                    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Список порожній. Додайте перше майно.</td></tr>';
                    return;
                }
                tbody.innerHTML = filteredItems.map((item, idx) => {
                    const unitVal = item.unit || 'шт.';
                    const unitClass = unitVal ? 'btn-unit' : 'btn-empty';
                    const crewVal = item.crew || '';
                    const crewClass = crewVal ? 'btn-crew' : 'btn-empty';
                    const locVal = item.location || '';
                    const locClass = locVal ? 'btn-location' : 'btn-empty';
                    const catVal = item.category || '';
                    const catClass = catVal ? 'btn-category' : 'btn-empty';
                    return `
                        <tr>
                            <td class="col-num">${idx + 1}</td>
                            <td class="col-name">${escapeHtml(item.name)}</td>
                            <td class="col-quantity"><span class="btn-quantity" style="cursor:default;">${item.quantity}</span></td>
                            <td class="col-unit"><span class="${unitClass}" style="cursor:default;">${escapeHtml(unitVal)}</span></td>
                            <td class="col-crew"><span class="${crewClass}" style="cursor:default;">${escapeHtml(crewVal) || '—'}</span></td>
                            <td class="col-location"><span class="${locClass}" style="cursor:default;">${escapeHtml(locVal) || '—'}</span></td>
                            <td class="col-category"><span class="${catClass}" style="cursor:default;">${escapeHtml(catVal) || '—'}</span></td>
                            <td class="col-actions">
                                <button class="btn-edit" onclick="openEditItemModal(${item.id})" title="Редагувати">✏️</button>
                                <button class="btn-delete" onclick="deleteItem(${item.id})" title="Видалити">🗑</button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            async function loadData() {
                const res = await fetch('/equipment/api');
                allItems = await res.json();
                filterAndSort();
                document.querySelectorAll('thead th[data-col]').forEach(th => {
                    th.classList.remove('sort-asc', 'sort-desc');
                    if (th.getAttribute('data-col') === sortCol) {
                        th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
                    }
                });
            }

            function sortBy(col) {
                if (sortCol === col) {
                    sortDir *= -1;
                } else {
                    sortCol = col;
                    sortDir = 1;
                }
                document.querySelectorAll('thead th[data-col]').forEach(th => {
                    th.classList.remove('sort-asc', 'sort-desc');
                    if (th.getAttribute('data-col') === col) {
                        th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
                    }
                });
                filterAndSort();
            }

            function onSearchInput() {
                searchTerm = document.getElementById('searchInput').value;
                filterAndSort();
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
            }

            function openAddModal() {
                document.getElementById('eqName').value = '';
                document.getElementById('eqQuantity').value = '0';
                document.getElementById('eqUnit').value = 'шт.';
                document.getElementById('eqCrew').value = '';
                document.getElementById('eqLocation').value = '';
                document.getElementById('eqCategory').value = '';
                document.getElementById('addModal').classList.add('open');
            }

            async function addItem() {
                const name = document.getElementById('eqName').value.trim();
                const quantity = parseInt(document.getElementById('eqQuantity').value) || 0;
                const unit = document.getElementById('eqUnit').value.trim() || 'шт.';
                const crew = document.getElementById('eqCrew').value;
                const location = document.getElementById('eqLocation').value.trim();
                const category = document.getElementById('eqCategory').value.trim();
                if (!name) { showToast("Введіть назву", "err"); return; }
                const res = await fetch('/equipment/api', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ name, quantity, unit, crew, location, category })
                });
                if (res.ok) {
                    closeModal('addModal');
                    await loadData();
                    showToast("Додано", "ok");
                } else {
                    const err = await res.text();
                    showToast("Помилка: " + err, "err");
                }
            }

            function openEditItemModal(id) {
                const item = allItems.find(i => i.id === id);
                if (!item) return;
                document.getElementById('editItemId').value = item.id;
                document.getElementById('editItemName').value = item.name;
                document.getElementById('editItemQuantity').value = item.quantity;
                document.getElementById('editItemUnit').value = item.unit || 'шт.';
                document.getElementById('editItemCrew').value = item.crew || '';
                document.getElementById('editItemLocation').value = item.location || '';
                document.getElementById('editItemCategory').value = item.category || '';
                document.getElementById('editItemModal').classList.add('open');
            }

            async function updateFullItem() {
                const id = document.getElementById('editItemId').value;
                const name = document.getElementById('editItemName').value.trim();
                const quantity = parseInt(document.getElementById('editItemQuantity').value) || 0;
                const unit = document.getElementById('editItemUnit').value.trim() || 'шт.';
                const crew = document.getElementById('editItemCrew').value;
                const location = document.getElementById('editItemLocation').value.trim();
                const category = document.getElementById('editItemCategory').value.trim();
                if (!name) { showToast("Назва не може бути порожньою", "err"); return; }
                const res = await fetch(`/equipment/api/${id}`, {
                    method: 'PUT',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ name, quantity, unit, crew, location, category })
                });
                if (res.ok) {
                    closeModal('editItemModal');
                    await loadData();
                    showToast("Оновлено", "ok");
                } else {
                    const err = await res.text();
                    showToast("Помилка: " + err, "err");
                }
            }

            function deleteItem(id) {
                deleteTargetId = id;
                document.getElementById('confirmDeleteModal').classList.add('open');
            }

            document.getElementById('confirmDeleteBtn').onclick = async function() {
                if (!deleteTargetId) return;
                const res = await fetch(`/equipment/api/${deleteTargetId}`, { method: 'DELETE' });
                if (res.ok) {
                    await loadData();
                    showToast("Видалено", "ok");
                } else {
                    const err = await res.text();
                    showToast("Помилка: " + err, "err");
                }
                closeModal('confirmDeleteModal');
                deleteTargetId = null;
            };

            function closeModal(id) {
                document.getElementById(id).classList.remove('open');
            }

            function showToast(msg, type) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.className = `toast ${type} show`;
                setTimeout(() => toast.classList.remove('show'), 2500);
            }

            function exportToXlsx() {
                window.location.href = '/equipment/api/export';
            }

            document.querySelectorAll('.modal-overlay, .confirm-overlay').forEach(el =>
                el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); })
            );

            document.getElementById('searchInput').addEventListener('input', onSearchInput);
            loadData();
        </script>
    </div>
</div>
<div th:replace="~{fragments :: sidebar-js}"></div>
</body>
</html>
