<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Конвертер бойових звітів</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        /* ===== CSS ЗМІННІ ===== */
        :root {
            --bg-body: #f5f5f5;
            --bg-card: #ffffff;
            --bg-toolbar: #ffffff;
            --bg-params: #e3f2fd;          /* замість зеленого - світло-синій */
            --bg-additional: #e3f2fd;      /* залишимо той самий синій */
            --bg-actions: #e3f2fd;         /* замість зеленого - світло-синій */
            --bg-status: #e3f2fd;
            --bg-json-panel: #fafafa;
            --bg-report-panel: #fafafa;
            --bg-textarea: #ffffff;
            --border-color: #ddd;
            --border-light: #ccc;
            --shadow-color: rgba(0,0,0,0.1);
            --text-primary: #333333;
            --text-secondary: #555555;
            --text-light: #999999;
            --text-white: #ffffff;
            --text-muted: #666666;
            --text-status: #1565c0;
            --text-status-error: #c62828;
            --btn-file-bg: #9C27B0;
            --btn-file-hover: #7B1FA2;
            --btn-convert-bg: #1976d2;     /* синій замість зеленого */
            --btn-convert-hover: #1565c0;
            --btn-copy-bg: #607D8B;
            --btn-copy-hover: #546E7A;
            --btn-clear-bg: #f44336;
            --btn-clear-hover: #d32f2f;
            --btn-save-txt-bg: #2196F3;
            --btn-save-txt-hover: #1976D2;
            --btn-save-docx-bg: #ff9800;
            --btn-save-docx-hover: #fb8c00;
            --btn-flight-bg: #6a1b9a;
            --btn-flight-hover: #4a148c;
            --border-header: #1976d2;      /* синій замість зеленого */
            --topbar-bg: #ffffff;
            --topbar-color: #1a237e;
            --separator-color: #ccc;
        }

        /* Темна тема */
        body.dark-theme {
            --bg-body: #1e1e24;
            --bg-card: #2d2d35;
            --bg-toolbar: #2d2d35;
            --bg-params: #1a2a3a;          /* темно-синій */
            --bg-additional: #1a2a3a;
            --bg-actions: #1a2a3a;         /* темно-синій */
            --bg-status: #1a2a3a;
            --bg-json-panel: #2d2d35;
            --bg-report-panel: #2d2d35;
            --bg-textarea: #3a3a44;
            --border-color: #3d3d48;
            --border-light: #3d3d48;
            --shadow-color: rgba(0,0,0,0.4);
            --text-primary: #e8e8ec;
            --text-secondary: #b0b0b8;
            --text-light: #88888f;
            --text-white: #ffffff;
            --text-muted: #a0a0a8;
            --text-status: #90caf9;
            --text-status-error: #ef9a9a;
            --btn-file-bg: #8e24aa;
            --btn-file-hover: #6a1b9a;
            --btn-convert-bg: #4a7ab5;     /* синій для темної теми */
            --btn-convert-hover: #5a8ac5;
            --btn-copy-bg: #4a5a6a;
            --btn-copy-hover: #5a6a7a;
            --btn-clear-bg: #8a2a2a;
            --btn-clear-hover: #6a1a1a;
            --btn-save-txt-bg: #1a5a8a;
            --btn-save-txt-hover: #2a6a9a;
            --btn-save-docx-bg: #8a5a1a;
            --btn-save-docx-hover: #9a6a2a;
            --btn-flight-bg: #4a1a6a;
            --btn-flight-hover: #5a2a7a;
            --border-header: #4a7ab5;      /* синій для темної теми */
            --topbar-bg: #2d2d35;
            --topbar-color: #90caf9;
            --separator-color: #3d3d48;
        }

        /* ===== ОСНОВНІ СТИЛІ ===== */
        .topbar {
            background: var(--topbar-bg);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 15px;
            font-weight: 600;
            color: var(--topbar-color);
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            margin: 0;
        }
        .container {
            max-width: 1400px;
            margin: 20px auto;
            background: var(--bg-card);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 10px var(--shadow-color);
            transition: background 0.3s, box-shadow 0.3s;
        }
        h1 {
            color: var(--text-primary);
            border-bottom: 2px solid var(--border-header);
            padding-bottom: 10px;
            margin-top: 0;
            transition: color 0.3s, border-color 0.3s;
        }

        /* ===== ПАНЕЛІ ПАРАМЕТРІВ ===== */
        .params-bar {
            background: var(--bg-params);
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            transition: background 0.3s;
        }
        .additional-bar {
            background: var(--bg-additional);
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            transition: background 0.3s;
        }
        .params-bar label,
        .additional-bar label {
            font-weight: bold;
            font-size: 13px;
            margin: 0;
            color: var(--text-secondary);
            transition: color 0.3s;
        }
        .params-bar select,
        .params-bar input,
        .additional-bar select,
        .additional-bar input {
            padding: 6px 10px;
            border-radius: 4px;
            border: 1px solid var(--border-light);
            font-size: 13px;
            background: var(--bg-textarea);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        .params-bar select { min-width: 220px; }
        .params-bar input { width: 80px; }
        .additional-bar input { width: 80px; }

        /* ===== КНОПКИ ===== */
        .file-button {
            background: var(--btn-file-bg);
            color: var(--text-white);
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .file-button:hover { background: var(--btn-file-hover); }

        .actions-bar {
            background: var(--bg-actions);
            padding: 10px 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            transition: background 0.3s;
        }
        .actions-bar button {
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            color: var(--text-white);
            transition: background 0.2s, opacity 0.2s;
        }
        .actions-bar button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .actions-bar .convert-btn {
            background: var(--btn-convert-bg);
        }
        .actions-bar .convert-btn:hover:not(:disabled) {
            background: var(--btn-convert-hover);
        }
        .actions-bar .save-txt {
            background: var(--btn-save-txt-bg);
        }
        .actions-bar .save-txt:hover:not(:disabled) {
            background: var(--btn-save-txt-hover);
        }
        .actions-bar .save-docx {
            background: var(--btn-save-docx-bg);
        }
        .actions-bar .save-docx:hover:not(:disabled) {
            background: var(--btn-save-docx-hover);
        }
        .actions-bar .copy-btn {
            background: var(--btn-copy-bg);
        }
        .actions-bar .copy-btn:hover:not(:disabled) {
            background: var(--btn-copy-hover);
        }
        .actions-bar .clear-btn {
            background: var(--btn-clear-bg);
        }
        .actions-bar .clear-btn:hover:not(:disabled) {
            background: var(--btn-clear-hover);
        }
        .actions-bar .save-flight-btn {
            background: var(--btn-flight-bg);
            color: var(--text-white);
        }
        .actions-bar .save-flight-btn:hover:not(:disabled) {
            background: var(--btn-flight-hover);
        }

        /* ===== СТАТУС ===== */
        .status {
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 4px;
            background: var(--bg-status);
            color: var(--text-status);
            font-size: 13px;
            transition: background 0.3s, color 0.3s;
        }
        .status.error {
            background: var(--bg-status);
            color: var(--text-status-error);
        }

        /* ===== СПЛІТ-ПАНЕЛЬ ===== */
        .split-pane {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .json-panel,
        .report-panel {
            flex: 1;
            min-width: 280px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 15px;
            background: var(--bg-json-panel);
            transition: background 0.3s, border-color 0.3s;
        }
        .report-panel {
            background: var(--bg-report-panel);
        }
        .json-panel h3,
        .report-panel h3 {
            margin-top: 0;
            color: var(--text-secondary);
            transition: color 0.3s;
        }
        textarea {
            width: 100%;
            height: 500px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            padding: 10px;
            resize: vertical;
            box-sizing: border-box;
            background: var(--bg-textarea);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }

        /* ===== РІЗНЕ ===== */
        .footer {
            margin-top: 20px;
            text-align: right;
            color: var(--text-light);
            font-size: 12px;
            border-top: 1px solid var(--border-color);
            padding-top: 10px;
            transition: color 0.3s, border-color 0.3s;
        }
        .file-input-wrapper {
            display: inline-block;
            position: relative;
        }
        .file-input-wrapper input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            left: 0;
            top: 0;
        }
        .separator {
            width: 1px;
            height: 30px;
            background: var(--separator-color);
            margin: 0 5px;
            transition: background 0.3s;
        }
        .additional-bar input#explosionArea { width: 150px; }

        /* ===== КОЛЬОРИ В ТЕМНІЙ ТЕМІ (ДОДАТКОВІ) ===== */
        .dark-theme .params-bar label,
        .dark-theme .additional-bar label {
            color: var(--text-secondary);
        }
        .dark-theme .params-bar select,
        .dark-theme .params-bar input,
        .dark-theme .additional-bar select,
        .dark-theme .additional-bar input {
            background: var(--bg-textarea);
            color: var(--text-primary);
            border-color: var(--border-light);
        }
        .dark-theme .json-panel,
        .dark-theme .report-panel {
            background: var(--bg-json-panel);
            border-color: var(--border-color);
        }
        .dark-theme .status {
            background: var(--bg-status);
            color: var(--text-status);
        }
        .dark-theme .status.error {
            background: var(--bg-status);
            color: var(--text-status-error);
        }
        .dark-theme .actions-bar {
            background: var(--bg-actions);
        }
        .dark-theme .file-button {
            background: var(--btn-file-bg);
        }
        .dark-theme .file-button:hover {
            background: var(--btn-file-hover);
        }
        .dark-theme .topbar {
            background: var(--topbar-bg);
            color: var(--topbar-color);
            border-bottom-color: var(--border-color);
        }
        .dark-theme .container {
            background: var(--bg-card);
        }
        .dark-theme h1 {
            color: var(--text-primary);
            border-bottom-color: var(--border-header);
        }
        .dark-theme .footer {
            color: var(--text-light);
            border-top-color: var(--border-color);
        }
        .dark-theme .separator {
            background: var(--separator-color);
        }
        .dark-theme textarea {
            background: var(--bg-textarea);
            color: var(--text-primary);
            border-color: var(--border-light);
        }
        .dark-theme .json-panel h3,
        .dark-theme .report-panel h3 {
            color: var(--text-secondary);
        }
    </style>
    <link th:replace="~{fragments :: sidebar-css}">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments :: sidebar('index')}"></div>
    <div class="main-content">
        <div class="container">
            <h1>📋 Конвертер бойових звітів JSON → TXT / DOCX</h1>

            <!-- ПЕРШИЙ РЯДОК: основні параметри -->
            <div class="params-bar">
                <div class="file-input-wrapper">
                    <button class="file-button">📂 Вибрати JSON</button>
                    <input type="file" id="fileInput" accept=".json">
                </div>
                <div class="separator"></div>
                <label>Формат:</label>
                <select id="format">
                    <option value="1">[1] Стандартний формат</option>
                    <option value="2">[2] Скорочений формат (Екіпаж/Ціль)</option>
                    <option value="3">[3] Детальний формат (Дійсним доповідаю)</option>
                </select>
                <label>Пілот:</label>
                <select id="pilot">
                    <option value="Костянтин БИТКА">Костянтин БИТКА</option>
                    <option value="Олександр ШЕПРУК">Олександр ШЕПРУК</option>
                </select>
            </div>

            <!-- ДРУГИЙ РЯДОК: додаткові параметри (А, Д, В, швидкість, район підриву) -->
            <div class="additional-bar">
                <label style="color: var(--text-status);">Азимут (А):</label>
                <input type="number" id="course" value="50" step="1" style="width: 60px;">
                <span>°</span>

                <label style="color: var(--text-status);">Дальність (Д):</label>
                <input type="number" id="distance" value="17900" step="100" style="width: 80px;">
                <span>м.</span>

                <label style="color: var(--text-status);">Висота (В):</label>
                <input type="number" id="altitude" value="2042" step="10" style="width: 80px;">
                <span>м.</span>

                <div class="separator"></div>

                <label>Швидкість цілі:</label>
                <input type="number" id="speed" value="160" step="10" style="width: 80px;">
                <span>км/год</span>

                <div class="separator"></div>

                <!-- НОВЕ ПОЛЕ: Район підриву -->
                <label>Район підриву:</label>
                <input type="text" id="explosionArea" value="Море" style="width: 150px;">
            </div>

            <!-- ТРЕТІЙ РЯДОК: кнопки дій -->
            <div class="actions-bar">
                <button id="convertBtn" class="convert-btn">🔄 Конвертувати</button>
                <button id="copyBtn" class="copy-btn">📋 Копіювати</button>
                <button id="saveFlightBtn" class="save-flight-btn" disabled>💾 В журнал БпАК</button>
                <button id="clearBtn" class="clear-btn">🗑 Очистити</button>
                <div class="separator"></div>
                <button id="saveTxtBtn" class="save-txt">📄 Зберегти TXT</button>
                <button id="saveDocxBtn" class="save-docx">📝 Зберегти DOCX</button>
            </div>

            <!-- СТАТУС ЗВЕРХУ -->
            <div class="status" id="status">
                ✅ Готовий до роботи. Вставте JSON або виберіть файл.
            </div>

            <div class="split-pane">
                <div class="json-panel">
                    <h3>📄 Вхідний JSON</h3>
                    <textarea id="jsonInput" placeholder="Вставте JSON або виберіть файл..."></textarea>
                </div>
                <div class="report-panel">
                    <h3>📝 Форматований звіт</h3>
                    <textarea id="reportOutput" readonly placeholder="Тут буде звіт..."></textarea>
                </div>
            </div>

            <div class="footer">
                by Serhii Kushnir
            </div>
        </div>

        <script>
            const jsonInput = document.getElementById('jsonInput');
            const reportOutput = document.getElementById('reportOutput');
            const statusDiv = document.getElementById('status');
            const formatSelect = document.getElementById('format');
            const pilotSelect = document.getElementById('pilot');
            const distanceInput = document.getElementById('distance');
            const speedInput = document.getElementById('speed');
            const courseInput = document.getElementById('course');
            const altitudeInput = document.getElementById('altitude');
            const explosionAreaInput = document.getElementById('explosionArea');
            const convertBtn = document.getElementById('convertBtn');
            const copyBtn = document.getElementById('copyBtn');
            const clearBtn = document.getElementById('clearBtn');
            const saveTxtBtn = document.getElementById('saveTxtBtn');
            const saveDocxBtn = document.getElementById('saveDocxBtn');
            const fileInput = document.getElementById('fileInput');

            let currentReportText = '';
            let lastReportObj = null;
            let lastRequest = null;
            let currentFilename = 'combat_report';

            function setStatus(message, isError = false) {
                statusDiv.innerHTML = message;
                statusDiv.className = 'status' + (isError ? ' error' : '');
            }

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    currentFilename = file.name.replace(/\.json$/i, '');
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        jsonInput.value = event.target.result;
                        setStatus('✅ JSON завантажено з файлу: ' + file.name);
                    };
                    reader.readAsText(file, 'UTF-8');
                    fileInput.value = '';
                }
            });

            convertBtn.addEventListener('click', async () => {
                const json = jsonInput.value.trim();
                if (!json) {
                    setStatus('❌ Будь ласка, введіть JSON або виберіть файл.', true);
                    return;
                }

                convertBtn.disabled = true;
                convertBtn.textContent = '⏳ Конвертація...';

                let reportObj;
                try {
                    reportObj = JSON.parse(json);
                } catch (parseError) {
                    setStatus('❌ Невірний JSON: ' + parseError.message, true);
                    convertBtn.disabled = false;
                    convertBtn.textContent = '🔄 Конвертувати';
                    return;
                }

                const targetAltitude = reportObj.altitude || 0;
                const explosionArea = explosionAreaInput.value.trim() || "Море";

                const requestBody = {
                    report: reportObj,
                    format: parseInt(formatSelect.value),
                    pilot: pilotSelect.value,
                    distance: parseInt(distanceInput.value),
                    speed: parseInt(speedInput.value),
                    course: parseInt(courseInput.value),
                    manualAltitude: parseInt(altitudeInput.value),
                    targetAltitude: targetAltitude,
                    explosionArea: explosionArea
                };

                try {
                    const response = await fetch('/convert', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(requestBody)
                    });

                    const text = await response.text();

                    if (!response.ok) {
                        setStatus('❌ ' + text, true);
                        return;
                    }

                    currentReportText = text;
                    reportOutput.value = currentReportText;
                    lastReportObj = reportObj;
                    lastRequest = requestBody;
                    document.getElementById('saveFlightBtn').disabled = false;
                    setStatus('✅ Конвертація виконана успішно! (' + currentReportText.split('\n').length + ' рядків)');
                } catch (error) {
                    setStatus('❌ Помилка мережі: ' + error.message, true);
                } finally {
                    convertBtn.disabled = false;
                    convertBtn.textContent = '🔄 Конвертувати';
                }
            });

            copyBtn.addEventListener('click', async () => {
                if (!reportOutput.value.trim()) {
                    setStatus('❌ Немає даних для копіювання.', true);
                    return;
                }
                try {
                    await navigator.clipboard.writeText(reportOutput.value);
                    setStatus('✅ Скопійовано в буфер обміну!');
                } catch (err) {
                    reportOutput.select();
                    document.execCommand('copy');
                    setStatus('✅ Скопійовано в буфер обміну!');
                }
            });

            clearBtn.addEventListener('click', () => {
                if (confirm('Очистити всі поля?')) {
                    jsonInput.value = '';
                    reportOutput.value = '';
                    currentReportText = '';
                    currentFilename = 'combat_report';
                    distanceInput.value = '17900';
                    speedInput.value = '160';
                    courseInput.value = '50';
                    altitudeInput.value = '2042';
                    explosionAreaInput.value = 'Море';
                    setStatus('✅ Всі поля очищено.');
                }
            });

            async function downloadFile(url, filename, report) {
                const formData = new URLSearchParams();
                formData.append('report', report);
                formData.append('filename', filename);
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formData
                    });
                    if (response.ok) {
                        const blob = await response.blob();
                        const downloadUrl = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = downloadUrl;
                        a.download = filename;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(downloadUrl);
                        return true;
                    }
                    return false;
                } catch (error) {
                    console.error('Download error:', error);
                    return false;
                }
            }

            saveTxtBtn.addEventListener('click', async () => {
                if (!currentReportText) {
                    setStatus('❌ Немає даних для збереження. Спочатку виконайте конвертацію.', true);
                    return;
                }
                const success = await downloadFile('/save/txt', currentFilename + '.txt', currentReportText);
                setStatus(success ? '✅ TXT звіт збережено!' : '❌ Помилка збереження TXT', !success);
            });

            saveDocxBtn.addEventListener('click', async () => {
                if (!currentReportText) {
                    setStatus('❌ Немає даних для збереження. Спочатку виконайте конвертацію.', true);
                    return;
                }
                const success = await downloadFile('/save/docx', currentFilename + '.docx', currentReportText);
                setStatus(success ? '✅ DOCX звіт збережено!' : '❌ Помилка збереження DOCX', !success);
            });

            document.getElementById('saveFlightBtn').addEventListener('click', async () => {
                if (!lastRequest) { setStatus('❌ Спочатку виконайте конвертацію.', true); return; }
                const btn = document.getElementById('saveFlightBtn');
                btn.disabled = true;
                btn.textContent = '⏳ Збереження...';
                try {
                    const res = await fetch('/save/flight', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(lastRequest)
                    });
                    const text = await res.text();
                    let data = {};
                    try { data = JSON.parse(text); } catch(e) { data = { error: text }; }
                    if (res.ok) {
                        setStatus('✅ ' + data.message + ' (id=' + data.id + '). <a href="/flights" style="color:var(--text-status)">Відкрити журнал →</a>');
                        btn.textContent = '✅ Збережено';
                    } else {
                        setStatus('❌ Помилка збереження: ' + (data.error || data.message || text), true);
                        btn.disabled = false;
                        btn.textContent = '💾 В журнал БпАК';
                    }
                } catch (err) {
                    setStatus('❌ Помилка мережі: ' + err.message, true);
                    btn.disabled = false;
                    btn.textContent = '💾 В журнал БпАК';
                }
            });
        </script>
    </div>
</div>
<div th:replace="~{fragments :: sidebar-js}"></div>
</body>
</html>
