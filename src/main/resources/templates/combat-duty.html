<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Бойове чергування</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        /* ===== СТИЛІ ===== */
        :root {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --bg-toolbar: #ffffff;
            --bg-table: #ffffff;
            --bg-table-header: #1a237e;
            --bg-input: #ffffff;
            --bg-modal: rgba(0,0,0,0.5);
            --bg-hover: #f5f9ff;
            --bg-confirm: #ffffff;
            --text-primary: #222222;
            --text-secondary: #555555;
            --text-light: #999999;
            --text-white: #ffffff;
            --border-color: #ccc;
            --border-light: #f0f0f0;
            --shadow-color: rgba(0,0,0,0.1);
            --shadow-strong: rgba(0,0,0,0.2);
            --toast-success: #2e7d32;
            --toast-error: #c62828;
            --btn-primary-bg: #1976d2;
            --btn-primary-hover: #1565c0;
            --btn-success-bg: #388e3c;
            --btn-success-hover: #2e7d32;
            --btn-warning-bg: #f57c00;
            --btn-warning-hover: #e65100;
            --btn-danger-bg: #d32f2f;
            --btn-danger-hover: #b71c1c;
            --btn-duplicate-bg: #6c757d;
            --btn-duplicate-hover: #5a6268;
        }

        body.dark-theme {
            --bg-body: #1e1e24;
            --bg-card: #2d2d35;
            --bg-toolbar: #2d2d35;
            --bg-table: #2d2d35;
            --bg-table-header: #2a2a3a;
            --bg-input: #3a3a44;
            --bg-modal: rgba(0,0,0,0.7);
            --bg-hover: #3a3a44;
            --bg-confirm: #2d2d35;
            --text-primary: #e8e8ec;
            --text-secondary: #b0b0b8;
            --text-light: #88888f;
            --text-white: #ffffff;
            --border-color: #3d3d48;
            --border-light: #3d3d48;
            --shadow-color: rgba(0,0,0,0.4);
            --shadow-strong: rgba(0,0,0,0.5);
            --btn-primary-bg: #4a7ab5;
            --btn-primary-hover: #5a8ac5;
            --btn-success-bg: #3a6a3a;
            --btn-success-hover: #4a7a4a;
            --btn-warning-bg: #b87a2a;
            --btn-warning-hover: #c88a3a;
            --btn-danger-bg: #a03040;
            --btn-danger-hover: #b04050;
            --btn-duplicate-bg: #4a5a6a;
            --btn-duplicate-hover: #5a6a7a;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-primary); margin: 0; }
        .container { padding: 16px 20px; }

        .toolbar {
            background: var(--bg-toolbar);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 1px 4px var(--shadow-color);
        }
        .btn {
            padding: 7px 14px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--btn-primary-bg); color: var(--text-white); }
        .btn-primary:hover { background: var(--btn-primary-hover); }
        .btn-success { background: var(--btn-success-bg); color: var(--text-white); }
        .btn-success:hover { background: var(--btn-success-hover); }
        .btn-warning { background: var(--btn-warning-bg); color: var(--text-white); }
        .btn-warning:hover { background: var(--btn-warning-hover); }
        .btn-danger { background: var(--btn-danger-bg); color: var(--text-white); }
        .btn-danger:hover { background: var(--btn-danger-hover); }
        .btn-duplicate { background: var(--btn-duplicate-bg); color: var(--text-white); }
        .btn-duplicate:hover { background: var(--btn-duplicate-hover); }
        .btn-sm { padding: 4px 9px; font-size: 11px; }
        .btn-print { background: #607d8b; color: white; }
        .btn-print:hover { background: #546e7a; }

        .table-wrap {
            overflow-x: auto;
            border-radius: 8px;
            box-shadow: 0 1px 4px var(--shadow-color);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-table);
            min-width: 1500px;
        }
        thead {
            background: var(--bg-table-header);
            color: var(--text-white);
        }
        th {
            padding: 9px 8px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }
        th:hover { background: var(--bg-hover); }
        th.sort-asc::after { content: ' ▲'; font-size: 10px; }
        th.sort-desc::after { content: ' ▼'; font-size: 10px; }

        td {
            padding: 7px 8px;
            font-size: 12px;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-primary);
            vertical-align: middle;
            text-align: center;
        }
        td.text-left {
            text-align: left;
        }
        tr:hover td { background: var(--bg-hover); }
        .num-col { text-align: center; min-width: 50px; }

        td.personnel-cell {
            white-space: normal;
            word-break: break-word;
            max-width: 250px;
            min-width: 120px;
        }

        td.note-cell {
            white-space: normal;
            word-break: break-word;
            max-width: 300px;
            min-width: 150px;
            cursor: pointer;
            line-height: 1.4;
            max-height: 60px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            transition: max-height 0.2s ease;
        }
        td.note-cell.expanded {
            max-height: 500px;
            -webkit-line-clamp: unset;
            display: block;
        }
        td.note-cell:hover { color: var(--btn-primary-bg); }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-modal);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            width: 760px;
            max-width: 96vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px var(--shadow-strong);
        }
        .modal h2 { margin: 0 0 16px; font-size: 20px; color: var(--text-primary); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 7px 9px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .form-group input[type="number"] { width: 100px; }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }

        .toast {
            position: fixed; bottom: 20px; right: 20px; padding: 10px 18px; border-radius: 6px; color: white; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; z-index: 9999;
        }
        .toast.show { opacity: 1; }
        .toast.ok { background: var(--toast-success); }
        .toast.err { background: var(--toast-error); }
        .empty-state { text-align: center; padding: 40px; color: var(--text-light); }

        input[type="text"] { padding: 6px 10px; border: 1px solid var(--border-color); border-radius: 5px; font-size: 13px; background: var(--bg-input); color: var(--text-primary); }

        /* ===== СТИЛІ ДЛЯ ДРУКУ ===== */
        @media print {
            .sidebar,
            .toolbar,
            .no-print,
            .btn,
            .btn-print,
            .btn-success,
            .btn-primary,
            .btn-warning,
            .btn-danger,
            .btn-duplicate,
            .modal-overlay,
            input[type="text"],
            .search-input,
            button {
                display: none !important;
            }
            body {
                background: white !important;
                color: black !important;
                font-size: 10px !important;
            }
            .main-content {
                margin-left: 0 !important;
                padding: 0 !important;
            }
            .container {
                padding: 10px !important;
                max-width: 100% !important;
            }
            .table-wrap {
                box-shadow: none !important;
                border: 1px solid #ccc !important;
                border-radius: 0 !important;
                overflow: visible !important;
            }
            table {
                background: white !important;
                width: 100% !important;
                border-collapse: collapse;
                font-size: 8px !important;
            }
            thead {
                background: #1a237e !important;
                color: white !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            thead th {
                background: #1a237e !important;
                color: white !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                padding: 4px 4px !important;
                font-size: 8px !important;
                border: 1px solid #1a237e !important;
                text-align: center !important;
            }
            td {
                color: black !important;
                border: 1px solid #ddd !important;
                font-size: 7px !important;
                padding: 3px 3px !important;
                line-height: 1.3 !important;
                background: white !important;
                text-align: center !important;
            }
            td.text-left {
                text-align: left !important;
            }
            td.personnel-cell,
            td.note-cell {
                max-height: none !important;
                overflow: visible !important;
                -webkit-line-clamp: unset !important;
                display: table-cell !important;
                white-space: normal !important;
                word-break: normal !important;
            }
            td:last-child,
            th:last-child {
                display: none !important;
            }
            tr {
                page-break-inside: avoid;
            }
            .dark-theme td {
                color: black !important;
                background: white !important;
            }
            .dark-theme thead {
                background: #1a237e !important;
                color: white !important;
            }
            .dark-theme thead th {
                background: #1a237e !important;
                color: white !important;
            }
            @page {
                size: landscape;
                margin: 0.8cm 0.5cm;
            }
        }
    </style>
    <link th:replace="~{fragments :: sidebar-css}">
</head>
<body>
<div class="layout">
    <div th:replace="~{fragments :: sidebar('combat-duty')}"></div>
    <div class="main-content">
        <div class="container">
            <div class="toolbar">
                <input type="text" id="searchInput" placeholder="🔍 Пошук..." style="width:220px;">
                <button class="btn btn-success" onclick="openAddModal()">+ Додати</button>
                <button class="btn btn-primary" onclick="exportXlsx()">📊 Експорт</button>
                <button class="btn btn-print" onclick="window.print()">🖨️ Друк</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th data-col="id" onclick="sortBy('id')" style="min-width:40px;">№</th>
                        <th data-col="startTime" onclick="sortBy('startTime')" style="min-width:130px;">Початок</th>
                        <th data-col="endTime" onclick="sortBy('endTime')" style="min-width:130px;">Кінець</th>
                        <th data-col="unitName" onclick="sortBy('unitName')" style="min-width:80px;">Екіпаж</th>
                        <th data-col="commander" onclick="sortBy('commander')" style="min-width:160px;">Командир</th>
                        <th data-col="pilot" onclick="sortBy('pilot')" style="min-width:140px;">Пілот</th>
                        <th data-col="navigator" onclick="sortBy('navigator')" style="min-width:140px;">Штурман</th>
                        <th data-col="technician" onclick="sortBy('technician')" style="min-width:140px;">Технік</th>
                        <th data-col="weapons" onclick="sortBy('weapons')" style="min-width:120px;">Озброєння</th>
                        <th data-col="dutyOfficer" onclick="sortBy('dutyOfficer')" style="min-width:140px;">Черговий ПУ</th>
                        <th data-col="reportSummary" onclick="sortBy('reportSummary')" style="min-width:200px;">Доповідь</th>
                        <th data-col="totalSorties" onclick="sortBy('totalSorties')" style="min-width:60px;" class="num-col">Вильотів</th>
                        <th data-col="combatSorties" onclick="sortBy('combatSorties')" style="min-width:60px;" class="num-col">Бойових</th>
                        <th data-col="losses" onclick="sortBy('losses')" style="min-width:60px;" class="num-col">Втрат</th>
                        <th data-col="destructions" onclick="sortBy('destructions')" style="min-width:60px;" class="num-col">Знищень</th>
                        <th data-col="ntp" onclick="sortBy('ntp')" style="min-width:60px;" class="num-col">НТП</th>
                        <th style="min-width:120px;">Дії</th>
                    </tr>
                    </thead>
                    <tbody id="tableBody">
                    <tr><td colspan="17" class="empty-state">Завантаження...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- МОДАЛЬНЕ ВІКНО -->
<div class="modal-overlay" id="formModal">
    <div class="modal">
        <h2 id="formModalTitle">Додати чергування</h2>
        <input type="hidden" id="editId">
        <div class="form-row">
            <div class="form-group">
                <label>Початок *</label>
                <input type="datetime-local" id="fStartTime" required>
            </div>
            <div class="form-group">
                <label>Кінець *</label>
                <input type="datetime-local" id="fEndTime" required>
            </div>
        </div>
        <div class="form-group">
            <label>Екіпаж</label>
            <input type="text" id="fUnitName" placeholder="СКОПА" value="СКОПА">
        </div>
        <div class="form-group">
            <label>Командир екіпажу</label>
            <input type="text" id="fCommander" placeholder="ст. сержант ШЕПРУК Олександр Васильович">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Пілот</label>
                <input type="text" id="fPilot" placeholder="солдат БИТКА Костянтин Романович">
            </div>
            <div class="form-group">
                <label>Штурман</label>
                <input type="text" id="fNavigator" placeholder="ст. солдат КУШНІР Сергій Олегович">
            </div>
        </div>
        <div class="form-group">
            <label>Технік</label>
            <input type="text" id="fTechnician" placeholder="солдат ЛИПАЧ Олександр Вікторович">
        </div>
        <div class="form-group">
            <label>Озброєння</label>
            <input type="text" id="fWeapons" placeholder="Shulika Kupol – 2 шт.; Werewolf – 1 шт.">
        </div>
        <div class="form-group">
            <label>Черговий вищестоящого ПУ</label>
            <input type="text" id="fDutyOfficer" placeholder="полковник Петро Крикун">
        </div>
        <div class="form-group">
            <label>Доповідь про чергування</label>
            <textarea id="fReportSummary" rows="3" placeholder="Доповідаю, що під час мого чергування..."></textarea>
        </div>

        <div class="form-row-3">
            <div class="form-group">
                <label>Вильотів</label>
                <input type="number" id="fTotalSorties" value="0" min="0">
            </div>
            <div class="form-group">
                <label>Бойових</label>
                <input type="number" id="fCombatSorties" value="0" min="0">
            </div>
            <div class="form-group">
                <label>Втрат</label>
                <input type="number" id="fLosses" value="0" min="0">
            </div>
        </div>
        <div class="form-row-3">
            <div class="form-group">
                <label>Знищень</label>
                <input type="number" id="fDestructions" value="0" min="0">
            </div>
            <div class="form-group">
                <label>НТП</label>
                <input type="number" id="fNtp" value="0" min="0">
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn" onclick="closeModal('formModal')" style="background:#eee;">Скасувати</button>
            <button class="btn btn-primary" onclick="saveDuty()">Зберегти</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script th:replace="~{fragments :: sidebar-js}"></script>
<script>
    let allDuties = [];
    let sortCol = 'id';
    let sortDir = 1;

    async function loadData() {
        try {
            const res = await fetch('/combat-duty/api');
            if (!res.ok) { showToast('Помилка завантаження', 'err'); return; }
            allDuties = await res.json();
            applyFilterAndSort();
        } catch (e) {
            console.error(e);
            showToast('Помилка мережі', 'err');
        }
    }

    function applyFilterAndSort() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        let filtered = allDuties;
        if (q) {
            filtered = allDuties.filter(d =>
                (d.commander && d.commander.toLowerCase().includes(q)) ||
                (d.pilot && d.pilot.toLowerCase().includes(q)) ||
                (d.navigator && d.navigator.toLowerCase().includes(q)) ||
                (d.technician && d.technician.toLowerCase().includes(q)) ||
                (d.unitName && d.unitName.toLowerCase().includes(q)) ||
                (d.weapons && d.weapons.toLowerCase().includes(q)) ||
                (d.dutyOfficer && d.dutyOfficer.toLowerCase().includes(q)) ||
                (d.reportSummary && d.reportSummary.toLowerCase().includes(q))
            );
        }
        if (sortCol) {
            filtered.sort((a, b) => {
                let va = getSortValue(a, sortCol);
                let vb = getSortValue(b, sortCol);
                if (va < vb) return -1 * sortDir;
                if (va > vb) return 1 * sortDir;
                return 0;
            });
        }
        renderTable(filtered);
    }

    function getSortValue(obj, col) {
        switch(col) {
            case 'id': return obj.id || 0;
            case 'startTime': return obj.startTime || '';
            case 'endTime': return obj.endTime || '';
            case 'unitName': return (obj.unitName || '').toLowerCase();
            case 'commander': return (obj.commander || '').toLowerCase();
            case 'pilot': return (obj.pilot || '').toLowerCase();
            case 'navigator': return (obj.navigator || '').toLowerCase();
            case 'technician': return (obj.technician || '').toLowerCase();
            case 'weapons': return (obj.weapons || '').toLowerCase();
            case 'dutyOfficer': return (obj.dutyOfficer || '').toLowerCase();
            case 'reportSummary': return (obj.reportSummary || '').toLowerCase();
            case 'totalSorties': return obj.totalSorties || 0;
            case 'combatSorties': return obj.combatSorties || 0;
            case 'losses': return obj.losses || 0;
            case 'destructions': return obj.destructions || 0;
            case 'ntp': return obj.ntp || 0;
            default: return '';
        }
    }

    function sortBy(col) {
        if (sortCol === col) {
            sortDir *= -1;
        } else {
            sortCol = col;
            sortDir = 1;
        }
        document.querySelectorAll('thead th[data-col]').forEach(th => {
            th.classList.remove('sort-asc', 'sort-desc');
            if (th.dataset.col === col) {
                th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
            }
        });
        applyFilterAndSort();
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        if (!data || !data.length) {
            tbody.innerHTML = '<tr><td colspan="17" class="empty-state">Чергувань немає. Додайте перше!</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(d => {
            const start = d.startTime ? new Date(d.startTime).toLocaleString('uk-UA', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
            const end = d.endTime ? new Date(d.endTime).toLocaleString('uk-UA', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
            const summary = d.reportSummary || '—';
            return `<tr>
                <td>${d.id}</td>
                <td>${start}</td>
                <td>${end}</td>
                <td>${escapeHtml(d.unitName || 'СКОПА')}</td>
                <td class="text-left personnel-cell">${escapeHtml(d.commander || '—')}</td>
                <td class="text-left personnel-cell">${escapeHtml(d.pilot || '—')}</td>
                <td class="text-left personnel-cell">${escapeHtml(d.navigator || '—')}</td>
                <td class="text-left personnel-cell">${escapeHtml(d.technician || '—')}</td>
                <td>${escapeHtml(d.weapons || '—')}</td>
                <td>${escapeHtml(d.dutyOfficer || '—')}</td>
                <td class="text-left note-cell" onclick="this.classList.toggle('expanded')" title="Натисни щоб розгорнути">${escapeHtml(summary)}</td>
                <td class="num-col">${d.totalSorties ?? 0}</td>
                <td class="num-col">${d.combatSorties ?? 0}</td>
                <td class="num-col">${d.losses ?? 0}</td>
                <td class="num-col">${d.destructions ?? 0}</td>
                <td class="num-col">${d.ntp ?? 0}</td>
                <td>
                    <button class="btn btn-warning btn-sm" onclick="openEditModal(${d.id})" title="Редагувати">✏️</button>
                    <button class="btn btn-duplicate btn-sm" onclick="duplicateDuty(${d.id})" title="Дублювати">📋</button>
                    <button class="btn btn-danger btn-sm" onclick="confirmDelete(${d.id})" title="Видалити">🗑</button>
                </td>
            </tr>`;
        }).join('');
    }

    // ===== ДУБЛЮВАННЯ =====
    function duplicateDuty(id) {
        const duty = allDuties.find(d => d.id === id);
        if (!duty) return;
        document.getElementById('formModalTitle').textContent = '📋 Дублювати чергування';
        document.getElementById('editId').value = ''; // очищуємо ID, щоб створився новий запис
        document.getElementById('fStartTime').value = duty.startTime ? duty.startTime.substring(0,16) : '';
        document.getElementById('fEndTime').value = duty.endTime ? duty.endTime.substring(0,16) : '';
        document.getElementById('fUnitName').value = duty.unitName || 'СКОПА';
        document.getElementById('fCommander').value = duty.commander || '';

    // ===== ФОРМА =====
    function openAddModal() {
        document.getElementById('formModalTitle').textContent = '➕ Додати чергування';
        document.getElementById('editId').value = '';
        ['fStartTime','fEndTime','fUnitName','fCommander','fPilot','fNavigator','fTechnician','fWeapons','fDutyOfficer','fReportSummary',
            'fTotalSorties','fCombatSorties','fLosses','fDestructions','fNtp'
        ].forEach(id => {
            const el = document.getElementById(id);
            if (el && el.type === 'number') el.value = '0';
            else if (el) el.value = '';
        });
        document.getElementById('fUnitName').value = 'СКОПА';
        openModal('formModal');
    }

    function openEditModal(id) {
        const duty = allDuties.find(d => d.id === id);
        if (!duty) return;
        document.getElementById('formModalTitle').textContent = '✏️ Редагувати чергування';
        document.getElementById('editId').value = id;
        document.getElementById('fStartTime').value = duty.startTime ? duty.startTime.substring(0,16) : '';
        document.getElementById('fEndTime').value = duty.endTime ? duty.endTime.substring(0,16) : '';
        document.getElementById('fUnitName').value = duty.unitName || 'СКОПА';
        document.getElementById('fCommander').value = duty.commander || '';
        document.getElementById('fPilot').value = duty.pilot || '';
        document.getElementById('fNavigator').value = duty.navigator || '';
        document.getElementById('fTechnician').value = duty.technician || '';
        document.getElementById('fWeapons').value = duty.weapons || '';
        document.getElementById('fDutyOfficer').value = duty.dutyOfficer || '';
        document.getElementById('fReportSummary').value = duty.reportSummary || '';
        document.getElementById('fTotalSorties').value = duty.totalSorties ?? 0;
        document.getElementById('fCombatSorties').value = duty.combatSorties ?? 0;
        document.getElementById('fLosses').value = duty.losses ?? 0;
        document.getElementById('fDestructions').value = duty.destructions ?? 0;
        document.getElementById('fNtp').value = duty.ntp ?? 0;
        openModal('formModal');
    }

    async function saveDuty() {
        const id = document.getElementById('editId').value;
        const body = {
            startTime: document.getElementById('fStartTime').value,
            endTime: document.getElementById('fEndTime').value,
            unitName: document.getElementById('fUnitName').value.trim() || 'СКОПА',
            commander: document.getElementById('fCommander').value.trim(),
            pilot: document.getElementById('fPilot').value.trim(),
            navigator: document.getElementById('fNavigator').value.trim(),
            technician: document.getElementById('fTechnician').value.trim(),
            weapons: document.getElementById('fWeapons').value.trim(),
            dutyOfficer: document.getElementById('fDutyOfficer').value.trim(),
            reportSummary: document.getElementById('fReportSummary').value.trim(),
            totalSorties: parseInt(document.getElementById('fTotalSorties').value) || 0,
            combatSorties: parseInt(document.getElementById('fCombatSorties').value) || 0,
            losses: parseInt(document.getElementById('fLosses').value) || 0,
            destructions: parseInt(document.getElementById('fDestructions').value) || 0,
            ntp: parseInt(document.getElementById('fNtp').value) || 0
        };
        if (!body.startTime || !body.endTime) {
            showToast('Вкажіть час початку та кінця', 'err');
            return;
        }
        const url = id ? `/combat-duty/api/${id}` : '/combat-duty/api';
        const method = id ? 'PUT' : 'POST';
        try {
            const res = await fetch(url, {
                method: method,
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify(body)
            });
            if (res.ok) {
                closeModal('formModal');
                await loadData();
                showToast(id ? 'Чергування оновлено' : 'Чергування додано', 'ok');
            } else {
                const err = await res.text();
                showToast('Помилка: ' + err, 'err');
            }
        } catch(e) {
            showToast('Помилка мережі', 'err');
        }
    }

    function confirmDelete(id) {
        if (!confirm('Видалити чергування?')) return;
        fetch(`/combat-duty/api/${id}`, { method: 'DELETE' })
            .then(res => {
                if (res.ok) {
                    loadData();
                    showToast('Видалено', 'ok');
                } else {
                    showToast('Помилка видалення', 'err');
                }
            })
            .catch(() => showToast('Помилка мережі', 'err'));
    }

    function exportXlsx() {
        const q = document.getElementById('searchInput').value.trim();
        let url = '/combat-duty/api/export';
        if (q) url += '?q=' + encodeURIComponent(q);
        window.location.href = url;
    }

    document.getElementById('searchInput').addEventListener('input', applyFilterAndSort);

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    document.querySelectorAll('.modal-overlay').forEach(el => {
        el.addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('open');
        });
    });

    function showToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast ${type} show`;
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    loadData();
</script>
