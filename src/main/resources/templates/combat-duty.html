<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Бойове чергування</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        /* ===== CSS ЗМІННІ ===== */
        :root {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --bg-toolbar: #ffffff;
            --bg-table: #ffffff;
            --bg-table-header: #1a237e;
            --bg-input: #ffffff;
            --bg-modal: rgba(0,0,0,0.5);
            --bg-hover: #f5f9ff;
            --bg-confirm: #ffffff;
            --bg-stat: #ffffff;
            --text-primary: #222222;
            --text-secondary: #555555;
            --text-light: #999999;
            --text-white: #ffffff;
            --text-muted: #666666;
            --border-color: #ccc;
            --border-light: #f0f0f0;
            --shadow-color: rgba(0,0,0,0.1);
            --shadow-strong: rgba(0,0,0,0.2);
            --shadow-light: rgba(0,0,0,0.05);
            --toast-success: #2e7d32;
            --toast-error: #c62828;
            --stat-num-color: #1976d2;
            --stat-num-hits: #2e7d32;
            --stat-num-loss: #d32f2f;
            --btn-primary-bg: #1565c0;
            --btn-primary-hover: #0d47a1;
            --btn-success-bg: #2e7d32;
            --btn-success-hover: #1b5e20;
            --btn-warning-bg: #e65100;
            --btn-warning-hover: #bf360c;
            --btn-danger-bg: #c62828;
            --btn-danger-hover: #b71c1c;
            --btn-duplicate-bg: #6c757d;
            --btn-duplicate-hover: #5a6268;
            --btn-print: #607d8b;
            --btn-print-hover: #546e7a;
            --btn-nav-bg: #e8eaf6;
            --btn-nav-color: #1a237e;
            --btn-today-bg: #1976d2;
            --btn-today-hover: #1565c0;
        }

        body.dark-theme {
            --bg-body: #1e1e24;
            --bg-card: #2d2d35;
            --bg-toolbar: #2d2d35;
            --bg-table: #2d2d35;
            --bg-table-header: #2a2a3a;
            --bg-input: #3a3a44;
            --bg-modal: rgba(0,0,0,0.7);
            --bg-hover: #3a3a44;
            --bg-confirm: #2d2d35;
            --bg-stat: #2d2d35;
            --text-primary: #e8e8ec;
            --text-secondary: #b0b0b8;
            --text-light: #88888f;
            --text-white: #ffffff;
            --text-muted: #a0a0a8;
            --border-color: #3d3d48;
            --border-light: #3d3d48;
            --shadow-color: rgba(0,0,0,0.4);
            --shadow-strong: rgba(0,0,0,0.5);
            --shadow-light: rgba(0,0,0,0.3);
            --stat-num-color: #5a8ac5;
            --stat-num-hits: #81c784;
            --stat-num-loss: #ef9a9a;
            --btn-primary-bg: #2a4a7a;
            --btn-primary-hover: #3a5a8a;
            --btn-success-bg: #2a4a2a;
            --btn-success-hover: #3a5a3a;
            --btn-warning-bg: #7a5a2a;
            --btn-warning-hover: #8a6a3a;
            --btn-danger-bg: #6a2a3a;
            --btn-danger-hover: #7a3a4a;
            --btn-duplicate-bg: #4a5a6a;
            --btn-duplicate-hover: #5a6a7a;
            --btn-print: #4a5a6a;
            --btn-print-hover: #5a6a7a;
            --btn-nav-bg: #3a3a4a;
            --btn-nav-color: #90caf9;
            --btn-today-bg: #4a7ab5;
            --btn-today-hover: #5a8ac5;
        }

        /* ===== ОСНОВНІ СТИЛІ ===== */
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-primary); margin: 0; }
        .container { padding: 16px 20px; }

        /* ===== АНІМАЦІЯ ПОЯВИ ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInRow {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .toolbar { animation: fadeIn 0.4s ease forwards; opacity: 0; }
        .stats-row { animation: fadeIn 0.4s ease forwards; opacity: 0; animation-delay: 0.05s; }
        .table-wrap { animation: fadeIn 0.5s ease forwards; opacity: 0; animation-delay: 0.10s; }
        .load-more-container { animation: fadeIn 0.4s ease forwards; opacity: 0; animation-delay: 0.15s; }
        .pagination { animation: fadeIn 0.4s ease forwards; opacity: 0; animation-delay: 0.20s; }

        /* Анімація рядків таблиці */
        #dutyTableBody tr {
            animation: fadeInRow 0.3s ease forwards;
            opacity: 0;
        }
        #dutyTableBody tr:nth-child(1) { animation-delay: 0.02s; }
        #dutyTableBody tr:nth-child(2) { animation-delay: 0.04s; }
        #dutyTableBody tr:nth-child(3) { animation-delay: 0.06s; }
        #dutyTableBody tr:nth-child(4) { animation-delay: 0.08s; }
        #dutyTableBody tr:nth-child(5) { animation-delay: 0.10s; }
        #dutyTableBody tr:nth-child(6) { animation-delay: 0.12s; }
        #dutyTableBody tr:nth-child(7) { animation-delay: 0.14s; }
        #dutyTableBody tr:nth-child(8) { animation-delay: 0.16s; }
        #dutyTableBody tr:nth-child(9) { animation-delay: 0.18s; }
        #dutyTableBody tr:nth-child(10) { animation-delay: 0.20s; }
        #dutyTableBody tr:nth-child(11) { animation-delay: 0.22s; }
        #dutyTableBody tr:nth-child(12) { animation-delay: 0.24s; }
        #dutyTableBody tr:nth-child(13) { animation-delay: 0.26s; }
        #dutyTableBody tr:nth-child(14) { animation-delay: 0.28s; }
        #dutyTableBody tr:nth-child(15) { animation-delay: 0.30s; }
        #dutyTableBody tr:nth-child(16) { animation-delay: 0.32s; }
        #dutyTableBody tr:nth-child(17) { animation-delay: 0.34s; }
        #dutyTableBody tr:nth-child(18) { animation-delay: 0.36s; }
        #dutyTableBody tr:nth-child(19) { animation-delay: 0.38s; }
        #dutyTableBody tr:nth-child(20) { animation-delay: 0.40s; }

        /* ===== ТУЛБАР ===== */
        .toolbar {
            background: var(--bg-toolbar);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            box-shadow: 0 1px 4px var(--shadow-color);
            transition: background 0.3s, box-shadow 0.3s;
        }

        /* ===== СТИЛІ КНОПОК З АНІМАЦІЄЮ ===== */
        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            line-height: 1.4;
            box-shadow: 0 1px 2px var(--shadow-light);
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px var(--shadow-color);
        }
        .btn:active {
            transform: translateY(1px);
        }
        .btn i { line-height: 1; }

        .btn-primary { background: var(--btn-primary-bg); color: var(--text-white); }
        .btn-primary:hover { background: var(--btn-primary-hover); }

        .btn-success { background: var(--btn-success-bg); color: var(--text-white); }
        .btn-success:hover { background: var(--btn-success-hover); }

        .btn-warning { background: var(--btn-warning-bg); color: var(--text-white); }
        .btn-warning:hover { background: var(--btn-warning-hover); }

        .btn-danger { background: var(--btn-danger-bg); color: var(--text-white); }
        .btn-danger:hover { background: var(--btn-danger-hover); }

        .btn-duplicate { background: var(--btn-duplicate-bg); color: var(--text-white); }
        .btn-duplicate:hover { background: var(--btn-duplicate-hover); }

        .btn-print { background: var(--btn-print); color: white; }
        .btn-print:hover { background: var(--btn-print-hover); }

        .btn-nav { background: var(--btn-nav-bg); color: var(--btn-nav-color); }
        .btn-nav:hover { background: var(--btn-nav-hover); }

        .btn-today { background: var(--btn-today-bg); color: white; }
        .btn-today:hover { background: var(--btn-today-hover); }

        .btn-sm { padding: 4px 9px; font-size: 11px; }

        select, input[type="text"], input[type="datetime-local"] {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 13px;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        input[type="number"] {
            padding: 6px 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 13px;
            background: var(--bg-input);
            color: var(--text-primary);
            width: 80px;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }

        .current-date {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 5px 12px;
            border-radius: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }

        #monthTitle {
            color: var(--text-primary);
            font-weight: 600;
            transition: color 0.3s;
        }

        /* ===== СТАТИСТИКА ===== */
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            width: 100%;
        }
        .stat-card {
            background: var(--bg-stat);
            border-radius: 8px;
            padding: 10px 16px;
            text-align: center;
            box-shadow: 0 1px 4px var(--shadow-color);
            min-width: 100px;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .stat-card .num {
            font-size: 26px;
            font-weight: bold;
            color: var(--stat-num-color);
            transition: color 0.3s;
        }
        .stat-card .lbl {
            font-size: 11px;
            color: var(--text-secondary);
            transition: color 0.3s;
        }
        .stat-card .num.hits { color: var(--stat-num-hits); }
        .stat-card .num.loss { color: var(--stat-num-loss); }

        /* ===== ФІКСАЦІЯ ЗАГОЛОВКА ТА ПЕРШИХ ДВОХ КОЛОНОК ===== */
        .table-wrap {
            overflow: auto;
            max-height: 75vh;
            position: relative;
            border-radius: 8px;
            box-shadow: 0 1px 4px var(--shadow-color);
            transition: box-shadow 0.3s;
        }
        .table-wrap table thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .table-wrap table thead th {
            background: var(--bg-table-header);
            color: var(--text-white);
            padding: 9px 8px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid var(--bg-table-header);
            transition: background 0.3s;
        }
        .table-wrap table thead th:hover {
            background: var(--bg-hover);
        }
        .table-wrap table thead th.sort-asc::after { content: ' ▲'; font-size: 10px; }
        .table-wrap table thead th.sort-desc::after { content: ' ▼'; font-size: 10px; }

        .table-wrap table td:first-child,
        .table-wrap table th:first-child {
            position: sticky;
            left: 0;
            z-index: 5;
            background: var(--bg-table);
            min-width: 40px;
            max-width: 40px;
        }
        .table-wrap table thead th:first-child {
            z-index: 11;
            background: var(--bg-table-header);
        }

        .table-wrap table td:nth-child(2),
        .table-wrap table th:nth-child(2) {
            position: sticky;
            left: 40px;
            z-index: 4;
            background: var(--bg-table);
            min-width: 130px;
            max-width: 130px;
        }
        .table-wrap table thead th:nth-child(2) {
            z-index: 11;
            background: var(--bg-table-header);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-table);
            min-width: 1500px;
            transition: background 0.3s;
        }
        td {
            padding: 7px 8px;
            font-size: 12px;
            border-bottom: 1px solid var(--border-light);
            color: var(--text-primary);
            vertical-align: middle;
            text-align: center;
            transition: border-color 0.3s, color 0.3s;
        }
        td.text-left { text-align: left; }
        tr:hover td { background: var(--bg-hover); }
        .num-col { text-align: center; min-width: 50px; }

        td.personnel-cell {
            white-space: normal;
            word-break: break-word;
            max-width: 250px;
            min-width: 120px;
        }
        td.note-cell {
            white-space: pre-wrap;
            word-break: break-word;
            max-width: 300px;
            min-width: 150px;
            cursor: pointer;
            line-height: 1.4;
            max-height: 60px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            transition: max-height 0.2s ease;
        }
        td.note-cell.expanded {
            max-height: none;
            -webkit-line-clamp: unset;
            display: block;
            overflow-y: auto;
        }
        td.note-cell:hover {
            color: var(--btn-primary-bg);
        }

        /* ===== МОДАЛЬНЕ ВІКНО ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-modal);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 24px;
            width: 760px;
            max-width: 96vw;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px var(--shadow-strong);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .modal h2 { margin: 0 0 16px; font-size: 20px; color: var(--text-primary); transition: color 0.3s; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; transition: color 0.3s; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 7px 9px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 13px;
            font-family: inherit;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }
        .form-group input[type="number"] { width: 100px; }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }

        /* ===== ТОАСТ ===== */
        .toast {
            position: fixed; bottom: 20px; right: 20px;
            padding: 10px 18px; border-radius: 6px;
            color: white; font-size: 13px; font-weight: 600;
            opacity: 0; transition: opacity 0.3s;
            z-index: 9999;
        }
        .toast.show { opacity: 1; }
        .toast.ok { background: var(--toast-success); }
        .toast.err { background: var(--toast-error); }
        .empty-state { text-align: center; padding: 40px; color: var(--text-light); transition: color 0.3s; }

        /* ===== ПАГІНАЦІЯ ===== */
        .pagination {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            padding: 8px 0;
        }
        .pagination button {
            padding: 4px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-card);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            color: var(--text-primary);
        }
        .pagination button:hover:not(:disabled) {
            background: var(--bg-hover);
            transform: translateY(-1px);
            box-shadow: 0 2px 6px var(--shadow-color);
        }
        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .pagination .page-info {
            font-size: 13px;
            color: var(--text-secondary);
            padding: 4px 8px;
        }

        /* ===== КНОПКА "ЗАВАНТАЖИТИ ЩЕ" (тільки знизу) ===== */
        .load-more-container {
            display: flex;
            justify-content: center;
            margin-top: 8px;
        }
        .load-more-container .btn {
            padding: 6px 18px;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 768px) {
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }
            .stats-row {
                flex-direction: column;
                align-items: stretch;
            }
            .stat-card {
                min-width: 80px;
                padding: 8px 12px;
            }
            .stat-card .num {
                font-size: 20px;
            }
            .modal {
                padding: 16px;
                width: 100%;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .form-row-3 {
                grid-template-columns: 1fr 1fr;
            }
            .table-wrap {
                max-height: 50vh;
            }
        }

        /* ===== ДРУК ===== */
        @media print {
            .sidebar, .toolbar, .stats-row, .no-print, .btn, .btn-print, .btn-success,
            .btn-primary, .btn-warning, .btn-danger, .btn-duplicate, .modal-overlay,
            input, select, button, .search-input, .current-date, #monthTitle,
            #prevBtn, #nextBtn, #todayBtn, #yearFilter, #monthFilter, #applyFilterBtn,
            #exportXlsxBtn, .pagination, .load-more-container {
                display: none !important;
            }
            body {
                background: white !important;
                color: black !important;
                font-size: 8px !important;
                margin: 0 !important;
                padding: 0 !important;
                overflow: visible !important;
            }
            .main-content {
                margin-left: 0 !important;
                padding: 0 !important;
                width: 100% !important;
            }
            .container {
                padding: 4px !important;
                max-width: 100% !important;
                margin: 0 !important;
            }
            .table-wrap {
                overflow: visible !important;
                box-shadow: none !important;
                border: none !important;
                border-radius: 0 !important;
                max-height: none !important;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
            }
            table {
                background: white !important;
                width: 100% !important;
                border-collapse: collapse !important;
                font-size: 6px !important;
                table-layout: auto !important;
                page-break-inside: avoid !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            thead {
                display: table-header-group !important;
                background: #1a237e !important;
                color: white !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            thead th {
                background: #1a237e !important;
                color: white !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                padding: 2px 3px !important;
                font-size: 5.5px !important;
                border: 1px solid #1a237e !important;
                text-align: center !important;
                white-space: nowrap !important;
                font-weight: bold !important;
            }
            /* Скидаємо sticky для друку */
            .table-wrap table td,
            .table-wrap table th,
            .table-wrap table td:first-child,
            .table-wrap table th:first-child,
            .table-wrap table td:nth-child(2),
            .table-wrap table th:nth-child(2) {
                position: static !important;
                left: auto !important;
                z-index: auto !important;
                background: white !important;
            }
            thead th:first-child,
            thead th:nth-child(2) {
                background: #1a237e !important;
                color: white !important;
            }
            /* Ширини колонок для друку */
            td:first-child,
            th:first-child {
                width: 25px !important;
                min-width: 25px !important;
                max-width: 25px !important;
                text-align: center !important;
            }
            td:nth-child(2),
            th:nth-child(2) {
                width: 80px !important;
                min-width: 80px !important;
                max-width: 80px !important;
                text-align: center !important;
            }
            td:nth-child(3),
            th:nth-child(3) {
                width: 80px !important;
                min-width: 80px !important;
                max-width: 80px !important;
                text-align: center !important;
            }
            /* Текстові колонки – більша ширина */
            td:nth-child(4), /* Екіпаж */
            td:nth-child(5), /* Командир */
            td:nth-child(6), /* Пілот */
            td:nth-child(7), /* Штурман */
            td:nth-child(8), /* Технік */
            td:nth-child(9), /* Озброєння */
            td:nth-child(10), /* Черговий ПУ */
            td:nth-child(11) { /* Доповідь */
                text-align: left !important;
                padding-left: 4px !important;
                padding-right: 4px !important;
                white-space: normal !important;
                min-width: 60px !important;
                max-width: 120px !important;
            }
            /* Числові колонки – центровані, вузькі */
            td:nth-child(12),
            td:nth-child(13),
            td:nth-child(14),
            td:nth-child(15),
            td:nth-child(16) {
                width: 35px !important;
                min-width: 30px !important;
                max-width: 40px !important;
                text-align: center !important;
            }
            /* Остання колонка (Дії) – ховаємо */
            td:last-child,
            th:last-child {
                display: none !important;
            }
            tr {
                page-break-inside: avoid !important;

<div class="layout">
    <div th:replace="~{fragments :: sidebar('combat-duty')}"></div>
    <div class="main-content">

                <select id="yearFilter">
                    <option value="">— Всі роки —</option>

                        <th data-col="pilot" onclick="sortBy('pilot')" style="min-width:140px;">Пілот</th>
                        <th data-col="navigator" onclick="sortBy('navigator')" style="min-width:140px;">Штурман</th>

                        <th data-col="dutyOfficer" onclick="sortBy('dutyOfficer')" style="min-width:140px;">Черговий ПУ</th>
                        <th data-col="reportSummary" onclick="sortBy('reportSummary')" style="min-width:200px;">Доповідь</th>
                        <th data-col="totalSorties" onclick="sortBy('totalSorties')" style="min-width:60px;" class="num-col">Вильотів</th>
                        <th data-col="combatSorties" onclick="sortBy('combatSorties')" style="min-width:60px;" class="num-col">Бойових</th>

                    </thead>

            <!-- КНОПКА "ЗАВАНТАЖИТИ ЩЕ" (тільки знизу) -->

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script th:replace="~{fragments :: sidebar-js}"></script>
<script>
    (function() {
        const UA_MONTHS = ['Січень','Лютий','Березень','Квітень','Травень','Червень',
            'Липень','Серпень','Вересень','Жовтень','Листопад','Грудень'];
        const today = new Date();
        let currentYear = today.getFullYear();
        let currentMonth = today.getMonth() + 1;

        let allDuties = [];
        let sortCol = 'id';
        let sortDir = -1;
        let searchQuery = '';
        let personnelList = [];

        // ПАГІНАЦІЯ
        let currentPage = 0;
        let pageSize = 20;
        let totalElements = 0;

        // ===== ЗАВАНТАЖЕННЯ ПЕРСОНАЛУ ДЛЯ СЕЛЕКТІВ =====
        async function loadPersonnelForSelects() {
            try {
                const res = await fetch('/personnel/api?page=0&size=1000');
                if (!res.ok) throw new Error('Network error');
                const pageData = await res.json();
                personnelList = pageData.content || [];
                populateSelect('fCommander', 'Командир', personnelList);
                populateSelect('fPilot', 'Пілот', personnelList);
                populateSelect('fNavigator', 'Штурман', personnelList);
                populateSelect('fTechnician', 'Технік', personnelList);
            } catch (err) {
                console.warn('Помилка завантаження персоналу:', err);
            }
        }

        function populateSelect(selectId, roleLabel, personnel) {
            const select = document.getElementById(selectId);
            if (!select) return;
            const sorted = [...personnel].sort((a, b) => (a.personnelNumber || 0) - (b.personnelNumber || 0));
            select.innerHTML = `<option value="">— Оберіть ${roleLabel.toLowerCase()} —</option>`;
            sorted.forEach(p => {
                const rank = (p.rank || '').toLowerCase();
                const fullName = p.fullName || (p.lastName + ' ' + p.firstName + ' ' + (p.middleName || '')).trim();
                const displayName = rank ? rank + ' ' + fullName : fullName;
                const opt = document.createElement('option');
                opt.value = displayName;
                opt.textContent = displayName;
                select.appendChild(opt);
            });
        }

        // ===== ІНІЦІАЛІЗАЦІЯ =====
        function updateCurrentDateDisplay() {
            const now = new Date();
            const day = String(now.getDate()).padStart(2,'0');
            const month = String(now.getMonth()+1).padStart(2,'0');
            const year = now.getFullYear();
            document.getElementById('currentDate').textContent = `📅 ${day}.${month}.${year}`;
        }
        updateCurrentDateDisplay();
        loadFilters();
        loadDuties();
        loadPersonnelForSelects();

        function loadFilters() {
            fetch('/combat-duty/api/years')
                .then(res => res.json())
                .then(years => {
                    const sel = document.getElementById('yearFilter');
                    years.forEach(y => {
                        const opt = document.createElement('option');
                        opt.value = y;
                        opt.textContent = y;
                        sel.appendChild(opt);
                    });
                })
                .catch(() => {});

            fetch('/combat-duty/api/months')
                .then(res => res.json())
                .then(months => {
                    const sel = document.getElementById('monthFilter');
                    months.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m;
                        opt.textContent = m;
                        sel.appendChild(opt);
                    });
                })
                .catch(() => {});
        }

        function loadDuties() {
            const yearVal = document.getElementById('yearFilter').value;
            const monthVal = document.getElementById('monthFilter').value;
            let url = '/combat-duty/api';
            const params = new URLSearchParams();
            if (yearVal) params.append('year', yearVal);
            if (monthVal) {
                const idx = UA_MONTHS.indexOf(monthVal);
                if (idx !== -1) params.append('month', idx + 1);
            }
            params.append('page', currentPage);
            params.append('size', pageSize);
            if (params.toString()) url += '?' + params.toString();

            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error('Network error');
                    return res.json();
                })
                .then(pageData => {
                    allDuties = pageData.content || [];
                    totalElements = pageData.totalElements || 0;
                    updateMonthTitle();
                    applyFiltersAndRender();
                    renderPagination();
                    updateLoadMoreButton();
                    loadGeneralStats();
                })
                .catch(err => {
                    console.error(err);
                    showToast('Помилка завантаження даних', 'err');
                });
        }

        function loadGeneralStats() {
            fetch('/combat-duty/api/general-stats')
                .then(res => res.json())
                .then(stats => {
                    document.getElementById('genTotal').textContent = stats.total || 0;
                })
                .catch(() => {
                    document.getElementById('genTotal').textContent = '—';
                });
        }

        function goToPage(page) {
            const totalPages = Math.ceil(totalElements / pageSize);
            if (page < 0 || page >= totalPages) return;
            currentPage = page;
            loadDuties();
        }
        window.goToPage = goToPage;

        function renderPagination() {
            const totalPages = Math.ceil(totalElements / pageSize);
            const pag = document.getElementById('pagination');
            let html = '';
            html += `<button onclick="goToPage(0)" ${currentPage === 0 ? 'disabled' : ''}>⏮</button>`;
            html += `<button onclick="goToPage(${currentPage - 1})" ${currentPage === 0 ? 'disabled' : ''}>◀</button>`;
            html += `<span class="page-info">Сторінка ${currentPage + 1} з ${totalPages} (всього ${totalElements} записів)</span>`;
            html += `<button onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>▶</button>`;
            html += `<button onclick="goToPage(${totalPages - 1})" ${currentPage >= totalPages - 1 ? 'disabled' : ''}>⏭</button>`;
            pag.innerHTML = html;
        }

        function updateLoadMoreButton() {
            const totalPages = Math.ceil(totalElements / pageSize);
            const btn = document.getElementById('loadMoreBtn');
            const remaining = totalElements - (currentPage + 1) * pageSize;
            if (remaining <= 0 || totalPages <= 1) {
                btn.disabled = true;
                btn.textContent = 'Всі завантажено';
            } else {
                const nextBatch = Math.min(20, remaining);
                btn.disabled = false;
                btn.textContent = `Завантажити ще ${nextBatch}`;
            }
        }

        function loadMore() {
            const totalPages = Math.ceil(totalElements / pageSize);
            if (currentPage < totalPages - 1) {
                const newSize = Math.min(pageSize + 20, totalElements);
                if (newSize > pageSize) {
                    pageSize = newSize;
                    currentPage = 0;
                    loadDuties();
                } else {
                    showToast('Всі записи вже завантажені', 'ok');
                }
            } else {
                showToast('Всі записи вже завантажені', 'ok');
            }
        }
        window.loadMore = loadMore;

        function updateMonthTitle() {
            const yearVal = document.getElementById('yearFilter').value;
            const monthVal = document.getElementById('monthFilter').value;
            let title = '';
            if (monthVal) {
                title = monthVal;
                if (yearVal) title += ' ' + yearVal;
            } else if (yearVal) {
                title = 'Весь ' + yearVal;
            } else {
                title = 'Всі періоди';
            }
            document.getElementById('monthTitle').textContent = title || 'Всі періоди';
        }

        // ПОШУК
        document.getElementById('searchInput').addEventListener('input', function() {
            searchQuery = this.value.toLowerCase().trim();
            applyFiltersAndRender();
        });

        // ФІЛЬТРИ + СОРТУВАННЯ
        function applyFiltersAndRender() {
            let filtered = allDuties;

            if (searchQuery) {
                filtered = filtered.filter(d => {
                    const idMatch = String(d.id).includes(searchQuery);
                    const startDate = d.startTime ? new Date(d.startTime).toLocaleDateString('uk-UA') : '';
                    const endDate = d.endTime ? new Date(d.endTime).toLocaleDateString('uk-UA') : '';
                    const startTime = d.startTime ? new Date(d.startTime).toLocaleTimeString('uk-UA', {hour:'2-digit', minute:'2-digit'}) : '';
                    const endTime = d.endTime ? new Date(d.endTime).toLocaleTimeString('uk-UA', {hour:'2-digit', minute:'2-digit'}) : '';
                    const fields = [
                        d.unitName, d.commander, d.pilot, d.navigator, d.technician,
                        d.weapons, d.dutyOfficer, d.reportSummary,
                        startDate, endDate, startTime, endTime
                    ];
                    const textMatch = fields.some(f => f && f.toLowerCase().includes(searchQuery));
                    return idMatch || textMatch;
                });
            }

            if (sortCol) {
                filtered.sort((a, b) => {
                    let va = getSortValue(a, sortCol);
                    let vb = getSortValue(b, sortCol);
                    if (typeof va === 'number' && typeof vb === 'number') {
                        return (va - vb) * sortDir;
                    }
                    va = String(va).toLowerCase();
                    vb = String(vb).toLowerCase();
                    if (va < vb) return -1 * sortDir;
                    if (va > vb) return 1 * sortDir;
                    return 0;
                });
            }

            renderTable(filtered);
            document.getElementById('pageTotal').textContent = filtered.length;

            document.querySelectorAll('#dutyTable thead th').forEach(th => {
                th.classList.remove('sort-asc', 'sort-desc');
                if (th.dataset.col === sortCol) {
                    th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
                }
            });
        }

        function getSortValue(row, col) {
            if (col === 'id') return row.id || 0;
            if (col === 'startTime' || col === 'endTime') {
                return row[col] ? new Date(row[col]).getTime() : 0;
            }
            const val = row[col];
            if (typeof val === 'string') return val.toLowerCase();
            return val || '';
        }

        window.sortBy = function(col) {
            if (sortCol === col) {
                sortDir *= -1;
            } else {
                sortCol = col;
                sortDir = -1;
            }
            applyFiltersAndRender();
        };

        function renderTable(data) {
            const tbody = document.getElementById('dutyTableBody');
            if (!data || !data.length) {
                tbody.innerHTML = '<tr><td colspan="17" class="empty-state">Чергувань немає</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(d => {
                const start = d.startTime ? new Date(d.startTime).toLocaleString('uk-UA', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
                const end = d.endTime ? new Date(d.endTime).toLocaleString('uk-UA', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
                const summary = d.reportSummary || '—';
                return `<tr>
                    <td>${d.id}</td>
                    <td>${start}</td>
                    <td>${end}</td>
                    <td>${escapeHtml(d.unitName || 'СКОПА')}</td>
                    <td class="text-left personnel-cell">${escapeHtml(d.commander || '—')}</td>
                    <td class="text-left personnel-cell">${escapeHtml(d.pilot || '—')}</td>
                    <td class="text-left personnel-cell">${escapeHtml(d.navigator || '—')}</td>
                    <td class="text-left personnel-cell">${escapeHtml(d.technician || '—')}</td>
                    <td>${escapeHtml(d.weapons || '—')}</td>
                    <td>${escapeHtml(d.dutyOfficer || '—')}</td>
                    <td class="text-left note-cell" onclick="this.classList.toggle('expanded')" title="Натисни щоб розгорнути">${escapeHtml(summary)}</td>
                    <td class="num-col">${d.totalSorties ?? 0}</td>
                    <td class="num-col">${d.combatSorties ?? 0}</td>
                    <td class="num-col">${d.losses ?? 0}</td>
                    <td class="num-col">${d.destructions ?? 0}</td>
                    <td class="num-col">${d.ntp ?? 0}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="openEditModal(${d.id})" title="Редагувати">✏️</button>
                        <button class="btn btn-duplicate btn-sm" onclick="duplicateDuty(${d.id})" title="Дублювати">📋</button>
                        <button class="btn btn-danger btn-sm" onclick="confirmDelete(${d.id})" title="Видалити">🗑</button>
                    </td>
                </tr>`;
            }).join('');
        }

        // НАВІГАЦІЯ
        function shiftMonth(delta) {
            const yearVal = document.getElementById('yearFilter').value;
            const monthVal = document.getElementById('monthFilter').value;
            let y = parseInt(yearVal) || currentYear;
            let m = monthVal ? UA_MONTHS.indexOf(monthVal) + 1 : currentMonth;
            if (m < 1) m = 1;
            m += delta;
            if (m > 12) { m = 1; y++; }
            if (m < 1) { m = 12; y--; }
            document.getElementById('yearFilter').value = y;
            document.getElementById('monthFilter').value = UA_MONTHS[m-1];
            currentPage = 0;
            loadDuties();
        }

        document.getElementById('prevBtn').onclick = () => shiftMonth(-1);
        document.getElementById('nextBtn').onclick = () => shiftMonth(1);
        document.getElementById('todayBtn').onclick = () => {
            const now = new Date();
            document.getElementById('yearFilter').value = now.getFullYear();
            document.getElementById('monthFilter').value = UA_MONTHS[now.getMonth()];
            currentPage = 0;
            loadDuties();
        };
        document.getElementById('applyFilterBtn').onclick = () => {
            currentPage = 0;
            loadDuties();
        };

        // ЕКСПОРТ
        document.getElementById('exportXlsxBtn').onclick = () => {
            const yearVal = document.getElementById('yearFilter').value;
            const monthVal = document.getElementById('monthFilter').value;
            const searchVal = document.getElementById('searchInput').value.trim();
            let url = '/combat-duty/api/export?';
            const params = new URLSearchParams();
            if (yearVal) params.append('year', yearVal);
            if (monthVal) {
                const idx = UA_MONTHS.indexOf(monthVal);
                if (idx !== -1) params.append('month', idx + 1);
            }
            if (searchVal) params.append('search', searchVal);
            url += params.toString();
            window.location.href = url;
        };

        // ===== ГЛОБАЛЬНІ ФУНКЦІЇ (викликаються з HTML) =====
        window.openAddModal = function() {
            document.getElementById('formModalTitle').textContent = '➕ Додати чергування';
            document.getElementById('editId').value = '';
            ['fStartTime','fEndTime','fUnitName','fWeapons','fDutyOfficer','fReportSummary',
                'fTotalSorties','fCombatSorties','fLosses','fDestructions','fNtp'
            ].forEach(id => {
                const el = document.getElementById(id);
                if (el && el.type === 'number') el.value = '0';
                else if (el) el.value = '';
            });
            document.getElementById('fUnitName').value = 'СКОПА';
            ['fCommander','fPilot','fNavigator','fTechnician'].forEach(id => {
                const sel = document.getElementById(id);
                if (sel) sel.value = '';
            });
            openModal('formModal');
        };

        window.duplicateDuty = function(id) {
            const duty = allDuties.find(d => d.id === id);
            if (!duty) return;
            document.getElementById('formModalTitle').textContent = '📋 Дублювати чергування';
            document.getElementById('editId').value = '';
            document.getElementById('fStartTime').value = duty.startTime ? duty.startTime.substring(0,16) : '';
            document.getElementById('fEndTime').value = duty.endTime ? duty.endTime.substring(0,16) : '';
            document.getElementById('fUnitName').value = duty.unitName || 'СКОПА';
            document.getElementById('fWeapons').value = duty.weapons || '';
            document.getElementById('fDutyOfficer').value = duty.dutyOfficer || '';
            document.getElementById('fReportSummary').value = duty.reportSummary || '';
            document.getElementById('fTotalSorties').value = duty.totalSorties ?? 0;
            document.getElementById('fCombatSorties').value = duty.combatSorties ?? 0;
            document.getElementById('fLosses').value = duty.losses ?? 0;
            document.getElementById('fDestructions').value = duty.destructions ?? 0;
            document.getElementById('fNtp').value = duty.ntp ?? 0;
            setSelectValue('fCommander', duty.commander);
            setSelectValue('fPilot', duty.pilot);
            setSelectValue('fNavigator', duty.navigator);
            setSelectValue('fTechnician', duty.technician);
            openModal('formModal');
        };

        window.openEditModal = function(id) {
            const duty = allDuties.find(d => d.id === id);
            if (!duty) return;
            document.getElementById('formModalTitle').textContent = '✏️ Редагувати чергування';
            document.getElementById('editId').value = id;
            document.getElementById('fStartTime').value = duty.startTime ? duty.startTime.substring(0,16) : '';
            document.getElementById('fEndTime').value = duty.endTime ? duty.endTime.substring(0,16) : '';
            document.getElementById('fUnitName').value = duty.unitName || 'СКОПА';
            document.getElementById('fWeapons').value = duty.weapons || '';
            document.getElementById('fDutyOfficer').value = duty.dutyOfficer || '';
            document.getElementById('fReportSummary').value = duty.reportSummary || '';
            document.getElementById('fTotalSorties').value = duty.totalSorties ?? 0;
            document.getElementById('fCombatSorties').value = duty.combatSorties ?? 0;
            document.getElementById('fLosses').value = duty.losses ?? 0;
            document.getElementById('fDestructions').value = duty.destructions ?? 0;
            document.getElementById('fNtp').value = duty.ntp ?? 0;
            setSelectValue('fCommander', duty.commander);
            setSelectValue('fPilot', duty.pilot);
            setSelectValue('fNavigator', duty.navigator);
            setSelectValue('fTechnician', duty.technician);
            openModal('formModal');
        };

        function setSelectValue(selectId, value) {
            const sel = document.getElementById(selectId);
            if (!sel) return;
            if (value) {
                const exists = Array.from(sel.options).some(opt => opt.value === value);
                if (!exists) {
                    const opt = document.createElement('option');
                    opt.value = value;
                    opt.textContent = value;
                    sel.appendChild(opt);
                }
                sel.value = value;
            } else {
                sel.value = '';
            }
        }

        window.saveDuty = async function() {
            const id = document.getElementById('editId').value;

            const commander = document.getElementById('fCommander').value;
            const pilot = document.getElementById('fPilot').value;
            const navigator = document.getElementById('fNavigator').value;
            const technician = document.getElementById('fTechnician').value;

            const roles = [commander, pilot, navigator, technician].filter(Boolean);
            const uniqueRoles = new Set(roles);
            if (uniqueRoles.size < roles.length) {
                showToast('Одна особа не може займати кілька посад у чергуванні', 'err');
                return;
            }

            const body = {
                startTime: document.getElementById('fStartTime').value,
                endTime: document.getElementById('fEndTime').value,
                unitName: document.getElementById('fUnitName').value.trim() || 'СКОПА',
                commander: commander,
                pilot: pilot,
                navigator: navigator,
                technician: technician,
                weapons: document.getElementById('fWeapons').value.trim(),
                dutyOfficer: document.getElementById('fDutyOfficer').value.trim(),
                reportSummary: document.getElementById('fReportSummary').value.trim(),
                totalSorties: parseInt(document.getElementById('fTotalSorties').value) || 0,
                combatSorties: parseInt(document.getElementById('fCombatSorties').value) || 0,
                losses: parseInt(document.getElementById('fLosses').value) || 0,
                destructions: parseInt(document.getElementById('fDestructions').value) || 0,
                ntp: parseInt(document.getElementById('fNtp').value) || 0
            };

            if (!body.startTime || !body.endTime) {
                showToast('Вкажіть час початку та кінця', 'err');
                return;
            }
            if (body.startTime > body.endTime) {
                showToast('Початок не може бути пізніше кінця', 'err');
                return;
            }

            const url = id ? `/combat-duty/api/${id}` : '/combat-duty/api';
            const method = id ? 'PUT' : 'POST';
            try {
                const res = await fetch(url, {
                    method: method,
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify(body)
                });
                const text = await res.text();
                if (res.ok) {
                    closeModal('formModal');
                    currentPage = 0;
                    loadDuties();
                    showToast(id ? 'Чергування оновлено' : 'Чергування додано', 'ok');
                } else {
                    showToast('Помилка: ' + text, 'err');
                }
            } catch(e) {
                showToast('Помилка мережі', 'err');
            }
        };

        window.confirmDelete = function(id) {
            if (!confirm('Видалити чергування?')) return;
            fetch(`/combat-duty/api/${id}`, { method: 'DELETE' })
                .then(res => {
                    if (res.ok) {
                        currentPage = 0;
                        loadDuties();
                        showToast('Видалено', 'ok');
                    } else {
                        showToast('Помилка видалення', 'err');
                    }
                })
                .catch(() => showToast('Помилка мережі', 'err'));
        };

        // ===== ДОПОМІЖНІ =====
        window.escapeHtml = function(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
        };

        window.openModal = function(id) {
            document.getElementById(id).classList.add('open');
        };
        window.closeModal = function(id) {
            document.getElementById(id).classList.remove('open');
        };

        window.showToast = function(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type} show`;
            setTimeout(() => t.classList.remove('show'), 3000);
        };

        document.querySelectorAll('.modal-overlay').forEach(el => {
            el.addEventListener('click', function(e) {
                if (e.target === this) this.classList.remove('open');
            });
        });

    })();
</script>
</body>
</html>
