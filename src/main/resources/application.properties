server.port=8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ========== ЛОГУВАННЯ ==========
# Рівень логів для нашого додатку — INFO (показує info/warn/error)
logging.level.org.example=INFO
# Spring і Tomcat — тільки попередження і помилки, щоб не засмічувати консоль
logging.level.org.springframework=WARN
logging.level.org.apache=WARN

# Формат логу: час | рівень | клас | повідомлення
logging.pattern.console=%d{HH:mm:ss} %-5level [%logger{20}] %msg%n

# Зберігати логи у файл (необов'язково — розкоментуй якщо потрібно)
# logging.file.name=logs/combat-report.log
# logging.logback.rollingpolicy.max-file-size=10MB
# logging.logback.rollingpolicy.max-history=7

# ========== ВАЛІДАЦІЯ ==========
# Максимальний розмір JSON у form-параметрі (захист від занадто великих запитів)
spring.mvc.async.request-timeout=30000