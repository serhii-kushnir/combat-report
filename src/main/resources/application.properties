server.port=8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ========== ЛОГУВАННЯ ==========
# Примусове використання UTF-8 для логів
logging.charset.console=UTF-8
logging.charset.file=UTF-8
logging.level.org.example=INFO
logging.level.org.springframework=WARN
logging.level.org.apache=WARN

# Формат у консолі
logging.pattern.console=%d{HH:mm:ss} %-5level [%logger{20}] %msg%n

# Запис у файл — logs/combat-report.log поруч з JAR
logging.file.name=logs/combat-report.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level [%logger{30}] %msg%n

# Ротація: новий файл кожен день або коли розмір > 10MB
logging.logback.rollingpolicy.file-name-pattern=logs/combat-report-%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-file-size=10MB
# Зберігати логи за останні 30 днів
logging.logback.rollingpolicy.max-history=30
# Загальний ліміт всіх лог-файлів — не більше 500MB на диску
logging.logback.rollingpolicy.total-size-cap=500MB

# ========== ІНШЕ ==========
spring.mvc.async.request-timeout=30000

# ========== БАЗА ДАНИХ H2 ==========
spring.datasource.url=jdbc:h2:file:./data/combat-db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=skopa9099
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true
